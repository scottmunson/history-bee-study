, and canals.","facts":["Founded by Peter the Great on May 27, 1703","The city was renamed Petrograd in 1914 and Leningrad in 1924, then changed back to St. Petersburg in 1991","The Hermitage Museum in St. Petersburg is one of the largest art museums in the world with over 3 million items"]},"Tecumseh":{"desc":"Tecumseh was a Shawnee chief who tried to unite Native American tribes into a large confederation to resist American expansion into their lands. He was one of the most important Native American leaders in American history.","facts":["He was born around 1768 in present-day Ohio","He was killed at the Battle of the Thames in Ontario, Canada, on October 5, 1813, while fighting alongside the British in the War of 1812","His brother Tenskwatawa, known as 'The Prophet,' helped him build the confederacy through a religious movement"]},"Vienna":{"desc":"Vienna is the capital city of Austria and was once the center of the powerful Habsburg Empire that ruled much of Europe for centuries. It is famous for its beautiful architecture, classical music heritage, and for being the home of composers like Mozart, Beethoven, and Strauss.","facts":["Vienna was the capital of the Habsburg Empire for over 600 years","The Congress of Vienna in 1814–1815 redrew the map of Europe after Napoleon's defeat","Composers Wolfgang Amadeus Mozart, Ludwig van Beethoven, and Johann Strauss II all lived and worked in Vienna"]},"Warsaw":{"desc":"Warsaw is the capital city of Poland and has a long and dramatic history, including being almost completely destroyed during World War II. After the war, the Polish people rebuilt the city's historic Old Town brick by brick, and today it is a UNESCO World Heritage Site.","facts":["About 85% of Warsaw was destroyed during World War II","The Warsaw Uprising of 1944 was a major revolt by Polish resistance fighters against Nazi German occupation","The Warsaw Pact, a military alliance of Eastern European communist countries, was named after the city and signed there in 1955"]},"Washington Crossing the Delaware":{"desc":"On the night of December 25-26, 1776, General George Washington led about 2,400 Continental Army soldiers across the icy Delaware River to launch a surprise attack on Hessian troops at Trenton, New Jersey. This bold move was a turning point in the American Revolution when things looked very bad for the Continental Army.","facts":["The attack resulted in the capture of about 1,000 Hessian soldiers","The famous painting of the event was created by Emanuel Leutze in 1851","Washington's army crossed the river in Durham boats during a snowstorm"]},"West Point":{"desc":"West Point is the United States Military Academy located in West Point, New York, and is one of the most famous military schools in the world. It has trained many important American military leaders and has been in operation since 1802.","facts":["It was established on March 16, 1802, by President Thomas Jefferson","Famous graduates include Ulysses S. Grant, Robert E. Lee, and Dwight D. Eisenhower","During the American Revolution, Benedict Arnold tried to hand over the fort at West Point to the British"]},"Zionism":{"desc":"Zionism is a movement that began in the late 1800s to create a homeland for Jewish people in the land of Israel. It led to the founding of the modern State of Israel in 1948, giving Jewish people their own country after centuries without one.","facts":["Theodor Herzl is considered the father of modern Zionism after publishing 'The Jewish State' in 1896","The First Zionist Congress was held in Basel, Switzerland, in 1897","The movement led to the establishment of the State of Israel on May 14, 1948"]},"slave revolt":{"desc":"Throughout history, enslaved people fought back against slavery in many dramatic revolts. These uprisings, from ancient Rome to the Americas, showed the courage of enslaved people who risked everything for their freedom.","facts":["The Haitian Revolution (1791-1804) was the most successful slave revolt, leading to Haiti becoming a free country","Nat Turner led a slave rebellion in Virginia in August 1831 that killed about 55 white people","Spartacus led a famous slave revolt against ancient Rome from 73 to 71 BC with an army of about 70,000"]},"1988 Winter Olympics":{"desc":"The 1988 Winter Olympics were held in Calgary, Alberta, Canada, from February 13 to 28, 1988. These games are remembered for several historic moments, including the debut of the Jamaican bobsled team.","facts":["The Soviet Union led the medal count with 29 total medals","Eddie 'The Eagle' Edwards from Great Britain became famous as a lovable underdog in ski jumping","Figure skater Katarina Witt of East Germany won her second consecutive Olympic gold medal"]},"Aboriginal peoples":{"desc":"Aboriginal peoples are the original inhabitants of Australia who have lived on the continent for tens of thousands of years. They have the oldest continuing culture in the world, with rich traditions of art, music, and storytelling called the Dreamtime.","facts":["Aboriginal Australians have lived in Australia for at least 65,000 years","There were around 250 distinct language groups before European arrival in 1788","The Dreamtime is the Aboriginal belief system explaining the creation of the world and all living things"]},"Abu Bakr":{"desc":"Abu Bakr was one of the closest friends and followers of the Prophet Muhammad and became the first Caliph, or leader, of the Muslim community after Muhammad died in 632 AD. He helped hold the young Muslim community together during a difficult time and began spreading Islam beyond the Arabian Peninsula.","facts":["He was the first adult male to convert to Islam and was Muhammad's father-in-law","He ruled as Caliph for only about two years, from 632 to 634 AD","He fought the Ridda Wars (Wars of Apostasy) against Arab tribes that tried to leave Islam after Muhammad's death"]},"Acropolis":{"desc":"The Acropolis is a flat-topped rocky hill in the center of Athens, Greece, that holds some of the most famous ancient buildings in the world, including the Parthenon. It has been used as a fortress, a religious center, and a symbol of ancient Greek civilization for thousands of years.","facts":["The word 'Acropolis' means 'high city' in Greek, and the hill rises about 490 feet (150 meters) above sea level","The most famous buildings on the Acropolis, including the Parthenon, were built during the Age of Pericles in the 5th century BC","In 1687, a Venetian cannonball hit the Parthenon, which the Ottomans were using to store gunpowder, causing a massive explosion that destroyed much of the building"]},"Adventures of Huckleberry Finn":{"desc":"Adventures of Huckleberry Finn is a novel by Mark Twain published in 1884 that tells the story of a boy named Huck who travels down the Mississippi River on a raft with an escaped slave named Jim. It is considered one of the greatest American novels ever written.","facts":["Mark Twain's real name was Samuel Clemens","The book is set in the pre-Civil War South along the Mississippi River","It was first published in the United Kingdom in December 1884 and in the United States in February 1885"]},"Aksum Kingdom":{"desc":"The Kingdom of Aksum was a powerful ancient civilization located in what is now Ethiopia and Eritrea, thriving from about 100 to 940 AD. It was one of the four great powers of the ancient world and was the first major African kingdom to adopt Christianity.","facts":["King Ezana converted the kingdom to Christianity around 330 AD, making Aksum one of the earliest Christian states","Aksum was a major trading empire with its own coins and a port city called Adulis on the Red Sea","The kingdom built giant stone obelisks called stelae, the tallest of which stood about 100 feet (33 meters) tall"]},"Anne Boleyn":{"desc":"Anne Boleyn was the second wife of King Henry VIII of England and the mother of Queen Elizabeth I. Henry VIII broke away from the Catholic Church partly so he could marry Anne, but she was later accused of treason and executed in 1536.","facts":["She was executed on May 19, 1536, at the Tower of London","Her daughter Elizabeth became Queen Elizabeth I, one of England's greatest monarchs","Henry VIII created the Church of England in part so he could annul his first marriage and marry Anne"]},"Anthony Albanese":{"desc":"Anthony Albanese is the 31st Prime Minister of Australia, taking office on May 23, 2022. He is the leader of the Australian Labor Party and grew up in public housing in Sydney.","facts":["He was born on March 2, 1963, in Sydney, Australia","He served as Deputy Prime Minister under Kevin Rudd from 2013 to 2013","He became Leader of the Australian Labor Party in 2019 after the party's election loss"]},"Apollo program":{"desc":"The Apollo program was NASA's space program that successfully landed humans on the Moon. It ran from 1961 to 1972 and is one of the greatest achievements in human history.","facts":["Apollo 11 made the first Moon landing on July 20, 1969, with astronauts Neil Armstrong and Buzz Aldrin","There were six successful Moon landings in total, with 12 astronauts walking on the Moon","The Apollo 13 mission in 1970 had an explosion in space but the crew safely returned to Earth"]},"Appomattox Court House":{"desc":"Appomattox Court House is a small village in Virginia where Confederate General Robert E. Lee surrendered to Union General Ulysses S. Grant on April 9, 1865, effectively ending the Civil War. The surrender took place in the parlor of Wilmer McLean's house.","facts":["Lee surrendered approximately 28,000 Confederate soldiers","Grant allowed Confederate soldiers to keep their horses and go home peacefully","The surrender came just six days after the fall of the Confederate capital of Richmond, Virginia"]},"Argentina":{"desc":"Argentina is a large country in the southern part of South America. It declared independence from Spain on July 9, 1816, and has grown into one of the biggest and most important countries in Latin America.","facts":["Argentina declared independence from Spain on July 9, 1816","Buenos Aires is the capital and largest city","Argentina is the second-largest country in South America after Brazil"]},"Assyrian Empire":{"desc":"The Assyrian Empire was one of the most powerful and feared empires of the ancient world, ruling a huge area of the Middle East from about 2500 BC to 609 BC. The Assyrians were known for their mighty army, advanced siege weapons, and their sometimes cruel treatment of conquered peoples.","facts":["At its peak around 670 BC, the Neo-Assyrian Empire stretched from Egypt to western Iran","The capital city of Nineveh had massive walls 7.5 miles long and a great library built by King Ashurbanipal containing over 30,000 clay tablets","The empire fell in 612 BC when a coalition of Babylonians and Medes conquered and destroyed Nineveh"]},"Augusto Pinochet":{"desc":"Augusto Pinochet was a military dictator who ruled Chile from 1973 to 1990. He took power by overthrowing the elected president Salvador Allende in a violent military coup and ruled the country harshly for 17 years.","facts":["Pinochet seized power in a coup on September 11, 1973","He ruled Chile as a military dictator until 1990","Thousands of people were killed or disappeared under his rule"]},"Aung San Suu Kyi":{"desc":"Aung San Suu Kyi is a political leader from Myanmar (also called Burma) who spent many years fighting for democracy against a military government. She won the Nobel Peace Prize in 1991 while under house arrest, but her reputation was later damaged when she did not speak out against the treatment of the Rohingya people.","facts":["She spent about 15 of the 21 years between 1989 and 2010 under house arrest by Myanmar's military rulers","Her political party, the National League for Democracy, won a landslide election victory in 2015","She was arrested again in a military coup on February 1, 2021, and sentenced to prison"]},"Barbara Walters":{"desc":"Barbara Walters was a pioneering American journalist who broke barriers for women in television news. She was the first woman to co-anchor a network evening news program and became famous for her interviews with world leaders and celebrities.","facts":["She co-created and co-hosted the talk show The View, which premiered in 1997","She became the first female co-anchor of a network evening news show on ABC in 1976","She was born on September 25, 1929, and passed away on December 30, 2022"]},"Battle of Manila Bay":{"desc":"The Battle of Manila Bay was a naval battle during the Spanish-American War fought on May 1, 1898, in the Philippines. The American fleet, led by Commodore George Dewey, destroyed the entire Spanish fleet in just a few hours without losing a single American sailor.","facts":["Commodore George Dewey commanded the U.S. Asiatic Squadron in the battle","The battle took place on May 1, 1898, and lasted about seven hours","The Spanish lost all seven of their warships while the Americans suffered no ship losses and zero deaths in combat"]},"Battle of the Milvian Bridge":{"desc":"The Battle of the Milvian Bridge was fought in 312 AD near Rome between the Roman emperors Constantine and Maxentius. Before the battle, Constantine reportedly saw a vision of a Christian cross in the sky, and after his victory he became the first Roman emperor to support Christianity.","facts":["The battle took place on October 28, 312 AD, at the Milvian Bridge over the Tiber River","Constantine's opponent Maxentius drowned in the Tiber River during the battle","After his victory, Constantine issued the Edict of Milan in 313 AD, allowing Christians to worship freely"]},"Bear Flag Republic":{"desc":"The Bear Flag Republic was a short-lived attempt by American settlers in California to create their own country in 1846. A group of settlers captured the town of Sonoma and raised a flag with a grizzly bear on it, which later inspired the California state flag.","facts":["The Bear Flag Revolt began on June 14, 1846, in Sonoma, California","The republic lasted only about 25 days before being absorbed into the United States","The bear flag design became the basis for California's official state flag"]},"Bhutan":{"desc":"Bhutan is a small Buddhist kingdom located in the Himalaya Mountains between China and India. It is famous for measuring its success not just by money but by something called 'Gross National Happiness,' which looks at how content and well its people are.","facts":["Bhutan did not have television or internet until 1999, making it one of the last countries to introduce TV","The country measures Gross National Happiness instead of just Gross Domestic Product","Bhutan is the world's only carbon-negative country, meaning its forests absorb more carbon dioxide than the country produces"]},"Black Plague":{"desc":"The Black Plague, also called the Black Death, was a terrible disease that swept through Europe in the 1340s and killed millions of people. It was one of the deadliest pandemics in human history, wiping out roughly one-third of Europe's population in just a few years.","facts":["The Black Death peaked in Europe between 1347 and 1353","It killed an estimated 25 to 50 million people in Europe","The disease was caused by the bacterium Yersinia pestis and was spread by fleas on rats"]},"Boer Wars":{"desc":"The Boer Wars were two wars fought between the British Empire and the Boers (Dutch-speaking settlers) in southern Africa. The Second Boer War (1899-1902) was especially important because the British used controversial concentration camps and it eventually led to the creation of the Union of South Africa.","facts":["The First Boer War (1880-1881) was a short conflict that the Boers won, keeping their independence","During the Second Boer War (1899-1902), the British placed Boer women and children in concentration camps where about 26,000 died from disease","The war ended with the Treaty of Vereeniging in 1902, and in 1910 the British and Boer territories merged into the Union of South Africa"]},"Bohemia":{"desc":"Bohemia is a historical region in central Europe that is now the western part of the Czech Republic. For centuries it was an important kingdom with its capital in Prague, and it played a key role in European events like the start of the Thirty Years' War.","facts":["Prague, the capital of Bohemia, has been a major European city since the Middle Ages","The Defenestration of Prague in 1618, when Protestant nobles threw Catholic officials out of a window, helped start the Thirty Years' War","Bohemia was part of the Habsburg Empire from 1526 until 1918"]},"Bongbong Marcos":{"desc":"Bongbong Marcos, whose full name is Ferdinand Marcos Jr., is the current President of the Philippines and the son of former dictator Ferdinand Marcos Sr. His father ruled the Philippines for 20 years and was overthrown in the 1986 People Power Revolution, but the family returned to politics decades later.","facts":["He won the Philippine presidential election in May 2022 with over 31 million votes","His father, Ferdinand Marcos Sr., declared martial law in 1972 and ruled as a dictator until being overthrown in 1986","The Marcos family was accused of stealing billions of dollars from the Philippines during their time in power"]},"Book of Kells":{"desc":"The Book of Kells is a beautifully decorated manuscript of the four Gospels of the Bible, created by Celtic monks around the year 800 AD. It is considered one of the greatest masterpieces of medieval art, with incredibly detailed illustrations, colorful designs, and intricate letter decorations on nearly every page.","facts":["It was likely created around 800 AD by monks at the monastery of Iona, off the coast of Scotland, and later moved to Kells, Ireland","The book contains 680 pages of elaborate illustrations using pigments from as far away as Afghanistan","It has been kept at Trinity College Dublin since 1661 and is Ireland's most famous national treasure"]},"Booker T. Washington":{"desc":"Booker T. Washington was an African American educator and leader who founded the Tuskegee Institute in Alabama in 1881. He believed that education and economic self-improvement were the best paths for Black Americans to gain equality after slavery.","facts":["He was born into slavery in 1856 in Virginia and was freed after the Civil War","His autobiography, Up From Slavery, published in 1901, became a bestseller","He was the first African American invited to dine at the White House, by President Theodore Roosevelt in 1901"]},"Brexit":{"desc":"Brexit is the name for the United Kingdom's decision to leave the European Union. In a public vote called a referendum held on June 23, 2016, about 52% of British voters chose to leave the EU, and the UK officially left on January 31, 2020.","facts":["The referendum was held on June 23, 2016, and 51.9% voted to leave","The UK officially left the European Union on January 31, 2020","The word Brexit is a combination of 'Britain' and 'exit'"]},"Brigham Young":{"desc":"Brigham Young was the second president of The Church of Jesus Christ of Latter-day Saints (the Mormon Church) and led thousands of Mormon settlers to the Salt Lake Valley in Utah in 1847. He served as the first governor of the Utah Territory.","facts":["He led approximately 70,000 Mormon pioneers westward to Utah","He founded Brigham Young University in Provo, Utah, in 1875","He was governor of the Utah Territory from 1850 to 1858"]},"Buddhist statues":{"desc":"Throughout history, people have built giant statues of the Buddha to show their devotion and faith. Some of the most famous Buddhist statues are hundreds of feet tall and took many years to carve or build, but sadly some have been destroyed by war and conflict.","facts":["The Bamiyan Buddhas in Afghanistan, carved in the 6th century and standing 180 and 121 feet tall, were destroyed by the Taliban in March 2001","The Great Buddha at Leshan in China, carved between 713 and 803 AD, stands 233 feet tall and is the largest stone Buddha in the world","The Great Buddha at Kamakura in Japan was built in 1252 and originally sat inside a wooden temple that was washed away by a tsunami in 1498"]},"Byzantine Empire":{"desc":"The Byzantine Empire was the eastern continuation of the Roman Empire, lasting from 330 CE when Constantine moved the capital to Constantinople until its fall to the Ottoman Turks in 1453. It preserved Greek and Roman knowledge through the Middle Ages and was known for its art, architecture, and the Justinian Code of laws.","facts":["Eastern continuation of the Roman Empire (330-1453 CE)","Capital was Constantinople (modern Istanbul)","Emperor Justinian created a famous code of laws","Built the magnificent Hagia Sophia cathedral","Preserved Greek and Roman learning during the Dark Ages"]},"Canadian Confederation":{"desc":"Canadian Confederation was the process by which three British colonies joined together on July 1, 1867, to form the Dominion of Canada. This date is now celebrated as Canada Day, the country's national holiday.","facts":["The original four provinces were Ontario, Quebec, Nova Scotia, and New Brunswick","The British North America Act of 1867 served as Canada's constitution for over a century","Sir John A. Macdonald became Canada's first Prime Minister"]},"Cecil Rhodes":{"desc":"Cecil Rhodes was a British businessman and politician who became extremely wealthy from diamond mining in southern Africa in the late 1800s. He founded the De Beers diamond company, became Prime Minister of the Cape Colony, and his actions helped Britain colonize large parts of Africa.","facts":["He founded the De Beers diamond company, which at one point controlled about 90% of the world's diamond production","He served as Prime Minister of the Cape Colony (now part of South Africa) from 1890 to 1896","The countries of Northern Rhodesia (now Zambia) and Southern Rhodesia (now Zimbabwe) were named after him"]},"Cherokee Nation":{"desc":"The Cherokee Nation is one of the largest Native American tribes in the United States, originally from the southeastern United States. They were one of the 'Five Civilized Tribes' and were forced to walk the Trail of Tears to Oklahoma in the 1830s.","facts":["The Trail of Tears in 1838-1839 forced about 16,000 Cherokee to relocate, and roughly 4,000 died on the journey","The Cherokee developed their own written language using a syllabary created by Sequoyah","Today the Cherokee Nation is headquartered in Tahlequah, Oklahoma, and has over 400,000 enrolled citizens"]},"Colombia":{"desc":"Colombia is a country in the northwestern part of South America, named after the explorer Christopher Columbus. It gained independence from Spain in 1819 after a war led by the famous general Simón Bolívar.","facts":["Colombia gained independence from Spain on August 7, 1819","The country is named after Christopher Columbus","Bogotá is the capital and largest city of Colombia"]},"Comoros":{"desc":"Comoros is a small island nation located in the Indian Ocean between Madagascar and the coast of East Africa. It has a long history of Arab, African, and French influence and is one of the smallest and poorest countries in Africa, but it has a rich cultural heritage.","facts":["The country is made up of three main islands: Grande Comore, Moheli, and Anjouan, while a fourth island, Mayotte, voted to remain part of France","Comoros gained independence from France on July 6, 1975, and has experienced more than 20 coups or attempted coups since then","Arab traders and settlers arrived as early as the 6th century, bringing Islam, which is now the dominant religion"]},"Crazy Horse":{"desc":"Crazy Horse was an Oglala Lakota war leader who fought to preserve the traditions and land of his people against the U.S. government. He is best known for his role in defeating General Custer at the Battle of the Little Bighorn in 1876.","facts":["He was born around 1840 in present-day South Dakota","He surrendered to U.S. troops in May 1877 and was killed at Fort Robinson, Nebraska, on September 5, 1877","The Crazy Horse Memorial, a massive mountain carving in the Black Hills of South Dakota, has been under construction since 1948"]},"Declaration of Independence":{"desc":"On July 4, 1776, the Continental Congress adopted the Declaration of Independence, written mainly by Thomas Jefferson. It declared the 13 American colonies free from British rule. In 2026, America celebrates its 250th birthday, called the 'semiquincentennial.' The Declaration stated that 'all men are created equal' and listed grievances against King George III. The original document is kept at the National Archives in Washington, D.C.","facts":["Only 2 of the 56 signers later became president: John Adams and Thomas Jefferson","Both Adams and Jefferson died on the same day: July 4, 1826 — the 50th anniversary","Benjamin Franklin, at 70, was the oldest signer","The Declaration was approved on July 2 but not signed until August 2","The 250th celebration in 2026 includes Freedom Trucks visiting all 48 contiguous states"]},"Diego Rivera":{"desc":"Diego Rivera was a famous Mexican artist known for painting enormous, colorful murals on the walls of public buildings. His murals often showed scenes of Mexican history, workers, and everyday life, and he is considered one of the greatest muralists of the 20th century.","facts":["He was born on December 8, 1886, in Guanajuato, Mexico","He painted a famous mural at the Detroit Institute of Arts called Detroit Industry in 1932–1933","He was married to fellow artist Frida Kahlo, and they had a famously stormy relationship"]},"Doctors' Plot":{"desc":"The Doctors' Plot was a made-up conspiracy in the Soviet Union in 1953 where Soviet leader Joseph Stalin accused a group of mostly Jewish doctors of plotting to poison top Soviet leaders. The accusations were false and were part of Stalin's paranoia, but the crisis ended when Stalin died in March 1953.","facts":["The plot was announced by the Soviet government on January 13, 1953","Nine doctors were arrested, six of whom were Jewish, fueling antisemitic persecution","The charges were dropped shortly after Stalin's death on March 5, 1953"]},"Doolittle Raid":{"desc":"The Doolittle Raid was a daring American bombing attack on Tokyo, Japan, on April 18, 1942, during World War II. It was the first time the United States bombed the Japanese homeland, and while it did not cause huge damage, it gave Americans hope and showed Japan that it could be attacked.","facts":["Lieutenant Colonel James Doolittle led 16 B-25 bombers that launched from the aircraft carrier USS Hornet","The planes could not land back on the carrier, so most crews crash-landed in China or bailed out by parachute","Three airmen were executed by the Japanese after being captured, and the raid pushed Japan to attack Midway, leading to a major American victory"]},"Eli Whitney":{"desc":"Eli Whitney was an American inventor best known for inventing the cotton gin in 1793, which made it much faster to separate cotton fibers from seeds. He also pioneered the idea of interchangeable parts in manufacturing, which changed how things were built in factories.","facts":["The cotton gin could clean 50 pounds of cotton per day compared to 1 pound by hand","He was born on December 8, 1765, in Westborough, Massachusetts","His concept of interchangeable parts, used in making muskets for the U.S. government, helped lead to the American Industrial Revolution"]},"Estado Novo":{"desc":"Estado Novo, meaning 'New State' in Portuguese, was the authoritarian government that ruled Portugal from 1933 to 1974 under dictators António de Oliveira Salazar and later Marcelo Caetano. It was one of the longest-lasting dictatorships in Western Europe and was finally overthrown by a peaceful military revolution.","facts":["António de Oliveira Salazar led Portugal from 1932 until a stroke forced him out in 1968","The regime was overthrown on April 25, 1974, in the Carnation Revolution, named because soldiers put carnations in their gun barrels","Portugal held onto African colonies like Angola and Mozambique longer than most European countries, partly due to the Estado Novo's policies"]},"Ethiopian Empire":{"desc":"The Ethiopian Empire, also known as Abyssinia, was one of the longest-lasting empires in African history, existing in various forms for nearly 700 years until 1974. Ethiopia is unique in Africa because it was never colonized by a European power, successfully defeating an Italian invasion in 1896.","facts":["Ethiopia defeated Italy at the Battle of Adwa on March 1, 1896, preserving its independence during the Scramble for Africa","The Solomonic Dynasty, which ruled Ethiopia for centuries, claimed descent from King Solomon and the Queen of Sheba","Emperor Haile Selassie, the last emperor, ruled from 1930 until he was overthrown by a communist military group in 1974"]},"European Space Agency":{"desc":"The European Space Agency (ESA) is a space exploration organization made up of many European countries working together. Founded in 1975, it launches rockets, sends probes to other planets, and helps build the International Space Station.","facts":["ESA was founded on May 30, 1975, and has 22 member states","Its main spaceport is located in Kourou, French Guiana","ESA's Rosetta mission successfully landed a probe on a comet for the first time in November 2014"]},"European Union":{"desc":"The European Union is a group of European countries that work together on things like trade, travel, and laws. It started as a small group of six countries after World War II to promote peace and has grown to include 27 member nations today.","facts":["It began in 1957 when six countries signed the Treaty of Rome","The euro currency was introduced on January 1, 1999, and is now used by 20 EU member countries","The EU headquarters are located in Brussels, Belgium"]},"F. Scott Fitzgerald":{"desc":"F. Scott Fitzgerald was an American author who is best known for his novel The Great Gatsby, published in 1925. He is considered one of the greatest writers of the 20th century and his work captured the spirit of the 1920s, which he called the 'Jazz Age.'","facts":["He was born on September 24, 1896, in St. Paul, Minnesota","The Great Gatsby was not very popular during his lifetime but is now considered a classic of American literature","He died on December 21, 1940, at age 44 in Hollywood, California"]},"FARC":{"desc":"FARC stands for the Revolutionary Armed Forces of Colombia, a rebel guerrilla group that fought the Colombian government for over 50 years. They wanted to change Colombia's government and help poor farmers, but they also used violence and were involved in illegal activities.","facts":["FARC was founded in 1964 as a Marxist guerrilla group","A peace deal was signed between FARC and the Colombian government in 2016","At its peak, FARC had around 20,000 fighters"]},"Falklands War":{"desc":"The Falklands War was a short but intense conflict in 1982 between the United Kingdom and Argentina over control of the Falkland Islands, a small group of islands in the South Atlantic Ocean. Argentina invaded the islands in April, but British forces fought back and won the war in just 74 days.","facts":["The war lasted from April 2 to June 14, 1982","About 649 Argentine and 255 British soldiers were killed during the conflict","British Prime Minister Margaret Thatcher's popularity surged after the British victory"]},"Ferdinand and Isabella":{"desc":"Ferdinand and Isabella were the king and queen of Spain who united the country and funded Christopher Columbus's famous voyage in 1492. Their marriage in 1469 joined the kingdoms of Aragon and Castile, creating the powerful nation of Spain.","facts":["Ferdinand of Aragon and Isabella of Castile married on October 19, 1469","They sponsored Christopher Columbus's first voyage to the Americas in 1492","They completed the Reconquista by conquering Granada, the last Muslim territory in Spain, in January 1492"]},"Filibuster":{"desc":"A filibuster is a tactic used in the United States Senate where a senator gives a very long speech or uses other delaying methods to block or delay a vote on a bill. It takes 60 out of 100 senators to vote to end a filibuster, which is called 'cloture.'","facts":["The longest filibuster in U.S. history was by Senator Strom Thurmond, who spoke for 24 hours and 18 minutes in 1957 to block a civil rights bill","The word 'filibuster' comes from a Spanish word meaning 'pirate'","The cloture rule requiring 60 votes to end a filibuster was established in 1917"]},"Five Civilized Tribes":{"desc":"The Five Civilized Tribes is a term used for five Native American nations — the Cherokee, Chickasaw, Choctaw, Creek (Muscogee), and Seminole — who adopted many European-American customs. They were forcibly relocated from the southeastern United States to Indian Territory (now Oklahoma) during the 1830s.","facts":["The forced removal is known as the Trail of Tears and was carried out under President Andrew Jackson's Indian Removal Act of 1830","The tribes were called 'civilized' because they had adopted practices like written constitutions, farming, and formal education","Each tribe established its own government and capital in Indian Territory (present-day Oklahoma)"]},"Flight of the Bumblebees":{"desc":"Flight of the Bumblebee is a famous orchestral piece written by Russian composer Nikolai Rimsky-Korsakov in 1900. The music is extremely fast and is meant to sound like a buzzing bumblebee flying around, making it one of the most recognizable pieces of classical music.","facts":["It was composed by Nikolai Rimsky-Korsakov around 1899-1900","The piece comes from his opera 'The Tale of Tsar Saltan'","It is often used as a showcase piece for musicians because it requires playing very fast notes"]},"Frank Sinatra":{"desc":"Frank Sinatra was one of the most famous American singers and actors of the 20th century, known for his smooth voice and songs like 'My Way' and 'Fly Me to the Moon.' He was a major cultural figure from the 1940s through the 1990s and won an Academy Award for acting.","facts":["He was born on December 12, 1915, in Hoboken, New Jersey","He won the Academy Award for Best Supporting Actor for the 1953 film From Here to Eternity","He was a member of the Rat Pack, a famous group of entertainers that included Dean Martin and Sammy Davis Jr."]},"French Guiana":{"desc":"French Guiana is a territory on the northeastern coast of South America that belongs to France. It is the only part of mainland South America that is still governed by a European country, and today it is famous for its space launch center.","facts":["French Guiana is an overseas department of France, not an independent country","The Guiana Space Centre in Kourou is used by the European Space Agency to launch rockets","Devil's Island, a famous prison, was located off its coast and operated from 1852 to 1953"]},"Frida Kahlo":{"desc":"Frida Kahlo was a Mexican artist famous for her vivid, emotional self-portraits that often depicted her physical pain and Mexican culture. She overcame a terrible bus accident at age 18 that left her with lifelong injuries, and she turned her suffering into powerful art.","facts":["She was born on July 6, 1907, in Coyoacán, Mexico City","About 55 of her 143 paintings are self-portraits","She was married to muralist Diego Rivera and their house in Mexico City, called the Blue House, is now a museum"]},"Gandhi and Nehru":{"desc":"Mahatma Gandhi and Jawaharlal Nehru were two of the most important leaders in India's fight for independence from British rule. Gandhi was known for his nonviolent protests, while Nehru became India's first Prime Minister after independence in 1947 and helped build the new nation.","facts":["Gandhi was assassinated on January 30, 1948, by Nathuram Godse, a Hindu nationalist","Nehru served as India's first Prime Minister from 1947 until his death in 1964","Gandhi called Nehru his political heir, and together they led the Indian National Congress party during the independence movement"]},"George McClellan":{"desc":"George B. McClellan was a Union general during the Civil War who commanded the Army of the Potomac and briefly served as General-in-Chief of all Union armies. He was known for training and organizing the army well but was criticized for being too cautious in battle.","facts":["President Lincoln removed him from command twice because of his reluctance to aggressively pursue the Confederate army","He ran against Abraham Lincoln as the Democratic candidate in the 1864 presidential election and lost","He won the Battle of Antietam on September 17, 1862, which was the single bloodiest day in American history"]},"George W. Bush":{"desc":"George W. Bush was the 43rd President of the United States, serving from 2001 to 2009. He led the country's response after the September 11, 2001, terrorist attacks, including launching wars in Afghanistan and Iraq.","facts":["He is the son of George H.W. Bush, the 41st president, making them the second father-son pair to both serve as president","He won the 2000 election against Al Gore in one of the closest elections ever, decided by the Supreme Court in Bush v. Gore","He signed the No Child Left Behind Act in 2002, a major education reform law"]},"Glasnost":{"desc":"Glasnost is a Russian word meaning 'openness,' and it was a policy introduced by Soviet leader Mikhail Gorbachev in the 1980s. It allowed Soviet citizens more freedom to speak openly, read uncensored news, and criticize the government, which helped lead to the end of the Soviet Union.","facts":["Glasnost was introduced by Mikhail Gorbachev starting in 1986","It was paired with another reform called perestroika, meaning 'restructuring' of the economy","These reforms contributed to the fall of the Berlin Wall in 1989 and the collapse of the Soviet Union in 1991"]},"Grameen Bank":{"desc":"The Grameen Bank is a special bank in Bangladesh that gives tiny loans to very poor people, especially women, who cannot borrow from regular banks. It was founded by Muhammad Yunus to help poor people start small businesses and lift themselves out of poverty.","facts":["Founded by Muhammad Yunus in 1983, the bank has loaned over $30 billion to nearly 10 million borrowers","About 97% of Grameen Bank's borrowers are women","Muhammad Yunus and the Grameen Bank together won the Nobel Peace Prize in 2006 for their work fighting poverty"]},"Green Eggs and Ham":{"desc":"Green Eggs and Ham is one of the most famous children's books ever written, created by Dr. Seuss (Theodor Geisel) in 1960. The entire book uses only 50 different words because Dr. Seuss wrote it on a bet that he couldn't write a book with so few words.","facts":["The book was published in 1960 and written by Dr. Seuss (Theodor Seuss Geisel)","It uses only 50 unique words throughout the entire story","Dr. Seuss wrote it after his editor Bennett Cerf bet him he couldn't write a book using 50 words or fewer"]},"Guru Nanak":{"desc":"Guru Nanak was the founder of Sikhism, one of the world's major religions, born in 1469 in what is now Pakistan. He taught that there is one God, that all people are equal regardless of their religion or social class, and that people should live honestly and share with others.","facts":["He was born in 1469 in Talwandi (now called Nankana Sahib) in present-day Pakistan","He traveled widely for about 28 years on journeys called Udasis, visiting places across South Asia and possibly the Middle East","He was the first of ten Sikh Gurus, and his teachings are recorded in the Guru Granth Sahib, the Sikh holy scripture"]},"Hamilton musical":{"desc":"Hamilton is a hit Broadway musical created by Lin-Manuel Miranda that tells the story of Founding Father Alexander Hamilton using hip-hop and R&B music. It opened on Broadway in August 2015 and became one of the most popular musicals in history.","facts":["It won 11 Tony Awards in 2016, including Best Musical","Lin-Manuel Miranda was inspired to write it after reading Ron Chernow's biography of Alexander Hamilton","The show features a diverse cast portraying the Founding Fathers, which was a groundbreaking creative choice"]},"Hammurabi":{"desc":"Hammurabi was a king of Babylon who ruled from about 1792 to 1750 BCE. He is best known for the Code of Hammurabi, one of the oldest written sets of laws ever discovered. The code was carved into a stone pillar and included the famous principle of 'an eye for an eye.'","facts":["King of Babylon (c. 1792-1750 BCE)","Created the Code of Hammurabi, one of the oldest written law codes","The code contained 282 laws carved on a stone pillar","Famous for the principle 'an eye for an eye'","The code covered trade, property, family, and criminal law"]},"Han Dynasty":{"desc":"The Han Dynasty ruled China from 206 BC to 220 AD and is considered one of the greatest periods in Chinese history. It was so important that the majority ethnic group in China today still calls itself 'Han Chinese,' and the dynasty established the Silk Road trade route connecting China to the Roman Empire.","facts":["The Silk Road trade routes were formally established during Emperor Wu's reign around 130 BC","Paper was invented during the Han Dynasty, traditionally credited to Cai Lun around 105 AD","The Han Dynasty lasted over 400 years and is divided into Western Han (206 BC-9 AD) and Eastern Han (25-220 AD)"]},"Harpers Ferry":{"desc":"Harpers Ferry is a small town in present-day West Virginia where John Brown led a famous raid on the federal armory on October 16, 1859, in an attempt to start a slave rebellion. The town also played an important role during the Civil War because of its strategic location where two rivers meet.","facts":["John Brown and 21 followers seized the armory but were captured by U.S. Marines led by Colonel Robert E. Lee","The town changed hands between Union and Confederate forces eight times during the Civil War","In September 1862, Confederate General Stonewall Jackson captured Harpers Ferry along with about 12,500 Union soldiers, the largest Union surrender during the war"]},"Herod the Great":{"desc":"Herod the Great was the king of Judea from 37 to 4 BC, ruling under the authority of the Roman Empire. He is famous for his massive building projects, including expanding the Second Temple in Jerusalem, but he is also remembered for his cruelty and paranoia about losing his throne.","facts":["He rebuilt and expanded the Second Temple in Jerusalem, making it one of the most magnificent buildings in the ancient world","According to the Gospel of Matthew, he ordered the Massacre of the Innocents, killing young boys in Bethlehem","He built the fortress of Masada and the port city of Caesarea, both engineering marvels of the ancient world"]},"Ho Chi Minh":{"desc":"Ho Chi Minh was the leader of Vietnam's independence movement and became the first president of North Vietnam. He fought against French colonial rule and later against the United States during the Vietnam War, and today Vietnam's largest city is named Ho Chi Minh City in his honor.","facts":["He declared Vietnam's independence from France on September 2, 1945, quoting the American Declaration of Independence","He lived abroad for about 30 years, traveling to France, the Soviet Union, and China before returning to lead Vietnam","He died on September 2, 1969, six years before the end of the Vietnam War and the reunification of Vietnam"]},"Hollywood sign":{"desc":"The Hollywood sign is a famous landmark in the Hollywood Hills of Los Angeles, California, with giant white letters spelling out 'HOLLYWOOD.' It was originally built in 1923 as an advertisement for a real estate development and originally read 'HOLLYWOODLAND.'","facts":["Each letter is about 45 feet tall","The 'LAND' part was removed in 1949 when the Hollywood Chamber of Commerce took over the sign","The sign was rebuilt in 1978 with steel letters after the original wooden ones had deteriorated"]},"Holodomor":{"desc":"The Holodomor was a devastating man-made famine in Soviet Ukraine in 1932–1933 caused by the policies of Soviet leader Joseph Stalin. Millions of Ukrainians starved to death when the Soviet government seized their grain and food, and many countries today recognize it as a genocide.","facts":["An estimated 3.5 to 7 million Ukrainians died during the famine of 1932–1933","The word Holodomor comes from Ukrainian words meaning 'death by starvation'","The Soviet government denied the famine was happening and blocked outside aid from reaching Ukraine"]},"Honduras":{"desc":"Honduras is a country in Central America that was once part of the ancient Maya civilization. It became independent from Spain in 1821 and has a history shaped by agriculture, especially banana farming.","facts":["Honduras gained independence from Spain on September 15, 1821","The ancient Maya city of Copán is located in western Honduras","Honduras was one of the original 'banana republics' where American fruit companies had enormous influence"]},"House of Tudor":{"desc":"The House of Tudor was a royal family that ruled England from 1485 to 1603, and it included some of the most famous kings and queens in English history. The Tudor period saw huge changes including the break from the Catholic Church and the beginning of England's rise as a world power.","facts":["The Tudor dynasty began when Henry VII won the Battle of Bosworth Field in 1485","Henry VIII, the second Tudor king, had six wives and created the Church of England","The last Tudor monarch was Queen Elizabeth I, who ruled from 1558 to 1603"]},"Howard Carter":{"desc":"Howard Carter was a British archaeologist who discovered the tomb of the pharaoh Tutankhamun in Egypt's Valley of the Kings in 1922. It was one of the greatest archaeological discoveries ever made because the tomb was nearly intact and filled with thousands of treasures, including the famous golden death mask.","facts":["He discovered Tutankhamun's tomb on November 4, 1922, after searching for it for five years, funded by Lord Carnarvon","The tomb contained over 5,000 artifacts, including the iconic solid gold death mask weighing about 24 pounds","Lord Carnarvon died shortly after the tomb was opened, leading newspapers to write about a supposed 'Curse of the Pharaohs'"]},"Hugh Capet":{"desc":"Hugh Capet was the first king of the Capetian dynasty, which ruled France starting in 987 AD. He may not be very well known, but his family became one of the most successful royal dynasties in European history, with his descendants ruling France for over 800 years.","facts":["He was elected King of France in 987 AD after the death of the last Carolingian king, Louis V","The Capetian dynasty he founded ruled France directly until 1328, and its branches (Valois and Bourbon) continued until 1848","He was the Duke of Francia and Count of Paris before becoming king, and he cleverly had his son crowned during his own lifetime to secure the succession"]},"Hugo Chavez":{"desc":"Hugo Chávez was the president of Venezuela from 1999 until his death in 2013. He used Venezuela's oil wealth to fund social programs for the poor, but he was also criticized for limiting freedoms and concentrating too much power in his own hands.","facts":["Chávez first tried to take power in a failed military coup in 1992","He was elected president of Venezuela in 1998","He died of cancer on March 5, 2013"]},"Ivan the Terrible":{"desc":"Ivan the Terrible was the first ruler of Russia to take the title of Tsar, and he ruled from 1547 to 1584. He earned his fearsome nickname because of his violent temper and cruel punishments, but he also expanded Russia's territory and strengthened its government.","facts":["He became the first Tsar of Russia in 1547 at the age of 16","He ordered the construction of St. Basil's Cathedral in Moscow, which was completed in 1561","In a fit of rage in 1581, he struck and killed his own son, Ivan"]},"Ivory Coast":{"desc":"Ivory Coast, officially called Cote d'Ivoire, is a country in West Africa that was a French colony until it gained independence in 1960. It became one of the most prosperous countries in West Africa thanks to its cocoa farming, producing more cocoa beans than any other country in the world.","facts":["Ivory Coast produces about 40% of the world's cocoa, making it the largest cocoa producer on Earth","Felix Houphouet-Boigny was the country's first president, ruling from independence in 1960 until his death in 1993","The Basilica of Our Lady of Peace in Yamoussoukro, completed in 1989, is the largest church in the world by area"]},"James I of England":{"desc":"James I became King of England in 1603 after Queen Elizabeth I died, and he was already King James VI of Scotland, so he united the two crowns. He is well known for authorizing a new English translation of the Bible, called the King James Bible, which is still widely used today.","facts":["He became King James VI of Scotland in 1567 when he was just one year old","He survived the Gunpowder Plot of 1605, when Guy Fawkes and others tried to blow up Parliament","He commissioned the King James Version of the Bible, published in 1611"]},"James K. Polk":{"desc":"James K. Polk was the 11th President of the United States, serving from 1845 to 1849. He is known for greatly expanding the nation's territory, including acquiring California and much of the Southwest through the Mexican-American War.","facts":["He oversaw the addition of more territory to the U.S. than any president since Thomas Jefferson","He is often called the first 'dark horse' presidential candidate because he was not expected to win the 1844 election","He kept his promise to serve only one term and died just three months after leaving office, on June 15, 1849"]},"Jan III Sobieski":{"desc":"Jan III Sobieski was the King of Poland from 1674 to 1696 and is remembered as one of Poland's greatest heroes. He is most famous for leading a massive cavalry charge that helped defeat the Ottoman Turkish army at the Battle of Vienna in 1683, saving the city from conquest.","facts":["He led the largest cavalry charge in history at the Battle of Vienna on September 12, 1683","His winged hussar cavalry helped break the Ottoman siege of Vienna","He ruled as King of Poland and Grand Duke of Lithuania from 1674 to 1696"]},"Johannesburg":{"desc":"Johannesburg is the largest city in South Africa and was founded in 1886 after gold was discovered in the area. The city grew incredibly fast because of the gold rush and became the economic center of South Africa, but it also became a symbol of the injustice of apartheid.","facts":["The city was founded in 1886 following the discovery of gold on the Witwatersrand ridge, sparking the largest gold rush in history","The Witwatersrand gold fields have produced about 40% of all the gold ever mined in the world","Nelson Mandela and other anti-apartheid leaders were tried in Johannesburg's Palace of Justice during the Rivonia Trial in 1963-1964"]},"John III Sobieski":{"desc":"John III Sobieski was the King of Poland from 1674 to 1696, and he is most famous for leading the charge that saved Vienna from a massive Ottoman Turkish siege in 1683. His victory at the Battle of Vienna is considered one of the most important battles in European history.","facts":["He became King of Poland in 1674 after winning fame as a military commander","He led the largest cavalry charge in history at the Battle of Vienna on September 12, 1683","His victory at Vienna stopped the Ottoman Empire from advancing further into Europe"]},"John Macdonald":{"desc":"Sir John A. Macdonald was the first Prime Minister of Canada, serving from 1867 to 1873 and again from 1878 to 1891. He played the biggest role in creating Canada as a united country through Confederation in 1867.","facts":["He became Canada's first Prime Minister on July 1, 1867, the day of Confederation","He served as Prime Minister for a total of about 19 years across two terms","He pushed for the building of the Canadian Pacific Railway to connect Canada from coast to coast"]},"Josip Broz Tito":{"desc":"Josip Broz Tito was the leader of Yugoslavia from 1945 until his death in 1980, and he was famous for keeping the country's many ethnic groups together. He was unusual among communist leaders because he stood up to Soviet leader Joseph Stalin and kept Yugoslavia independent from Soviet control.","facts":["He led the Yugoslav Partisans, one of the most effective resistance movements against the Nazis in World War II","He broke with Stalin and the Soviet Union in 1948, charting an independent path for Yugoslavia","After his death on May 4, 1980, Yugoslavia gradually fell apart and broke into several countries in the 1990s"]},"Juan Peron":{"desc":"Juan Perón was a powerful president of Argentina who served three terms. He and his famous wife Eva (Evita) Perón were beloved by many working-class Argentines because of their social programs, but he also ruled in an authoritarian way.","facts":["Perón served as president of Argentina from 1946 to 1955 and again briefly in 1973-1974","His second wife, Eva Perón (Evita), became a beloved national figure before her death in 1952","He was overthrown by a military coup in 1955 and lived in exile for 18 years"]},"Juan Ponce de León":{"desc":"Juan Ponce de León was a Spanish explorer who became the first European to reach Florida in 1513. He is famous in legends for searching for the Fountain of Youth, a magical spring that was said to make people young again.","facts":["He arrived in Florida in April 1513 and named it 'La Florida' meaning 'Land of Flowers'","He served as the first governor of Puerto Rico starting in 1509","He was wounded by a poisoned arrow during a return trip to Florida in 1521 and died shortly after"]},"Kaiser Wilhelm II":{"desc":"Kaiser Wilhelm II was the last emperor of Germany, ruling from 1888 until he was forced to give up the throne at the end of World War I in 1918. His aggressive foreign policies and military buildup helped set the stage for World War I, one of the deadliest conflicts in history.","facts":["He was the grandson of Britain's Queen Victoria","He dismissed the famous Chancellor Otto von Bismarck in 1890, just two years after becoming Kaiser","He abdicated on November 9, 1918, and fled to the Netherlands, where he lived in exile until his death in 1941"]},"Kim dynasty":{"desc":"The Kim dynasty refers to the family that has ruled North Korea since the country was founded in 1948. Three generations of the Kim family have been supreme leaders, making North Korea the world's only communist country with a hereditary succession of power.","facts":["Kim Il-sung founded North Korea in 1948 and ruled until his death in 1994; he is still officially called the 'Eternal President'","Kim Jong-il succeeded his father and ruled from 1994 to 2011, overseeing North Korea's first nuclear weapons tests","Kim Jong-un took power in 2011 at about age 27, becoming one of the world's youngest heads of state"]},"L'Anse aux Meadows":{"desc":"L'Anse aux Meadows is an archaeological site at the northern tip of the island of Newfoundland in Canada where Norse (Viking) explorers built a settlement around the year 1000 AD. This is the only confirmed Viking settlement in North America and proves that Europeans reached the Americas about 500 years before Christopher Columbus.","facts":["The site was discovered in 1960 by Norwegian explorers Helge and Anne Stine Ingstad","It dates to around 1000 AD, nearly 500 years before Columbus's 1492 voyage","It became a UNESCO World Heritage Site in 1978 and contains the remains of eight Norse buildings including a forge"]},"Lakota":{"desc":"The Lakota are a Native American people who are part of the larger Sioux nation and have lived on the Great Plains for hundreds of years. They were skilled buffalo hunters and fierce warriors who fought to protect their homeland from U.S. expansion.","facts":["Famous Lakota leaders include Sitting Bull, Crazy Horse, and Red Cloud","The Lakota won a major victory at the Battle of the Little Bighorn in 1876","The Wounded Knee Massacre on December 29, 1890, in South Dakota killed around 250-300 Lakota men, women, and children"]},"Library of Alexandria":{"desc":"The Library of Alexandria was the most famous library in the ancient world, located in Alexandria, Egypt. It was founded around 300 BC and tried to collect copies of every book in the world, making it the greatest center of learning and knowledge in ancient times.","facts":["It was founded around 295 BC by Ptolemy I Soter, one of Alexander the Great's generals, and may have contained up to 400,000 scrolls","Scholars at the library included Euclid (who wrote about geometry), Eratosthenes (who calculated the Earth's circumference), and Archimedes","The library was gradually destroyed over several centuries, not in a single dramatic fire, with the final destruction likely occurring around 391 AD"]},"Little Big Horn":{"desc":"The Battle of the Little Bighorn, fought on June 25-26, 1876, in Montana, was a major battle between the U.S. Army and a combined force of Lakota, Northern Cheyenne, and Arapaho warriors. It is also known as 'Custer's Last Stand' because Lieutenant Colonel George Armstrong Custer and all of his men in his immediate command were killed.","facts":["Custer's 7th Cavalry force of about 210 soldiers was wiped out","The Native American forces were led by Sitting Bull and Crazy Horse","It was the worst U.S. Army defeat during the Plains Indian Wars"]},"Lorraine Motel":{"desc":"The Lorraine Motel in Memphis, Tennessee, is the place where civil rights leader Dr. Martin Luther King Jr. was assassinated on April 4, 1968. The motel has been preserved and is now part of the National Civil Rights Museum.","facts":["King was shot while standing on the second-floor balcony of room 306","James Earl Ray was convicted of the assassination and sentenced to 99 years in prison","The National Civil Rights Museum opened at the site on September 28, 1991"]},"Louvre":{"desc":"The Louvre is the world's largest and most visited art museum, located in Paris, France. It was originally built as a fortress in the 12th century, later became a royal palace, and was turned into a public museum during the French Revolution in 1793.","facts":["The Louvre is home to the Mona Lisa by Leonardo da Vinci and the ancient Greek statue Venus de Milo","The museum has about 380,000 objects and displays around 35,000 works of art","The famous glass pyramid entrance was designed by architect I.M. Pei and opened in 1989"]},"Lyndon B. Johnson":{"desc":"Lyndon B. Johnson, often called LBJ, was the 36th President of the United States, serving from 1963 to 1969. He became president after John F. Kennedy was assassinated and is known for his 'Great Society' programs and for signing major civil rights laws.","facts":["He signed the Civil Rights Act of 1964 and the Voting Rights Act of 1965","He was sworn in as president aboard Air Force One just hours after Kennedy's assassination on November 22, 1963","He chose not to run for re-election in 1968, partly because of growing opposition to the Vietnam War"]},"Macbeth":{"desc":"Macbeth was a real King of Scotland who ruled from 1040 to 1057, though he is much more famous as a character in William Shakespeare's play. The real Macbeth killed King Duncan I in battle to take the throne, and he actually ruled Scotland fairly well for 17 years before being defeated himself.","facts":["The real Macbeth ruled Scotland from 1040 to 1057","Shakespeare wrote his play Macbeth around 1606, partly to please King James I, who was interested in Scottish history","Macbeth was killed at the Battle of Lumphanan on August 15, 1057, by forces loyal to Duncan's son Malcolm"]},"Madagascar":{"desc":"Madagascar is the fourth-largest island in the world, located off the southeast coast of Africa in the Indian Ocean. It has been isolated from the mainland for millions of years, so about 90% of its plants and animals, including the famous lemurs, are found nowhere else on Earth.","facts":["The first humans arrived on Madagascar around 350-550 AD, believed to be Austronesian sailors from Southeast Asia, over 3,000 miles away","The island became a unified kingdom under King Andrianampoinimerina and his son Radama I in the early 1800s","Madagascar was a French colony from 1897 until it gained independence on June 26, 1960"]},"Mandate of Heaven":{"desc":"The Mandate of Heaven was an important idea in Chinese history that said the right to rule came from heaven, and that a ruler who was unjust or incompetent would lose that right. This concept was used for thousands of years to explain why dynasties rose and fell in China.","facts":["The concept was first used by the Zhou Dynasty around 1046 BC to justify overthrowing the Shang Dynasty","Natural disasters like floods, famines, and earthquakes were seen as signs that a ruler had lost the Mandate of Heaven","Unlike the European 'divine right of kings,' the Mandate of Heaven could be taken away from a bad ruler and given to someone else"]},"Marie Antoinette":{"desc":"Marie Antoinette was the Queen of France and wife of King Louis XVI during the French Revolution. She became a symbol of royal excess and was deeply unpopular with the French people, and she was eventually executed by guillotine during the Revolution.","facts":["She was born an Austrian princess on November 2, 1755, and married the future Louis XVI at age 14","She was executed by guillotine on October 16, 1793, during the French Revolution","The famous quote 'Let them eat cake' is often attributed to her, but historians believe she never actually said it"]},"Mark Antony":{"desc":"Mark Antony was a powerful Roman general and politician who was a loyal follower of Julius Caesar and later became one of the rulers of the Roman Republic. He is famous for his love affair with Cleopatra, the queen of Egypt, and for his war against Octavian (the future Emperor Augustus) that ended the Roman Republic.","facts":["He gave a famous funeral speech for Julius Caesar in 44 BC that turned the Roman people against Caesar's assassins","He formed the Second Triumvirate with Octavian and Lepidus in 43 BC to rule the Roman Republic","He and Cleopatra were defeated by Octavian at the Battle of Actium in 31 BC, and both committed suicide in 30 BC"]},"Mary Cassatt":{"desc":"Mary Cassatt was an American artist who lived and worked in Paris, France, and became one of the few women in the Impressionist art movement. She was especially known for her tender paintings and pastels of mothers and children, and she helped bring Impressionist art to American collectors.","facts":["She was born on May 22, 1844, in Allegheny City, Pennsylvania","She was invited to exhibit with the French Impressionists by Edgar Degas in 1877","She helped her American friends, including the Havemeyers, build major art collections that were later donated to the Metropolitan Museum of Art"]},"Mayor of the Palace":{"desc":"The Mayor of the Palace was originally a household manager for the Frankish kings but over time became the real power behind the throne. The most famous Mayors of the Palace were the Carolingian family, who eventually overthrew the weak Merovingian kings and took the crown for themselves.","facts":["Charles Martel, a Mayor of the Palace, defeated a Muslim army at the Battle of Tours in 732, stopping the Islamic expansion into Western Europe","Pepin the Short, son of Charles Martel, became the first Carolingian king in 751 by deposing the last Merovingian king","The position existed in the Frankish kingdoms from the 6th to 8th centuries, and the later Merovingian kings were so powerless they were called 'do-nothing kings'"]},"Menelik II":{"desc":"Menelik II was the Emperor of Ethiopia from 1889 to 1913 and is best known for defeating an Italian invasion at the Battle of Adwa in 1896. This victory made Ethiopia one of the only African countries to successfully resist European colonization during the Scramble for Africa.","facts":["He defeated the Italian army at the Battle of Adwa on March 1, 1896, with a force of about 100,000 Ethiopian soldiers","He modernized Ethiopia by introducing electricity, telephones, railways, and a postal system","He founded Addis Ababa as his capital in 1886, and it remains the capital of Ethiopia today"]},"Milton Friedman":{"desc":"Milton Friedman was an American economist who believed strongly in free markets and limited government involvement in the economy. His ideas were very influential in the 20th century and shaped economic policies in the United States, the United Kingdom, and many other countries.","facts":["He won the Nobel Prize in Economics in 1976","He was a professor at the University of Chicago for 30 years, from 1946 to 1976","His ideas influenced British Prime Minister Margaret Thatcher and U.S. President Ronald Reagan"]},"Moai":{"desc":"Moai are the giant stone statues found on Easter Island (Rapa Nui) in the Pacific Ocean, which belongs to Chile. The Rapa Nui people carved nearly 900 of these huge figures between about 1250 and 1500 AD to honor their ancestors.","facts":["There are 887 known moai statues on Easter Island","The largest moai ever erected is about 33 feet tall and weighs around 82 tons","The statues were carved from volcanic rock at the Rano Raraku quarry"]},"Mobutu Sese Seko":{"desc":"Mobutu Sese Seko was the dictator of the Democratic Republic of the Congo (which he renamed Zaire) for 32 years, from 1965 to 1997. He came to power in a military coup and became one of Africa's most corrupt leaders, stealing billions of dollars from his own country while his people lived in poverty.","facts":["He seized power in a CIA-backed coup in 1965 and renamed the country Zaire in 1971","He is estimated to have stolen between $4 and $5 billion from Zaire, equivalent to the country's entire national debt","He was overthrown by rebel leader Laurent-Desire Kabila in 1997 and died in exile in Morocco four months later"]},"Mount Vesuvius":{"desc":"Mount Vesuvius is a volcano near Naples, Italy, that is most famous for its eruption in 79 AD, which buried the Roman cities of Pompeii and Herculaneum under volcanic ash and rock. It is one of the most dangerous volcanoes in the world because about three million people live near it today.","facts":["The 79 AD eruption killed an estimated 16,000 people and buried Pompeii under about 20 feet of volcanic ash","The eruption was described in detail by Pliny the Younger, whose uncle Pliny the Elder died trying to rescue people","Vesuvius has erupted more than 50 times since 79 AD, with the most recent eruption occurring in 1944 during World War II"]},"Muammar Gaddafi":{"desc":"Muammar Gaddafi was the leader of Libya for 42 years, from 1969 to 2011, making him one of the longest-ruling non-royal leaders in history. He took power in a military coup at age 27 and ruled Libya with an unusual political system he described in his 'Green Book' until he was overthrown and killed during the Arab Spring.","facts":["He seized power from King Idris in a bloodless military coup on September 1, 1969, when he was just 27 years old","He was linked to the bombing of Pan Am Flight 103 over Lockerbie, Scotland, in 1988, which killed 270 people","He was captured and killed by rebel fighters on October 20, 2011, during the Libyan Civil War that was part of the Arab Spring"]},"Muhammad Yunus":{"desc":"Muhammad Yunus is a Bangladeshi economist who invented the idea of microcredit, which means giving very small loans to poor people so they can start businesses. His work has helped millions of people around the world escape poverty, and he won the Nobel Peace Prize in 2006.","facts":["He won the Nobel Peace Prize in 2006, shared with the Grameen Bank he founded","He started microlending in 1976 by personally lending $27 to 42 women in a village in Bangladesh","He has been called the 'banker to the poor' and his ideas have spread to more than 100 countries"]},"Musket Wars":{"desc":"The Musket Wars were a series of battles fought between Maori tribes in New Zealand from about 1807 to 1845, after some tribes got muskets (guns) from European traders. Tribes with muskets attacked tribes that did not have them, causing huge changes in where different Maori groups lived across New Zealand.","facts":["An estimated 20,000 to 40,000 Maori were killed during the Musket Wars","The northern Ngapuhi tribe, led by chief Hongi Hika, was among the first to acquire large numbers of muskets from European traders","The wars caused massive migrations as defeated tribes were forced to move to new territories across New Zealand"]},"Nancy Reagan":{"desc":"Nancy Reagan was the First Lady of the United States from 1981 to 1989, married to President Ronald Reagan. She is best known for her 'Just Say No' anti-drug campaign aimed at young people.","facts":["She was born on July 6, 1921, in New York City, and her birth name was Anne Frances Robbins","Before entering politics, she was a Hollywood actress in the 1940s and 1950s","She passed away on March 6, 2016, at age 94"]},"Neville Chamberlain":{"desc":"Neville Chamberlain was the British Prime Minister who is best remembered for his policy of appeasement toward Adolf Hitler before World War II. He signed the Munich Agreement in 1938, allowing Germany to take part of Czechoslovakia, and famously declared it meant 'peace for our time,' but war broke out less than a year later.","facts":["He served as Prime Minister of the United Kingdom from 1937 to 1940","He signed the Munich Agreement on September 30, 1938, giving Hitler the Sudetenland region of Czechoslovakia","He resigned as Prime Minister on May 10, 1940, and was replaced by Winston Churchill"]},"Ninety-five Theses":{"desc":"The Ninety-five Theses were a list of arguments written by Martin Luther in 1517 that criticized the Catholic Church for selling indulgences (pardons for sins). This document helped start the Protestant Reformation, which changed Christianity and European history forever.","facts":["Martin Luther posted the Ninety-five Theses on October 31, 1517, in Wittenberg, Germany","The main complaint was about the sale of indulgences, especially by a friar named Johann Tetzel","The Theses helped spark the Protestant Reformation, leading to new Christian denominations like Lutheranism"]},"Nineveh":{"desc":"Nineveh was the great capital of the ancient Assyrian Empire, located on the banks of the Tigris River in what is now Mosul, Iraq. At its peak it was one of the largest and most magnificent cities in the entire ancient world, but it was completely destroyed in 612 BC.","facts":["King Sennacherib made Nineveh the Assyrian capital around 705 BC and built a massive palace with over 70 rooms","The city walls were about 7.5 miles (12 km) long with 15 gates, and the city may have had a population of over 100,000","King Ashurbanipal's library at Nineveh contained over 30,000 clay tablets, including the Epic of Gilgamesh, one of the oldest known works of literature"]},"Osama bin Laden":{"desc":"Osama bin Laden was the founder and leader of al-Qaeda, the terrorist organization responsible for the September 11, 2001, attacks on the United States that killed nearly 3,000 people. He was one of the most wanted fugitives in the world for nearly a decade.","facts":["He was born in 1957 in Riyadh, Saudi Arabia, to a wealthy family","He was found and killed by U.S. Navy SEALs in a raid on his compound in Abbottabad, Pakistan, on May 2, 2011","The operation to find and eliminate him was code-named Operation Neptune Spear"]},"Parliament Act of 1911":{"desc":"The Parliament Act of 1911 was an important British law that greatly reduced the power of the House of Lords, the unelected upper chamber of Parliament. It meant that the elected House of Commons would have the final say on laws, especially about money and taxes.","facts":["It removed the House of Lords' power to veto money bills entirely","It limited the Lords' ability to delay other bills to a maximum of two years (later reduced to one year in 1949)","It also reduced the maximum length of a Parliament from seven years to five years"]},"Parson Weems":{"desc":"Mason Locke Weems, known as Parson Weems, was an American author and book seller who wrote a famous biography of George Washington shortly after Washington's death. He is best known for inventing the story of young George Washington chopping down a cherry tree.","facts":["His book, The Life of Washington, was first published in 1800","The famous cherry tree story first appeared in the fifth edition of his book in 1806","He was called 'Parson' because he was an ordained minister of the Episcopal Church"]},"Parthenon":{"desc":"The Parthenon is a famous ancient Greek temple built on top of the Acropolis hill in Athens, dedicated to the goddess Athena. It was built between 447 and 432 BC and is considered one of the greatest examples of ancient Greek architecture ever created.","facts":["It was built between 447 and 432 BC under the leadership of Pericles, with architects Ictinus and Callicrates","The original Parthenon contained a 40-foot-tall gold and ivory statue of Athena created by the sculptor Phidias","Many of the Parthenon's marble sculptures, known as the Elgin Marbles, were removed by Lord Elgin in the early 1800s and are now in the British Museum"]},"Petticoat Affair":{"desc":"The Petticoat Affair was a scandal during President Andrew Jackson's administration in 1829-1831 involving Peggy Eaton, the wife of Secretary of War John Eaton. The wives of other Cabinet members refused to socialize with Peggy because of rumors about her past, which caused a big political conflict.","facts":["The scandal led to the resignation of nearly the entire Cabinet in 1831","Vice President John C. Calhoun's wife was one of the leaders of the social snubbing against Peggy Eaton","Secretary of State Martin Van Buren supported the Eatons, which helped him gain Jackson's favor and eventually become vice president and then president"]},"Philip II":{"desc":"Philip II was the King of Macedon from 359 to 336 BC and the father of Alexander the Great. He transformed Macedonia from a weak kingdom into the most powerful military force in Greece, conquering most of the Greek city-states and laying the groundwork for his son's vast empire.","facts":["He created the Macedonian phalanx, a powerful military formation using long spears called sarissas that were 18-20 feet long","He defeated the Greek city-states at the Battle of Chaeronea in 338 BC, gaining control over most of Greece","He was assassinated in 336 BC by one of his own bodyguards, Pausanias, at his daughter's wedding"]},"Pizarro":{"desc":"Francisco Pizarro was a Spanish conquistador who conquered the Inca Empire in South America in the 1530s. With only about 168 men, he captured the Inca emperor Atahualpa and took control of one of the largest empires in the world.","facts":["Pizarro captured the Inca emperor Atahualpa at the Battle of Cajamarca in 1532","He founded the city of Lima, Peru, in 1535","He was assassinated by rivals in Lima on June 26, 1541"]},"Plymouth Colony":{"desc":"Plymouth Colony was founded in 1620 by English settlers known as the Pilgrims, who sailed across the Atlantic Ocean on the Mayflower. It was one of the earliest successful English settlements in North America, located in present-day Massachusetts.","facts":["The Pilgrims signed the Mayflower Compact before landing, which was an early form of self-government","The first Thanksgiving was celebrated in the fall of 1621 between the Pilgrims and the Wampanoag people","Plymouth Colony merged with the Massachusetts Bay Colony in 1691"]},"Pocahontas":{"desc":"Pocahontas was a Native American woman of the Powhatan nation who played an important role in the early days of the English settlement at Jamestown, Virginia. She is famous for her connection to Captain John Smith and for helping maintain peace between her people and the English colonists.","facts":["Her real name was Amonute, and Pocahontas was a childhood nickname meaning 'playful one'","She married English colonist John Rolfe in 1614, which helped create a period of peace between the colonists and the Powhatan","She traveled to England in 1616 but died there in March 1617 at about age 21"]},"Politburo":{"desc":"The Politburo was the top decision-making group in the Communist Party of the Soviet Union and the most powerful political body in the country. Its small group of members, usually around 10 to 15 people, made all the major decisions about running the Soviet Union.","facts":["The Politburo was first created in 1917 during the Russian Revolution","Famous Politburo members included Joseph Stalin, Nikita Khrushchev, and Leonid Brezhnev","The Politburo was dissolved in 1991 when the Soviet Union collapsed"]},"Polyphemus":{"desc":"Polyphemus is a famous one-eyed giant called a Cyclops from Greek mythology, most well-known from Homer's epic poem the Odyssey. In the story, he trapped the hero Odysseus and his men in his cave and ate several of them before Odysseus came up with a clever plan to escape.","facts":["In the Odyssey, Odysseus blinded Polyphemus by driving a sharpened wooden stake into his single eye","Odysseus told Polyphemus his name was 'Nobody,' so when Polyphemus cried for help, the other Cyclopes thought nobody was hurting him","Polyphemus was the son of Poseidon, god of the sea, and Poseidon punished Odysseus for blinding his son by making his journey home take 10 years"]},"Pompeii":{"desc":"Pompeii was an ancient Roman city near Naples, Italy, that was buried under volcanic ash when Mount Vesuvius erupted in 79 AD. The ash preserved the city almost perfectly for nearly 1,700 years, giving us an amazing snapshot of what daily life was like in the Roman Empire.","facts":["The city was rediscovered in 1748 and has been one of the most important archaeological sites in the world ever since","About 2,000 people died in Pompeii, many preserved as plaster casts showing their final moments","The preserved city includes homes, shops, baths, theaters, and even graffiti, giving historians an incredibly detailed look at Roman life"]},"Princess Diana":{"desc":"Princess Diana was a member of the British royal family who married Prince Charles in 1981 and became one of the most famous and beloved people in the world. She was known for her charity work, especially with children and people affected by AIDS and landmines, and her tragic death in 1997 shocked the world.","facts":["She married Prince Charles on July 29, 1981, in a ceremony watched by 750 million TV viewers worldwide","She died in a car crash in Paris on August 31, 1997, at the age of 36","She was the mother of Prince William and Prince Harry"]},"Prussia":{"desc":"Prussia was a powerful German kingdom that played the leading role in unifying the many German states into one country, the German Empire, in 1871. For centuries, Prussia was known for its strong military and disciplined government, and it dominated German politics until it was dissolved after World War II.","facts":["Otto von Bismarck, the Prussian Prime Minister, unified Germany in 1871 and became its first Chancellor","Prussia's capital was Berlin, which also became the capital of the German Empire","Prussia was officially dissolved by the Allied powers in 1947 after World War II"]},"Quiet Revolution":{"desc":"The Quiet Revolution was a period of rapid social and political change in the Canadian province of Quebec during the 1960s. French-speaking Quebecers modernized their society, reduced the Catholic Church's influence, and pushed for more recognition of French Canadian culture and language.","facts":["It began around 1960 when the Quebec Liberal Party under Jean Lesage won the provincial election","The Quebec government took control of education and he
