const TOPIC_DESCS = {"Somalia":{"desc":"Somalia is a country located on the Horn of Africa, along the eastern coast of the continent. It has faced decades of civil war and instability since the collapse of its central government in 1991. Somalia was an important trading center in ancient times, known to the Egyptians as the 'Land of Punt,' and it was colonized by both Italy and Britain before gaining independence in 1960.","facts":["Located on the Horn of Africa with the longest coastline on the African mainland","Ancient Somalis traded with Egypt, Rome, and China","Gained independence in 1960 by uniting British and Italian Somaliland","Civil war began in 1991 after the overthrow of dictator Siad Barre","The capital city is Mogadishu"]},"Battle of Waterloo":{"desc":"The Battle of Waterloo was fought on June 18, 1815, in present-day Belgium. It was the final defeat of Napoleon Bonaparte by British and Prussian forces led by the Duke of Wellington and Gebhard von Blucher. This battle ended the Napoleonic Wars and Napoleon was exiled to the island of Saint Helena, where he died in 1821.","facts":["Fought on June 18, 1815 near Brussels, Belgium","Napoleon faced the Duke of Wellington (British) and Blucher (Prussian)","Napoleon's last major battle before his final exile","The word 'Waterloo' now means a decisive defeat","Led to the Congress of Vienna reshaping Europe"]},"Mansa Musa":{"desc":"Mansa Musa was the emperor of the Mali Empire in West Africa during the 14th century. He is often considered the wealthiest person in history. His famous pilgrimage to Mecca in 1324 was so lavish that he gave away so much gold it crashed the economy of Egypt for years.","facts":["Ruled the Mali Empire from about 1312 to 1337","Often called the richest person who ever lived","His 1324 pilgrimage to Mecca included 60,000 people and 80 camels carrying gold","He gave away so much gold in Cairo that it caused inflation for over a decade","Built the famous Djinguereber Mosque in Timbuktu"]},"Philippines":{"desc":"The Philippines is an archipelago of over 7,000 islands in Southeast Asia. It was colonized by Spain for over 300 years starting in 1565, then by the United States after the Spanish-American War of 1898. The country gained full independence in 1946 and is named after King Philip II of Spain.","facts":["An archipelago of over 7,600 islands in Southeast Asia","Named after King Philip II of Spain","Colonized by Spain (1565-1898) then the United States (1898-1946)","Ferdinand Magellan arrived in 1521 and was killed there by chief Lapu-Lapu","Gained full independence from the U.S. on July 4, 1946"]},"Henry VIII":{"desc":"Henry VIII was King of England from 1509 to 1547 and is one of the most famous monarchs in English history. He is best known for having six wives and for breaking away from the Catholic Church to create the Church of England so he could divorce his first wife, Catherine of Aragon. His reign transformed England's religion, politics, and culture forever.","facts":["King of England from 1509 to 1547","Had six wives: Catherine of Aragon, Anne Boleyn, Jane Seymour, Anne of Cleves, Catherine Howard, Catherine Parr","Created the Church of England after the Pope refused to annul his first marriage","Father of Queen Elizabeth I (by Anne Boleyn) and King Edward VI (by Jane Seymour)","Was part of the Tudor dynasty"]},"Mexico City":{"desc":"Mexico City is the capital of Mexico and one of the largest cities in the world. It was built on the ruins of Tenochtitlan, the capital of the Aztec Empire, which was conquered by Spanish conquistador Hernan Cortes in 1521. The city sits in the Valley of Mexico at over 7,000 feet above sea level and has been an important cultural and political center for centuries.","facts":["Built on the ruins of the Aztec capital Tenochtitlan","Conquered by Hernan Cortes and the Spanish in 1521","One of the oldest continuously inhabited cities in the Americas","Sits at over 7,000 feet elevation in the Valley of Mexico","Today it is one of the most populated cities in the world"]},"Martin Luther":{"desc":"Martin Luther was a German monk and professor who started the Protestant Reformation in 1517. He nailed his famous Ninety-Five Theses to the door of a church in Wittenberg, Germany, protesting the Catholic Church's sale of indulgences. His actions split Christianity in Western Europe and led to the creation of Protestant churches.","facts":["Posted his Ninety-Five Theses in Wittenberg in 1517","Protested the Catholic Church's sale of indulgences (paying money for forgiveness of sins)","Was excommunicated by Pope Leo X in 1521","Translated the Bible into German so ordinary people could read it","Started the Protestant Reformation, one of the biggest events in European history"]},"Thomas Jefferson":{"desc":"Thomas Jefferson was the third President of the United States and the primary author of the Declaration of Independence. He served as president from 1801 to 1809 and doubled the size of the country through the Louisiana Purchase in 1803. He was also a skilled architect who designed his home Monticello and founded the University of Virginia.","facts":["Third President of the United States (1801-1809)","Primary author of the Declaration of Independence in 1776","Completed the Louisiana Purchase in 1803, doubling the nation's size","Founded the University of Virginia","Designed his famous home, Monticello, in Virginia"]},"George Washington":{"desc":"George Washington was the first President of the United States, serving from 1789 to 1797. He led the Continental Army to victory against Britain in the American Revolution and is often called the 'Father of His Country.' He set many important precedents, including the tradition of serving only two terms as president.","facts":["First President of the United States (1789-1797)","Commander-in-Chief of the Continental Army during the American Revolution","Presided over the Constitutional Convention in 1787","Famous for crossing the Delaware River on Christmas night 1776","Voluntarily stepped down after two terms, setting a lasting tradition"]},"Watergate scandal":{"desc":"The Watergate scandal was a major political crisis in the United States in the early 1970s. It began when burglars connected to President Richard Nixon's re-election campaign were caught breaking into the Democratic National Committee headquarters at the Watergate hotel complex in Washington, D.C. Nixon's attempts to cover up his involvement led to his resignation on August 9, 1974, making him the only U.S. president to resign from office.","facts":["Burglars broke into the DNC headquarters at the Watergate complex on June 17, 1972","President Nixon tried to cover up his administration's involvement","The scandal was uncovered by Washington Post reporters Bob Woodward and Carl Bernstein","Nixon resigned on August 9, 1974 to avoid impeachment","The suffix '-gate' is now used for any major political scandal"]},"Inca Empire":{"desc":"The Inca Empire was the largest empire in pre-Columbian South America, stretching along the western coast from present-day Colombia to Chile. Its capital was Cusco in modern-day Peru. The empire was conquered by Spanish conquistador Francisco Pizarro in 1533, who captured and executed the Inca emperor Atahualpa.","facts":["Largest empire in pre-Columbian Americas, stretching over 2,500 miles","Capital was Cusco in modern-day Peru","Built Machu Picchu, a famous mountain-top city","Used a system of knotted strings called quipu for record-keeping instead of writing","Conquered by Francisco Pizarro and the Spanish in 1533"]},"Trail of Tears":{"desc":"The Trail of Tears refers to the forced relocation of Native American nations from their homelands in the southeastern United States to Indian Territory (present-day Oklahoma) in the 1830s. The Indian Removal Act of 1830, signed by President Andrew Jackson, authorized the government to force these removals. Thousands of Cherokee, Chickasaw, Choctaw, Creek, and Seminole people died from disease, starvation, and exposure during the journey.","facts":["Forced relocation of Native Americans from southeastern U.S. to Oklahoma in the 1830s","Authorized by the Indian Removal Act of 1830 signed by President Andrew Jackson","The Cherokee Nation's removal in 1838 is the most well-known march","Approximately 4,000 Cherokee died during the journey","Five major tribes were relocated: Cherokee, Chickasaw, Choctaw, Creek, and Seminole"]},"Alexander Hamilton":{"desc":"Alexander Hamilton was one of America's Founding Fathers and the first Secretary of the Treasury. He was born in the Caribbean and came to the American colonies as a teenager, eventually becoming George Washington's right-hand man during the Revolution. He created the national banking system and was killed in a famous duel with Vice President Aaron Burr in 1804.","facts":["First Secretary of the Treasury of the United States","Born in the Caribbean island of Nevis","Created the First Bank of the United States and the U.S. financial system","Wrote most of the Federalist Papers defending the Constitution","Killed in a duel by Vice President Aaron Burr on July 11, 1804"]},"Ashoka":{"desc":"Ashoka the Great was an emperor of the Maurya Dynasty in ancient India who ruled from about 268 to 232 BCE. After a bloody conquest of the Kalinga region, he was so horrified by the suffering he caused that he converted to Buddhism and became one of its greatest supporters. He spread Buddhist teachings across Asia and erected stone pillars with moral edicts throughout his empire.","facts":["Emperor of the Maurya Dynasty in ancient India (c. 268-232 BCE)","Conquered the Kalinga region in a very bloody war that killed over 100,000 people","Converted to Buddhism after feeling remorse for the violence he caused","Erected stone pillars with moral edicts throughout his empire","His lion capital pillar is now the national emblem of modern India"]},"Benjamin Franklin":{"desc":"Benjamin Franklin was one of the most famous American Founding Fathers, known as a scientist, inventor, writer, and diplomat. He proved that lightning was electricity with his famous kite experiment and invented the lightning rod, bifocal glasses, and the Franklin stove. He helped draft the Declaration of Independence and secured crucial French support for the American Revolution.","facts":["One of the key Founding Fathers of the United States","Proved lightning was electricity with his famous kite experiment","Invented the lightning rod, bifocal glasses, and the Franklin stove","Served as ambassador to France and helped secure French alliance during the Revolution","His face appears on the U.S. hundred-dollar bill"]},"Harriet Tubman":{"desc":"Harriet Tubman was an escaped enslaved person who became one of the most famous conductors on the Underground Railroad. She made approximately 13 trips back to the South and helped rescue about 70 enslaved people, including her own parents. During the Civil War, she served as a spy and scout for the Union Army, becoming the first woman to lead an armed raid in the war.","facts":["Escaped slavery in Maryland in 1849","Made about 13 trips on the Underground Railroad and rescued about 70 people","Known as 'Moses' for leading people to freedom","Served as a spy and scout for the Union Army during the Civil War","Led the Combahee River Raid in 1863, freeing over 700 enslaved people"]},"Marco Polo":{"desc":"Marco Polo was a Venetian merchant and explorer who traveled from Italy to China along the Silk Road in the 13th century. He spent about 17 years in the court of Kublai Khan, the Mongol emperor of China. His book, 'The Travels of Marco Polo,' introduced Europeans to Central Asia and China and inspired future explorers including Christopher Columbus.","facts":["Venetian merchant who traveled to China in the 13th century","Spent about 17 years at the court of Kublai Khan","Traveled along the Silk Road with his father and uncle","His book 'The Travels of Marco Polo' described the wonders of Asia to Europeans","His accounts inspired Christopher Columbus and other later explorers"]},"Ming dynasty":{"desc":"The Ming dynasty ruled China from 1368 to 1644 and is known for its cultural achievements and powerful centralized government. It was founded by Zhu Yuanzhang, a peasant who overthrew the Mongol-led Yuan dynasty. The Ming dynasty built the Forbidden City in Beijing, expanded the Great Wall of China, and sent Admiral Zheng He on enormous naval voyages across the Indian Ocean.","facts":["Ruled China from 1368 to 1644","Founded by Zhu Yuanzhang (Emperor Hongwu) after overthrowing the Mongol Yuan dynasty","Built the Forbidden City in Beijing as the imperial palace","Expanded and strengthened the Great Wall of China","Admiral Zheng He led massive naval expeditions across the Indian Ocean"]},"Ukraine":{"desc":"In February 2022, Russia invaded Ukraine in the largest military attack in Europe since World War II. The war has caused massive destruction and millions of Ukrainian refugees. Ukrainian President Volodymyr Zelenskyy has led his country's defense and become an internationally recognized figure. The war is still ongoing as of 2026 and has affected global food and energy supplies.","facts":["Ukraine declared independence from the Soviet Union in 1991","Russia had previously annexed Crimea from Ukraine in 2014","Zelenskyy was a comedian and actor before becoming president in 2019","The war disrupted grain exports, since Ukraine is one of the world's largest wheat producers","Many countries imposed economic sanctions on Russia in response to the invasion"]},"Cambodia":{"desc":"Cambodia is a Southeast Asian country known for the ancient Khmer Empire and the temple complex of Angkor Wat. In the 1970s, the Khmer Rouge regime led by Pol Pot carried out a genocide that killed nearly 2 million people. The country has been rebuilding since the regime fell in 1979.","facts":["Home to Angkor Wat, the largest religious monument in the world","The Khmer Empire ruled much of Southeast Asia from the 9th to 15th centuries","The Khmer Rouge under Pol Pot killed nearly 2 million people in the 1970s","Capital city is Phnom Penh"]},"Cyrus the Great":{"desc":"Cyrus the Great founded the Achaemenid Persian Empire in the 6th century BCE, creating the largest empire the world had ever seen at that time. He conquered Babylon in 539 BCE and freed the Jewish people from captivity. He is remembered for his respect for the customs and religions of the people he conquered.","facts":["Founded the Achaemenid (Persian) Empire around 550 BCE","Conquered the Babylonian Empire in 539 BCE","Freed the Jewish people from their Babylonian captivity","Created the Cyrus Cylinder, sometimes called the first declaration of human rights","His empire stretched from modern Turkey to India"]},"Spanish-American War":{"desc":"The Spanish-American War was fought in 1898 between the United States and Spain. The war began after the mysterious sinking of the USS Maine in Havana Harbor and the rallying cry 'Remember the Maine!' The U.S. won quickly, gaining control of Cuba, Puerto Rico, Guam, and the Philippines.","facts":["Fought in 1898 between the U.S. and Spain","Triggered by the sinking of the USS Maine in Havana Harbor","Yellow journalism by Hearst and Pulitzer helped push the U.S. into war","The U.S. gained Puerto Rico, Guam, and the Philippines","Made the U.S. a world power with overseas territories"]},"Alexander the Great":{"desc":"Alexander the Great was king of Macedonia who created one of the largest empires in ancient history by the age of 30. He was tutored by the philosopher Aristotle and never lost a battle. His empire stretched from Greece to northwestern India before he died in Babylon in 323 BCE at just 32 years old.","facts":["King of Macedonia who conquered much of the known world by age 30","Tutored by the philosopher Aristotle as a young man","Never lost a single battle in his military career","His empire stretched from Greece to Egypt to India","Died in Babylon in 323 BCE at age 32"]},"Angkor Wat":{"desc":"Angkor Wat is a massive temple complex in Cambodia and the largest religious monument in the world. It was built in the early 12th century by King Suryavarman II as a Hindu temple dedicated to the god Vishnu, and later became a Buddhist temple. The complex covers over 400 acres.","facts":["Largest religious monument in the world, covering over 400 acres","Built in the early 12th century by King Suryavarman II","Originally a Hindu temple, later converted to Buddhism","Located near Siem Reap, Cambodia","Appears on Cambodia's national flag"]},"North Korea":{"desc":"North Korea, officially the Democratic People's Republic of Korea, was established in 1948 after the Korean Peninsula was divided. It has been ruled by the Kim family dynasty since its founding by Kim Il-sung. The Korean War (1950-1953) was fought when North Korea invaded South Korea, and the two countries remain technically at war today.","facts":["Established in 1948 after the division of the Korean Peninsula","Ruled by the Kim family: Kim Il-sung, Kim Jong-il, and Kim Jong-un","Invaded South Korea in 1950, starting the Korean War","One of the most isolated and secretive countries in the world","The DMZ (Demilitarized Zone) separates North and South Korea"]},"Sparta":{"desc":"Sparta was an ancient Greek city-state known for its powerful military and strict warrior culture. Boys were taken from their families at age 7 to begin military training in a system called the agoge. Sparta's soldiers were famous for their bravery, especially the 300 Spartans who fought at the Battle of Thermopylae against the Persian Empire.","facts":["Ancient Greek city-state famous for its military culture","Boys began military training at age 7 in a system called the agoge","300 Spartans famously defended the pass at Thermopylae against Persia","Fought and won the Peloponnesian War against Athens","Had two kings ruling at the same time"]},"Winston Churchill":{"desc":"Winston Churchill was the Prime Minister of the United Kingdom during most of World War II, from 1940 to 1945. His powerful speeches inspired the British people to keep fighting against Nazi Germany even when things looked hopeless. He won the Nobel Prize in Literature in 1953 and is considered one of the greatest wartime leaders in history.","facts":["Prime Minister of the UK during World War II (1940-1945)","Famous for inspiring speeches like 'We shall fight on the beaches'","Led Britain through the Blitz and the war against Nazi Germany","Won the Nobel Prize in Literature in 1953","Served as PM again from 1951 to 1955"]},"Aztec Empire":{"desc":"The Aztec Empire was a powerful civilization in central Mexico that flourished from the 14th to 16th centuries. Their capital, Tenochtitlan, was built on an island in Lake Texcoco and was one of the largest cities in the world at the time. The empire was conquered by Spanish conquistador Hernan Cortes in 1521.","facts":["Powerful civilization in central Mexico from the 14th to 16th centuries","Capital Tenochtitlan was built on an island in Lake Texcoco","Practiced human sacrifice as part of their religion","Conquered by Hernan Cortes and the Spanish in 1521","Modern Mexico City is built on the ruins of Tenochtitlan"]},"Forbidden City":{"desc":"The Forbidden City is a massive palace complex in the center of Beijing, China, that served as the home of Chinese emperors for nearly 500 years. It was built during the Ming dynasty between 1406 and 1420 and contains 980 buildings. It is called 'Forbidden' because common people were not allowed to enter.","facts":["Imperial palace in Beijing used for nearly 500 years (1420-1912)","Built during the Ming dynasty between 1406 and 1420","Contains 980 buildings and covers 180 acres","Called 'Forbidden' because commoners could not enter","Now a museum and UNESCO World Heritage Site"]},"Hernan Cortes":{"desc":"Hernan Cortes was a Spanish conquistador who led the expedition that caused the fall of the Aztec Empire in 1521. He landed on the coast of Mexico in 1519 with about 600 men and formed alliances with native peoples who were enemies of the Aztecs. He captured the Aztec emperor Montezuma II and eventually destroyed the capital of Tenochtitlan.","facts":["Spanish conquistador who conquered the Aztec Empire","Landed in Mexico in 1519 with about 600 soldiers","Allied with native groups who opposed the Aztecs","Captured Aztec emperor Montezuma II","Destroyed Tenochtitlan in 1521 and built Mexico City on its ruins"]},"Idi Amin":{"desc":"Idi Amin was a military dictator who ruled Uganda from 1971 to 1979. His regime was known for extreme brutality, with an estimated 100,000 to 500,000 people killed during his rule. He expelled all South Asians from Uganda in 1972 and was finally overthrown when Tanzania invaded in 1979.","facts":["Military dictator of Uganda from 1971 to 1979","Seized power in a military coup against Milton Obote","Between 100,000 and 500,000 people were killed during his rule","Expelled 80,000 South Asians from Uganda in 1972","Overthrown after a war with Tanzania in 1979"]},"March on Washington":{"desc":"The March on Washington for Jobs and Freedom was a massive civil rights demonstration held on August 28, 1963. Over 250,000 people gathered at the Lincoln Memorial in Washington, D.C., where Martin Luther King Jr. delivered his famous 'I Have a Dream' speech. The march helped lead to the passage of the Civil Rights Act of 1964.","facts":["Held on August 28, 1963 in Washington, D.C.","Over 250,000 people attended the peaceful demonstration","Martin Luther King Jr. delivered his 'I Have a Dream' speech","Organized by civil rights leaders including A. Philip Randolph and Bayard Rustin","Helped lead to the passage of the Civil Rights Act of 1964"]},"Monroe Doctrine":{"desc":"The Monroe Doctrine was a U.S. foreign policy statement made by President James Monroe in 1823. It declared that the Western Hemisphere was closed to further European colonization and that any attempt by European powers to interfere in the Americas would be considered a hostile act. It became a cornerstone of American foreign policy for over a century.","facts":["Announced by President James Monroe in 1823","Warned European powers against further colonization in the Americas","Stated that the U.S. would stay out of European affairs in return","Became a key principle of U.S. foreign policy for over 100 years","Later expanded by Theodore Roosevelt with his 'Roosevelt Corollary'"]},"Monticello":{"desc":"Monticello was the plantation home of Thomas Jefferson, located near Charlottesville, Virginia. Jefferson designed the building himself in a neoclassical style and spent over 40 years building and renovating it. It is now a UNESCO World Heritage Site and a museum dedicated to Jefferson's life and legacy.","facts":["Plantation home of Thomas Jefferson near Charlottesville, Virginia","Designed by Jefferson himself in neoclassical architectural style","Construction and renovation spanned over 40 years","Named from the Italian word for 'little mountain'","Now a UNESCO World Heritage Site and popular museum"]},"Sikhism":{"desc":"Sikhism is a religion founded in the Punjab region of South Asia in the late 15th century by Guru Nanak. It is the world's fifth-largest religion, with over 25 million followers called Sikhs. Sikhs believe in one God, equality of all people, and service to others. Their holy book is called the Guru Granth Sahib.","facts":["Founded by Guru Nanak in the Punjab region in the late 1400s","World's fifth-largest religion with over 25 million followers","Believes in one God, equality, and service to others","The holy book is called the Guru Granth Sahib","The Golden Temple in Amritsar is their holiest site"]},"Tenochtitlan":{"desc":"Tenochtitlan was the capital city of the Aztec Empire, built on an island in Lake Texcoco in the Valley of Mexico. At its height, it had a population of over 200,000 people, making it one of the largest cities in the world. It was conquered and destroyed by Hernan Cortes and the Spanish in 1521, and Mexico City was built on its ruins.","facts":["Capital of the Aztec Empire, built on an island in Lake Texcoco","Population of over 200,000 at its peak","Connected to the mainland by causeways","Had a grand market at Tlatelolco and massive pyramid-temples","Destroyed by Spanish conquistadors in 1521; Mexico City built on its ruins"]},"Battle of New Orleans":{"desc":"The Battle of New Orleans was fought on January 8, 1815, and was the final major battle of the War of 1812. General Andrew Jackson led a diverse force of soldiers, militia, and pirates to a stunning victory over the British. Ironically, a peace treaty had already been signed two weeks earlier, but news traveled slowly in those days.","facts":["Fought on January 8, 1815, the final battle of the War of 1812","Led by General Andrew Jackson against the British","The peace treaty (Treaty of Ghent) had already been signed two weeks before","Made Andrew Jackson a national hero, leading to his presidency","Jackson's force included regulars, militia, free Black soldiers, and pirates"]},"Boston Red Sox":{"desc":"The Boston Red Sox are a Major League Baseball team with a storied history dating back to 1901. They won the first World Series in 1903 but then sold Babe Ruth to the Yankees in 1920, beginning the famous 'Curse of the Bambino' - an 86-year championship drought. They finally broke the curse by winning the 2004 World Series.","facts":["Founded in 1901 as one of the original American League teams","Won the first World Series in 1903","Sold Babe Ruth to the Yankees in 1920, starting the 'Curse of the Bambino'","Did not win another World Series for 86 years until 2004","Play at Fenway Park, the oldest ballpark in Major League Baseball"]},"Brown v. Board of Education":{"desc":"Brown v. Board of Education was a landmark 1954 Supreme Court case that declared racial segregation in public schools unconstitutional. The case was argued by Thurgood Marshall, who later became the first African American Supreme Court justice. The unanimous decision overturned the 'separate but equal' doctrine from the 1896 Plessy v. Ferguson case.","facts":["Landmark 1954 Supreme Court case about school segregation","Declared racial segregation in public schools unconstitutional","Argued by Thurgood Marshall for the NAACP","Overturned the 'separate but equal' ruling from Plessy v. Ferguson (1896)","The unanimous decision was written by Chief Justice Earl Warren"]},"Charlemagne":{"desc":"Charlemagne, also known as Charles the Great, was King of the Franks and the first Holy Roman Emperor. He united much of Western Europe during the early Middle Ages and was crowned Emperor by Pope Leo III on Christmas Day in the year 800. He promoted education and learning in what is called the Carolingian Renaissance.","facts":["King of the Franks who united much of Western Europe","Crowned Emperor by Pope Leo III on Christmas Day, 800 CE","His empire covered modern France, Germany, and parts of Italy and Spain","Promoted education and learning (Carolingian Renaissance)","Often called the 'Father of Europe'"]},"Chile":{"desc":"Chile is a long, narrow country on the western coast of South America, stretching over 2,600 miles from north to south. It gained independence from Spain in 1818 under leaders like Bernardo O'Higgins. In 1973, a military coup led by General Augusto Pinochet overthrew the democratically elected president Salvador Allende.","facts":["Long narrow country on South America's western coast","Gained independence from Spain in 1818","Salvador Allende was the first Marxist president elected in the Americas (1970)","Pinochet's 1973 military coup led to a 17-year dictatorship","The Atacama Desert in northern Chile is the driest place on Earth"]},"Cotton":{"desc":"Cotton was one of the most important crops in American history, especially in the South before the Civil War. The cotton economy was built on the labor of enslaved people, and it made the Southern states extremely wealthy. Cotton was so important to the Southern economy that it was nicknamed 'King Cotton.'","facts":["Most important cash crop in the American South before the Civil War","The cotton economy depended heavily on enslaved labor","Called 'King Cotton' because of its economic dominance","The cotton gin (1793) made cotton production much more profitable","Cotton exports made up most of U.S. foreign trade before the Civil War"]},"Cotton Gin":{"desc":"The cotton gin was invented by Eli Whitney in 1793 and revolutionized cotton production in the American South. The machine quickly separated cotton fibers from seeds, making cotton far more profitable. Ironically, while it made processing easier, it actually increased the demand for enslaved labor because more cotton could be grown and harvested.","facts":["Invented by Eli Whitney in 1793","Separated cotton fibers from seeds much faster than by hand","Made cotton production hugely profitable in the South","Increased demand for enslaved labor rather than reducing it","Helped make cotton the dominant crop of the American South"]},"Czechoslovakia":{"desc":"Czechoslovakia was a country in Central Europe that existed from 1918 to 1993. It was created after World War I from parts of the Austro-Hungarian Empire. Nazi Germany took over part of it in the 1938 Munich Agreement, and after WWII it became a communist state. It peacefully split into the Czech Republic and Slovakia in 1993 in the 'Velvet Divorce.'","facts":["Central European country that existed from 1918 to 1993","Created after World War I from the Austro-Hungarian Empire","The Munich Agreement (1938) gave its Sudetenland region to Nazi Germany","Became communist after World War II","Peacefully split into Czech Republic and Slovakia in 1993 (Velvet Divorce)"]},"Easter Island":{"desc":"Easter Island is a remote island in the southeastern Pacific Ocean, famous for its nearly 1,000 giant stone statues called moai. The island was settled by Polynesian voyagers around 1200 CE. The statues, some weighing over 80 tons, were carved from volcanic rock and represent ancestral figures.","facts":["Remote Pacific island famous for giant stone statues called moai","Settled by Polynesian voyagers around 1200 CE","Nearly 1,000 moai statues carved from volcanic rock","Called 'Rapa Nui' by its native people","Now a territory of Chile and a UNESCO World Heritage Site"]},"Florence":{"desc":"Florence is a city in central Italy that was the birthplace of the Renaissance in the 14th and 15th centuries. The powerful Medici family ruled Florence and supported artists like Leonardo da Vinci, Michelangelo, and Botticelli. The city is home to famous landmarks including the Florence Cathedral with its massive dome designed by Brunelleschi.","facts":["Birthplace of the Renaissance in central Italy","Ruled by the wealthy and powerful Medici family","Home to artists like Leonardo da Vinci, Michelangelo, and Botticelli","The Florence Cathedral dome was designed by Brunelleschi","The Uffizi Gallery houses some of the world's greatest art"]},"Frederick Douglass":{"desc":"Frederick Douglass was an escaped enslaved person who became one of the most powerful voices against slavery in America. He was a brilliant speaker and writer who published his autobiography and a newspaper called The North Star. He advised President Abraham Lincoln during the Civil War and fought for equal rights for African Americans and women.","facts":["Escaped slavery and became a leading abolitionist speaker and writer","Published his autobiography and a newspaper called The North Star","Advised President Lincoln during the Civil War","Fought for both African American rights and women's suffrage","One of the most photographed Americans of the 19th century"]},"French Revolution":{"desc":"The French Revolution began in 1789 when the people of France overthrew the monarchy and demanded liberty, equality, and brotherhood. The revolution included the storming of the Bastille prison and the execution of King Louis XVI and Queen Marie Antoinette by guillotine. It eventually led to the rise of Napoleon Bonaparte.","facts":["Began in 1789 with the storming of the Bastille prison","King Louis XVI and Marie Antoinette were executed by guillotine","The Declaration of the Rights of Man established new principles of freedom","The Reign of Terror (1793-94) led to thousands of executions","Eventually led to the rise of Napoleon Bonaparte"]},"John F. Kennedy":{"desc":"John F. Kennedy (JFK) was the 35th President of the United States, serving from 1961 until his assassination on November 22, 1963 in Dallas, Texas. He was the youngest elected president and led the country during the Cuban Missile Crisis, bringing the world back from the brink of nuclear war. His presidency inspired a generation with his famous call to 'ask not what your country can do for you.'","facts":["35th President of the United States (1961-1963)","Youngest elected president at age 43","Led the nation through the Cuban Missile Crisis in 1962","Assassinated in Dallas, Texas on November 22, 1963","Created the Peace Corps and pushed for the space program"]},"Kansas-Nebraska Act":{"desc":"The Kansas-Nebraska Act was passed by Congress in 1854 and allowed the territories of Kansas and Nebraska to decide for themselves whether to allow slavery through 'popular sovereignty.' The act repealed the Missouri Compromise of 1820 and led to violent conflict known as 'Bleeding Kansas.' It also helped lead to the creation of the Republican Party.","facts":["Passed in 1854, proposed by Senator Stephen Douglas","Allowed Kansas and Nebraska territories to vote on slavery (popular sovereignty)","Repealed the Missouri Compromise of 1820","Led to violent conflict called 'Bleeding Kansas'","Helped create the Republican Party in opposition to slavery's expansion"]},"Leonardo da Vinci":{"desc":"Leonardo da Vinci was an Italian Renaissance genius who excelled as a painter, inventor, scientist, and engineer. He painted the Mona Lisa and The Last Supper, two of the most famous paintings in history. His notebooks contained designs for flying machines, tanks, and other inventions centuries ahead of their time.","facts":["Italian Renaissance artist, scientist, and inventor (1452-1519)","Painted the Mona Lisa and The Last Supper","His notebooks contained designs for flying machines and other futuristic inventions","Called the ultimate 'Renaissance man' for his many talents","Wrote his notes in mirror script (backwards)"]},"Mao Zedong":{"desc":"Mao Zedong was the founding leader of the People's Republic of China, ruling from 1949 until his death in 1976. He led the Chinese Communist Party to victory in the Chinese Civil War. His policies, including the Great Leap Forward and the Cultural Revolution, caused the deaths of tens of millions of people through famine and political persecution.","facts":["Founding leader of the People's Republic of China (1949-1976)","Led the Chinese Communist Party to victory in the Civil War","The Great Leap Forward (1958-62) caused a famine that killed millions","Launched the Cultural Revolution in 1966","His 'Little Red Book' of quotations was distributed throughout China"]},"Nero":{"desc":"Nero was a Roman Emperor who ruled from 54 to 68 CE and is one of the most infamous rulers in history. He is often blamed for starting the Great Fire of Rome in 64 CE, though this is debated by historians. He persecuted early Christians, killed his own mother, and was eventually forced to commit suicide when the Roman Senate turned against him.","facts":["Roman Emperor from 54 to 68 CE","Often blamed for the Great Fire of Rome in 64 CE","Persecuted early Christians after the fire","Killed his mother Agrippina and his wife Octavia","Was the last emperor of the Julio-Claudian dynasty"]},"Peloponnesian War":{"desc":"The Peloponnesian War was a long conflict fought between Athens and Sparta from 431 to 404 BCE. It involved most of the ancient Greek world and ended with Sparta's victory. The war weakened all of Greece and was chronicled by the historian Thucydides, whose account is considered one of the greatest works of history ever written.","facts":["War between Athens and Sparta from 431 to 404 BCE","Ended with Sparta's victory over Athens","Chronicled by the historian Thucydides","Weakened all of Greece, leading to conquest by Macedonia","Pericles led Athens in the early years of the war"]},"Singapore":{"desc":"Singapore is a small island city-state in Southeast Asia that transformed from a colonial trading post into one of the wealthiest nations in the world. Under Prime Minister Lee Kuan Yew, who led the country from independence in 1965 until 1990, Singapore became a global financial center with one of the best education systems in the world.","facts":["Small island city-state in Southeast Asia","Gained independence from Malaysia in 1965","Transformed from a poor trading post to a wealthy global financial center","Led by Prime Minister Lee Kuan Yew from 1965 to 1990","One of the most prosperous countries in the world today"]},"Tokyo":{"desc":"Tokyo is the capital of Japan and one of the largest metropolitan areas in the world. It was originally a small fishing village called Edo until it became the seat of the Tokugawa shogunate in 1603. The city was almost completely destroyed twice in the 20th century: by the Great Kanto Earthquake of 1923 and by Allied bombing during World War II.","facts":["Capital of Japan, one of the world's largest cities","Originally called Edo, became capital when emperor moved there in 1868","Seat of the Tokugawa shogunate from 1603 to 1868","Devastated by the Great Kanto Earthquake of 1923 and WWII bombing","Hosted the Summer Olympics in 1964 and 2020"]},"USS Maine":{"desc":"The USS Maine was a U.S. Navy battleship that exploded and sank in Havana Harbor, Cuba, on February 15, 1898, killing 266 crew members. The sinking was blamed on Spain, and 'Remember the Maine!' became a rallying cry that helped push the United States into the Spanish-American War. The actual cause of the explosion is still debated today.","facts":["U.S. Navy battleship that sank in Havana Harbor on February 15, 1898","266 crew members were killed in the explosion","'Remember the Maine!' became a rallying cry for war with Spain","Helped trigger the Spanish-American War of 1898","The actual cause of the explosion remains debated"]},"Vikings":{"desc":"The Vikings were Norse seafarers from Scandinavia who explored, traded, and raided across Europe from the 8th to 11th centuries. They were skilled sailors who reached North America around 1000 CE, about 500 years before Columbus. Vikings also settled in Iceland, Greenland, and parts of Britain, France, and Russia.","facts":["Norse seafarers from Scandinavia (Denmark, Norway, Sweden)","Active from about 793 to 1066 CE","Reached North America around 1000 CE at L'Anse aux Meadows","Settled in Iceland, Greenland, Britain, France (Normandy), and Russia","Used longships designed for both ocean voyages and river travel"]},"Vladimir Lenin":{"desc":"Vladimir Lenin was the leader of the Bolshevik Revolution in Russia in 1917 and the first leader of the Soviet Union. He overthrew the Russian government and established a communist state based on the ideas of Karl Marx. He led the Soviet Union until his death in 1924, after which Joseph Stalin took power.","facts":["Leader of the Bolshevik Revolution in October 1917","First leader of the Soviet Union","Established communist government based on Marxist ideas","Led Russia through a brutal civil war (1917-1922)","Died in 1924; succeeded by Joseph Stalin after a power struggle"]},"War of 1812":{"desc":"The War of 1812 was fought between the United States and Great Britain from 1812 to 1815. The war was caused by British interference with American shipping and the impressment of American sailors into the British navy. Key events include the burning of Washington, D.C. by the British and the defense of Fort McHenry, which inspired 'The Star-Spangled Banner.'","facts":["Fought between the U.S. and Britain from 1812 to 1815","Caused by British impressment of American sailors and trade restrictions","The British burned Washington, D.C. including the White House in 1814","The defense of Fort McHenry inspired 'The Star-Spangled Banner'","Ended with the Treaty of Ghent in December 1814"]},"William Howard Taft":{"desc":"William Howard Taft was the 27th President of the United States (1909-1913) and the only person to serve as both President and Chief Justice of the Supreme Court. He was handpicked by Theodore Roosevelt as his successor but the two later became rivals. Taft weighed over 300 pounds and reportedly once got stuck in a White House bathtub.","facts":["27th President of the United States (1909-1913)","Only person to serve as both President and Chief Justice of the Supreme Court","Handpicked by Theodore Roosevelt but later became his rival","Their rivalry split the Republican Party in the 1912 election","Weighed over 300 pounds, the heaviest U.S. president"]},"Witwatersrand gold":{"desc":"The Witwatersrand gold rush began in 1886 when gold was discovered near present-day Johannesburg, South Africa. This discovery led to the rapid growth of Johannesburg and made South Africa the world's largest gold producer. The gold rush also contributed to tensions between the British and the Boer settlers, leading to the Boer Wars.","facts":["Gold discovered near Johannesburg, South Africa in 1886","Made South Africa the world's largest gold producer","Led to the rapid growth of Johannesburg","Contributed to the Boer Wars between British and Dutch settlers","The Witwatersrand basin is the largest gold deposit ever discovered"]},"Abbasid Caliphate":{"desc":"The Abbasid Caliphate was a powerful Islamic empire that ruled much of the Middle East, North Africa, and Central Asia from 750 to 1258 AD. They moved the capital to Baghdad and made it one of the greatest cities in the world, full of scholars, scientists, and artists during a time called the Islamic Golden Age.","facts":["Founded in 750 AD after overthrowing the Umayyad Caliphate","The House of Wisdom in Baghdad was a major center of learning and translation","The Abbasid Caliphate ended when the Mongols destroyed Baghdad in 1258"]},"Abraham Lincoln":{"desc":"Abraham Lincoln was the 16th President of the United States who led the country through the Civil War and ended slavery with the Emancipation Proclamation. He delivered the famous Gettysburg Address and was assassinated by John Wilkes Booth at Ford's Theatre in 1865.","facts":["16th President (1861-1865)","Issued the Emancipation Proclamation in 1863","Delivered the Gettysburg Address","Assassinated by John Wilkes Booth on April 14, 1865","Preserved the Union during the Civil War"]},"Appian Way":{"desc":"The Appian Way was one of the most important roads in ancient Rome, stretching from Rome to the port city of Brindisi in southeastern Italy. Built starting in 312 BC, it was called the 'Queen of Roads' and was so well-built that parts of it are still visible and usable today, over 2,300 years later.","facts":["Construction began in 312 BC under the Roman censor Appius Claudius Caecus","The road stretched about 350 miles (563 km) from Rome to Brindisi on Italy's southeastern coast","After the slave revolt led by Spartacus was defeated in 71 BC, 6,000 captured slaves were crucified along the Appian Way"]},"Archduke Franz Ferdinand":{"desc":"Archduke Franz Ferdinand was the heir to the Austro-Hungarian throne whose assassination on June 28, 1914 in Sarajevo triggered World War I. He was killed by Gavrilo Princip, a Bosnian Serb nationalist, setting off a chain of alliances that plunged Europe into war.","facts":["Heir to the Austro-Hungarian Empire","Assassinated in Sarajevo on June 28, 1914","Killed by Gavrilo Princip","His assassination triggered World War I","The war that followed killed over 17 million people"]},"Atahualpa":{"desc":"Atahualpa was the last emperor of the Inca Empire in South America. He was captured by the Spanish conquistador Francisco Pizarro in 1532 and, despite paying a huge ransom in gold and silver, was executed by the Spanish.","facts":["Atahualpa was captured at the Battle of Cajamarca in November 1532","He offered to fill a room with gold and two rooms with silver as his ransom","He was executed by the Spanish on July 26, 1533"]},"Athens":{"desc":"Athens is the capital of Greece and one of the oldest cities in the world, with a history going back over 3,400 years. In ancient times, Athens was the birthplace of democracy, philosophy, and Western theater, and it produced great thinkers like Socrates, Plato, and Aristotle.","facts":["Athens established the world's first known democracy around 508 BC under the reforms of Cleisthenes","The Golden Age of Athens under Pericles (roughly 461-429 BC) saw the construction of the Parthenon and great advances in art and philosophy","Athens and Sparta fought the Peloponnesian War from 431 to 404 BC, which Athens eventually lost"]},"Attila the Hun":{"desc":"Attila the Hun was the fearsome leader of the Hunnic Empire who terrorized both the Roman Empire and much of Europe in the 5th century AD. He was so feared that he was nicknamed the 'Scourge of God,' and his armies invaded and plundered lands from modern-day Germany to Greece.","facts":["He ruled the Hunnic Empire from 434 to 453 AD, sharing power with his brother Bleda until he had him killed around 445","He invaded Gaul (modern France) in 451 and was defeated at the Battle of the Catalaunian Plains by a Roman-Visigothic alliance","He died in 453 AD on his wedding night, reportedly from a severe nosebleed, and his empire quickly fell apart after his death"]},"Baghdad":{"desc":"Baghdad is the capital of modern-day Iraq and was once the largest and most advanced city in the world. It was founded in 762 AD by the Abbasid Caliph al-Mansur and became a center of learning, trade, and culture during the Islamic Golden Age.","facts":["Founded in 762 AD as a perfectly round city called the 'Round City' or Madinat al-Salam","At its peak around 900 AD, Baghdad had a population of over one million people","The Mongol siege of 1258 destroyed much of the city and killed hundreds of thousands"]},"Baikonur Cosmodrome":{"desc":"The Baikonur Cosmodrome is the world's oldest and largest space launch facility, located in Kazakhstan. It was built by the Soviet Union in the 1950s and is where many of history's most famous space missions launched from.","facts":["Sputnik, the first artificial satellite, launched from Baikonur on October 4, 1957","Yuri Gagarin launched from Baikonur on April 12, 1961, becoming the first human in space","Russia still leases the site from Kazakhstan and uses it for crewed missions to the International Space Station"]},"Barack Obama":{"desc":"Barack Obama was the 44th President of the United States and the first African American to hold the office. He served two terms from 2009 to 2017 and is known for the Affordable Care Act and ordering the mission that found Osama bin Laden.","facts":["Born on August 4, 1961, in Honolulu, Hawaii","He was a U.S. Senator from Illinois before becoming president","He received the Nobel Peace Prize in 2009"]},"Battle of Antietam":{"desc":"The Battle of Antietam was fought on September 17, 1862, near Sharpsburg, Maryland, and remains the single bloodiest day in American military history with about 23,000 casualties. Though tactically a draw, it was enough of a Union success that President Lincoln used it as the occasion to announce the Emancipation Proclamation.","facts":["Fought September 17, 1862 - bloodiest single day in American history","About 23,000 soldiers were killed, wounded, or missing","Fought near Sharpsburg, Maryland at Antietam Creek","Gave Lincoln the opportunity to announce the Emancipation Proclamation","Stopped Confederate General Lee's first invasion of the North"]},"Battle of Borodino":{"desc":"The Battle of Borodino was a huge battle fought on September 7, 1812, between Napoleon's French army and the Russian army near Moscow. It was one of the bloodiest single-day battles in history, and even though Napoleon technically won, the Russians were not truly defeated and kept fighting.","facts":["Fought on September 7, 1812, about 75 miles west of Moscow","Around 70,000 soldiers were killed or wounded in a single day","Russian general Mikhail Kutuzov commanded the Russian forces against Napoleon"]},"Battle of Gettysburg":{"desc":"The Battle of Gettysburg was fought from July 1-3, 1863 in Pennsylvania and was the bloodiest battle of the American Civil War. The Union victory was a major turning point, ending Confederate General Robert E. Lee's invasion of the North. President Lincoln later gave the Gettysburg Address at the battlefield cemetery.","facts":["Fought July 1-3, 1863 in Gettysburg, Pennsylvania","Bloodiest battle of the Civil War with about 50,000 casualties","Major turning point - ended Lee's invasion of the North","Pickett's Charge on the third day was a disastrous Confederate attack","Lincoln delivered the Gettysburg Address at the battlefield cemetery"]},"Battle of the Bulge":{"desc":"The Battle of the Bulge was the last major German offensive on the Western Front during World War II, fought from December 1944 to January 1945 in the forested Ardennes region of Belgium. It was the largest and bloodiest battle fought by the United States in WWII.","facts":["Last major German offensive in WWII (December 1944 - January 1945)","Fought in the Ardennes forest region of Belgium","Germans created a 'bulge' in Allied lines, giving the battle its name","Largest battle fought by U.S. forces in World War II","Allied victory helped end the war in Europe"]},"Benjamin Henry Latrobe":{"desc":"Benjamin Henry Latrobe was a British-American architect who is often called the father of American architecture. He designed important buildings in the early United States, including parts of the U.S. Capitol building in Washington, D.C.","facts":["He designed the Baltimore Basilica, the first Roman Catholic cathedral in the United States","He helped rebuild the U.S. Capitol after the British burned it in 1814","He was born in England in 1764 and moved to the United States in 1796"]},"Brazil":{"desc":"Brazil is the largest country in South America and was colonized by Portugal beginning in 1500. It gained independence in 1822 when Pedro I declared himself emperor. Brazil was the last country in the Western Hemisphere to abolish slavery in 1888.","facts":["Largest country in South America","Colonized by Portugal starting in 1500","Gained independence in 1822 under Emperor Pedro I","Last country in the Western Hemisphere to abolish slavery (1888)","Capital moved from Rio de Janeiro to the new city of Brasilia in 1960"]},"Buddhism":{"desc":"Buddhism is one of the world's major religions, founded by Siddhartha Gautama (the Buddha) in India around 500 BC. The Buddha taught that people could end suffering by following the Eightfold Path, which includes being kind, thinking clearly, and meditating.","facts":["Siddhartha Gautama, the founder, was born around 563 BC in what is now Nepal","The Four Noble Truths are the core teachings of Buddhism about suffering and how to end it","Buddhism spread from India to China, Japan, Southeast Asia, and eventually the whole world"]},"Congress of Vienna":{"desc":"The Congress of Vienna was a meeting of European powers in 1814-1815 to reorganize Europe after the defeat of Napoleon. Led by Austrian diplomat Klemens von Metternich, it redrew the map of Europe and established a balance of power that kept relative peace for nearly a century.","facts":["Held in 1814-1815 after Napoleon's defeat","Led by Austrian diplomat Klemens von Metternich","Redrew the borders of Europe","Established a balance of power among major nations","Created a period of relative peace in Europe lasting until World War I"]},"Constantine the Great":{"desc":"Constantine I, known as Constantine the Great, was a Roman Emperor who ruled from 306 to 337 CE. He was the first Roman emperor to convert to Christianity and issued the Edict of Milan in 313 CE, which legalized Christianity throughout the empire. He also founded Constantinople as the new eastern capital.","facts":["Roman Emperor from 306 to 337 CE","First Roman emperor to convert to Christianity","Issued the Edict of Milan (313 CE) legalizing Christianity","Founded Constantinople as the new eastern capital","Presided over the Council of Nicaea in 325 CE"]},"Cuba":{"desc":"Cuba is the largest island in the Caribbean, located just 90 miles south of Florida. Fidel Castro led a communist revolution in 1959 that overthrew dictator Fulgencio Batista. Cuba's communist government and its close ties to the Soviet Union made it a key flashpoint during the Cold War, especially during the Cuban Missile Crisis.","facts":["Largest island in the Caribbean","Fidel Castro led a communist revolution in 1959","Located just 90 miles from Florida","Center of the 1962 Cuban Missile Crisis","U.S. imposed an economic embargo that lasted for decades"]},"Cuban Missile Crisis":{"desc":"The Cuban Missile Crisis of October 1962 was a 13-day confrontation between the United States and Soviet Union that brought the world to the brink of nuclear war. President Kennedy discovered the Soviets were placing nuclear missiles in Cuba and demanded their removal. The crisis ended when the Soviets agreed to remove the missiles.","facts":["Occurred in October 1962 over 13 tense days","Soviet Union placed nuclear missiles in Cuba","President Kennedy ordered a naval blockade of Cuba","Closest the world came to nuclear war during the Cold War","Resolved when Soviets removed missiles; U.S. secretly removed missiles from Turkey"]},"Delaware":{"desc":"Delaware is known as 'The First State' because it was the first state to ratify the U.S. Constitution on December 7, 1787. It is the second-smallest state by area and is located on the East Coast between Maryland and New Jersey.","facts":["Its capital is Dover","Delaware was one of the original 13 colonies, first settled by the Dutch and Swedes","It is the sixth-least populous U.S. state"]},"Federalist Party":{"desc":"The Federalist Party was one of the first political parties in the United States, founded in the early 1790s. Led by Alexander Hamilton and John Adams, they supported a strong national government and a national bank.","facts":["John Adams was the only Federalist president, serving from 1797 to 1801","Alexander Hamilton was the party's main founder and organizer","The party faded away after the War of 1812 and was mostly gone by the 1820s"]},"Frederick Law Olmsted":{"desc":"Frederick Law Olmsted was a famous American landscape architect who is often called the father of American landscape architecture. He is best known for designing Central Park in New York City along with his partner Calvert Vaux.","facts":["He was born on April 26, 1822, in Hartford, Connecticut","He also designed Prospect Park in Brooklyn and the grounds of the U.S. Capitol","He helped create the plan to preserve Yosemite Valley and was involved in establishing national parks"]},"Frederick the Great":{"desc":"Frederick the Great was the King of Prussia from 1740 to 1786 and one of the most famous rulers in European history. He was a brilliant military leader who made Prussia into a major European power, but he also loved music, philosophy, and the arts.","facts":["He ruled Prussia for 46 years, from 1740 until his death in 1786","He played the flute and even composed over 100 pieces of music","He fought in the Seven Years' War (1756–1763) against a coalition of Austria, France, and Russia"]},"Genghis Khan":{"desc":"Genghis Khan founded the Mongol Empire in 1206, which became the largest contiguous land empire in history. Born as Temujin, he united the Mongol tribes and conquered vast territories across Asia and into Europe. His empire stretched from China to Eastern Europe.","facts":["Founded the Mongol Empire in 1206","Born as Temujin and united Mongol tribes","Created the largest contiguous land empire in history","Established a legal code called the Yasa","His descendants continued expanding the empire after his death in 1227"]},"Glorious Revolution":{"desc":"The Glorious Revolution happened in 1688 when the English Parliament invited William of Orange from the Netherlands to replace King James II. It was called 'glorious' because the change of power happened mostly without bloodshed and led to more power for Parliament over the king.","facts":["It took place in 1688–1689 in England","King James II fled to France after William of Orange arrived with his army","It led to the English Bill of Rights in 1689, which limited the power of the monarchy"]},"Great Depression":{"desc":"The Great Depression was the worst economic downturn in modern history, lasting from 1929 to the late 1930s. It began with the stock market crash of October 1929 and led to massive unemployment, poverty, and hardship worldwide. President Franklin D. Roosevelt's New Deal programs helped America begin to recover.","facts":["Began with the stock market crash of October 29, 1929 (Black Tuesday)","Unemployment in the U.S. reached about 25%","Affected countries around the world","FDR's New Deal created jobs and social programs","Fully ended only with the industrial production of World War II"]},"Haiti":{"desc":"Haiti occupies the western third of the island of Hispaniola in the Caribbean. In 1804, it became the first Black republic and the second independent nation in the Western Hemisphere after a successful slave revolt led by Toussaint Louverture and Jean-Jacques Dessalines against the French.","facts":["First Black republic, independent since 1804","Successful slave revolt against French colonial rule","Led by Toussaint Louverture and Jean-Jacques Dessalines","Second independent nation in the Western Hemisphere after the U.S.","Occupies the western third of Hispaniola"]},"Holy Roman Empire":{"desc":"The Holy Roman Empire was a complex political entity in Central Europe that lasted from 962 to 1806. It was famously described by Voltaire as 'neither holy, nor Roman, nor an empire.' At its height it covered modern Germany, Austria, Czech Republic, and parts of Italy and France.","facts":["Existed from 962 to 1806 in Central Europe","Voltaire said it was 'neither holy, nor Roman, nor an empire'","Charlemagne is considered its founder","Covered modern Germany, Austria, and surrounding areas","Dissolved by Napoleon in 1806"]},"I Have a Dream":{"desc":"\"I Have a Dream\" is the famous title of a speech delivered by Dr. Martin Luther King Jr. during the March on Washington in 1963. The phrase became a powerful symbol of the civil rights movement and the hope for racial equality in America.","facts":["The speech was given on August 28, 1963, at the Lincoln Memorial","About 250,000 people attended the March on Washington that day","The phrase 'I have a dream' was partly improvised — King departed from his written notes"]},"I Have a Dream speech":{"desc":"The I Have a Dream speech was delivered by Martin Luther King Jr. on the steps of the Lincoln Memorial during the March on Washington for Jobs and Freedom. It is considered one of the greatest speeches in American history and called for an end to racism and for civil and economic rights.","facts":["The speech lasted about 17 minutes","Gospel singer Mahalia Jackson shouted 'Tell them about the dream, Martin!' which prompted King to improvise","The speech helped lead to the passage of the Civil Rights Act of 1964"]},"Indira Gandhi":{"desc":"Indira Gandhi was the first female Prime Minister of India, serving from 1966 to 1977 and again from 1980 to 1984. She was the daughter of India's first Prime Minister, Jawaharlal Nehru. She was assassinated by her own Sikh bodyguards in 1984 after she ordered a military attack on the Golden Temple in Amritsar.","facts":["First female Prime Minister of India","Daughter of Jawaharlal Nehru, India's first Prime Minister","Declared a state of emergency from 1975 to 1977","Ordered Operation Blue Star, a military assault on the Golden Temple","Assassinated by her Sikh bodyguards on October 31, 1984"]},"Iran Hostage Crisis":{"desc":"The Iran Hostage Crisis began on November 4, 1979, when Iranian students stormed the U.S. Embassy in Tehran and held 52 American diplomats and citizens hostage. The crisis lasted 444 days and was a major event during President Jimmy Carter's time in office.","facts":["The hostages were released on January 20, 1981, the same day Ronald Reagan was inaugurated as president","A rescue attempt called Operation Eagle Claw failed in April 1980","The crisis was triggered partly by the U.S. allowing the deposed Shah of Iran to enter America for medical treatment"]},"Isaac Newton":{"desc":"Isaac Newton was an English scientist born in 1642 who changed the way people understand the world through his discoveries about gravity, light, and motion. He is often considered one of the most important scientists who ever lived, and his ideas helped launch the Scientific Revolution.","facts":["He published his most famous book, Principia Mathematica, in 1687","He discovered that white light is actually made up of a spectrum of colors","He was born on December 25, 1642, in Woolsthorpe, Lincolnshire, England"]},"John Brown":{"desc":"John Brown was an abolitionist who believed that armed rebellion was the only way to end slavery in the United States. He led a famous raid on the federal armory at Harpers Ferry, Virginia, in 1859, hoping to start a slave uprising.","facts":["He was captured by a force led by Colonel Robert E. Lee at Harpers Ferry","He was tried and hanged on December 2, 1859","In 1856, he and his followers killed five pro-slavery settlers in the Pottawatomie Massacre in Kansas"]},"John Marshall":{"desc":"John Marshall was the fourth Chief Justice of the United States and served for 34 years, from 1801 to 1835, making him the longest-serving Chief Justice. He is famous for establishing the power of judicial review, which lets the Supreme Court decide if laws are constitutional.","facts":["He established judicial review in the landmark case Marbury v. Madison in 1803","He was appointed by President John Adams","He served in the Continental Army during the American Revolution before becoming a lawyer"]},"Joseph Stalin":{"desc":"Joseph Stalin was the dictator of the Soviet Union from the mid-1920s until his death in 1953. He transformed the USSR into an industrial power but at enormous human cost, including forced collectivization, political purges, and the gulag labor camp system.","facts":["Ruled the Soviet Union from the mid-1920s to 1953","Forced collectivization caused massive famine in Ukraine (Holodomor)","The Great Purge eliminated political opponents","Led the Soviet Union during World War II","His policies killed millions of people"]},"Kublai Khan":{"desc":"Kublai Khan was the grandson of Genghis Khan who became the ruler of the Mongol Empire and founded the Yuan Dynasty in China. He was the first non-Chinese person to conquer and rule all of China, and he welcomed visitors from far-away lands, including the famous explorer Marco Polo.","facts":["He established the Yuan Dynasty in 1271 and ruled China until his death in 1294","He tried to invade Japan twice, in 1274 and 1281, but both attempts failed partly due to typhoons called 'kamikaze'","Marco Polo claimed to have served in Kublai Khan's court for about 17 years"]},"Lebanon":{"desc":"Lebanon is a small country on the eastern coast of the Mediterranean Sea with a very long history going back thousands of years. The ancient Phoenicians, who lived in what is now Lebanon, were famous sailors and traders who invented one of the first alphabets that many modern alphabets are based on.","facts":["The ancient city of Byblos in Lebanon is one of the oldest continuously inhabited cities in the world, dating back over 7,000 years","A devastating civil war lasted from 1975 to 1990, involving many different religious and political groups","The cedar tree on Lebanon's flag represents the famous Cedars of Lebanon mentioned in the Bible"]},"Lee Kuan Yew":{"desc":"Lee Kuan Yew was the first Prime Minister of Singapore, serving from 1959 to 1990. He transformed Singapore from a tiny, poor island with no natural resources into one of the wealthiest and most modern countries in the world.","facts":["He served as Prime Minister for 31 years, making him one of the longest-serving leaders in history","Singapore was expelled from Malaysia in 1965, and Lee Kuan Yew cried on television when announcing independence","Under his leadership, Singapore's GDP per capita grew from about $500 in 1965 to over $12,000 by 1990"]},"Missouri Compromise":{"desc":"The Missouri Compromise was a law passed in 1820 that tried to keep the balance between free states and slave states in the United States. It admitted Missouri as a slave state and Maine as a free state, and banned slavery in the rest of the Louisiana Territory north of the 36°30' line.","facts":["It was proposed by Senator Henry Clay of Kentucky","The compromise was struck down by the Supreme Court in the Dred Scott decision of 1857","It kept the number of free and slave states equal at 12 each at the time"]},"Montgomery Alabama":{"desc":"Montgomery, Alabama, played a key role in both the Civil War and the civil rights movement. It served as the first capital of the Confederate States of America in 1861 and was the city where Rosa Parks refused to give up her bus seat in 1955, sparking the Montgomery Bus Boycott.","facts":["The Montgomery Bus Boycott lasted 381 days, from December 1955 to December 1956","Dr. Martin Luther King Jr. was the leader of the boycott and was pastor of Dexter Avenue Baptist Church in Montgomery","Jefferson Davis was inaugurated as president of the Confederacy on the steps of the Alabama State Capitol in Montgomery on February 18, 1861"]},"Mother Teresa":{"desc":"Mother Teresa was a Catholic nun who spent most of her life helping the poorest people in Calcutta, India. She founded the Missionaries of Charity and became one of the most recognized humanitarian figures in the world.","facts":["She was born on August 26, 1910, in Skopje, which is now the capital of North Macedonia","She won the Nobel Peace Prize in 1979","She was declared a saint by Pope Francis on September 4, 2016"]},"Muhammad":{"desc":"Muhammad was the founder of Islam and is considered by Muslims to be the last prophet sent by God. He was born around 570 AD in the city of Mecca in what is now Saudi Arabia, and his teachings became the basis for one of the world's largest religions, with nearly two billion followers today.","facts":["Muslims believe he received revelations from God starting in 610 AD, which were written down as the Quran","In 622 AD, he migrated from Mecca to Medina in an event called the Hijra, which marks the start of the Islamic calendar","By the time of his death in 632 AD, most of the Arabian Peninsula had united under Islam"]},"NATO":{"desc":"NATO (North Atlantic Treaty Organization) is a military alliance formed in 1949 by the United States, Canada, and several Western European nations. It was created to counter the threat of Soviet expansion during the Cold War. The key principle is collective defense: an attack on one member is considered an attack on all.","facts":["Military alliance formed in 1949","Created to counter Soviet expansion during the Cold War","Based on collective defense - attack on one is attack on all (Article 5)","Originally 12 members, now over 30","The Soviet response was to create the Warsaw Pact in 1955"]},"New York Times":{"desc":"The New York Times is one of the most famous and respected newspapers in the United States, first published on September 18, 1851. Often called 'The Gray Lady,' it has won more Pulitzer Prizes than any other newspaper.","facts":["It was founded by Henry Jarvis Raymond and George Jones in 1851","The paper published the Pentagon Papers in 1971, revealing secret information about the Vietnam War","It has won over 130 Pulitzer Prizes, more than any other news organization"]},"Nile River":{"desc":"The Nile River is the longest river in Africa, flowing over 4,000 miles through northeastern Africa to the Mediterranean Sea. Ancient Egyptian civilization depended entirely on the Nile's annual floods, which deposited rich soil for farming. The river was so important that the Greek historian Herodotus called Egypt 'the gift of the Nile.'","facts":["Longest river in Africa at over 4,000 miles","Ancient Egyptian civilization depended on its annual floods","Herodotus called Egypt 'the gift of the Nile'","Flows northward through eleven countries","The Aswan Dam now controls the river's flooding"]},"Oliver Cromwell":{"desc":"Oliver Cromwell was an English military and political leader who helped overthrow King Charles I during the English Civil War. After the king was executed in 1649, Cromwell ruled England as Lord Protector until his death in 1658, making him the only non-royal to lead England in modern history.","facts":["He signed the death warrant of King Charles I, who was beheaded on January 30, 1649","He served as Lord Protector of England from 1653 to 1658","After the monarchy was restored, his body was dug up and symbolically executed in 1661"]},"Oracle of Delphi":{"desc":"The Oracle of Delphi was the most important religious site in ancient Greece, where a priestess called the Pythia gave prophecies believed to come from the god Apollo. Kings, generals, and ordinary people traveled from all over the ancient world to ask the Oracle for advice on important decisions.","facts":["The Oracle was located at the Temple of Apollo on the slopes of Mount Parnassus in central Greece","The Pythia sat on a tripod over a crack in the earth and inhaled vapors that scientists now believe may have been ethylene gas","The Oracle was active for nearly 1,000 years, from about the 8th century BC until it was closed by the Roman Emperor Theodosius I in 393 AD"]},"Osiris":{"desc":"Osiris was one of the most important gods in ancient Egyptian mythology, known as the god of the afterlife, death, and resurrection. According to myth, he was murdered by his jealous brother Set, but was brought back to life by his wife Isis, becoming the ruler of the underworld.","facts":["Set tricked Osiris into lying in a coffin, sealed it shut, and threw it into the Nile River to kill him","His wife Isis reassembled his body after Set cut it into pieces and scattered them across Egypt","Ancient Egyptians believed that Osiris judged the souls of the dead by weighing their hearts against the feather of Ma'at (truth)"]},"Pentagon":{"desc":"The Pentagon is the headquarters of the United States Department of Defense, located in Arlington, Virginia. It is one of the world's largest office buildings and was built during World War II.","facts":["Construction began on September 11, 1941, and it was completed on January 15, 1943","It has five sides, five floors above ground, and about 17.5 miles of corridors","On September 11, 2001, a hijacked plane crashed into the Pentagon, killing 189 people"]},"Persian Empire":{"desc":"The Persian Empire, also known as the Achaemenid Empire, was founded by Cyrus the Great around 550 BCE and became the largest empire the ancient world had seen. It stretched from modern Turkey and Egypt to India and was known for its tolerance of different cultures and religions.","facts":["Founded by Cyrus the Great around 550 BCE","Largest empire of the ancient world","Stretched from Egypt to India","Known for tolerance of conquered peoples' cultures","Defeated by Alexander the Great in 330 BCE"]},"Plato":{"desc":"Plato was an ancient Greek philosopher who lived from about 428 to 348 BCE and was a student of Socrates. He founded the Academy in Athens, one of the first institutions of higher learning in the Western world. His writings, including The Republic, explored justice, beauty, equality, and the ideal form of government.","facts":["Ancient Greek philosopher (c. 428-348 BCE)","Student of Socrates and teacher of Aristotle","Founded the Academy in Athens","Wrote The Republic about justice and ideal government","Developed the Theory of Forms about ideal versions of things"]},"Qin Shi Huang":{"desc":"Qin Shi Huang was the first emperor to unify all of China in 221 BCE, founding the Qin dynasty. He standardized weights, measures, and writing across China, and began construction of the Great Wall. He is also famous for his massive tomb guarded by thousands of terracotta warrior statues.","facts":["First Emperor of unified China in 221 BCE","Standardized weights, measures, currency, and writing","Began construction of the Great Wall of China","His tomb is guarded by the famous Terracotta Army","The name 'China' may come from 'Qin' (pronounced 'Chin')"]},"Qing Dynasty":{"desc":"The Qing Dynasty was the last imperial dynasty of China, ruling from 1644 to 1912. It was founded by the Manchus, a people from northeastern China, and at its largest it controlled a huge territory including China, Mongolia, Tibet, and parts of Central Asia.","facts":["The Qing Dynasty required Chinese men to wear their hair in a long braid called a queue as a sign of loyalty","Emperor Kangxi ruled for 61 years (1661-1722), one of the longest reigns in Chinese history","The dynasty ended when the last emperor, six-year-old Puyi, was forced to abdicate in 1912"]},"Rosa Parks":{"desc":"Rosa Parks was a civil rights activist who refused to give up her bus seat to a white passenger in Montgomery, Alabama on December 1, 1955. Her arrest sparked the Montgomery Bus Boycott, a key event in the civil rights movement led by Martin Luther King Jr.","facts":["Refused to give up her bus seat on December 1, 1955","Her arrest sparked the Montgomery Bus Boycott","The boycott lasted 381 days","Known as the 'Mother of the Civil Rights Movement'","The Supreme Court ruled bus segregation unconstitutional in 1956"]},"Sabines":{"desc":"The Sabines were an ancient Italian people who lived in the hills northeast of Rome and played an important role in Rome's early history. According to Roman legend, the first Romans kidnapped Sabine women to be their wives in an event called the 'Rape of the Sabine Women,' which led to war and eventually peace between the two peoples.","facts":["The legendary 'Rape of the Sabine Women' (meaning 'seizure') was said to have happened during the reign of Rome's founder, Romulus","After the Sabine women intervened to stop the war between their fathers and husbands, the Romans and Sabines merged into one community","The Sabine king Titus Tatius co-ruled Rome with Romulus after the two peoples united"]},"Salt March":{"desc":"The Salt March was a famous act of nonviolent protest led by Mahatma Gandhi in 1930 against British rule in India. Gandhi and his followers walked 240 miles to the sea to make their own salt, breaking the British law that said only the British government could make and sell salt.","facts":["The march began on March 12, 1930, from Gandhi's ashram in Sabarmati and ended at the coastal village of Dandi on April 6","Gandhi started with 78 followers, but thousands joined along the 24-day, 240-mile journey","About 60,000 people were arrested for making or selling salt illegally during the protests that followed"]},"Sir Isaac Newton":{"desc":"Sir Isaac Newton was knighted by Queen Anne in 1705, making him one of the first scientists to receive such an honor. Beyond his famous work on gravity and motion, he also served as Warden and then Master of the Royal Mint, helping to reform England's currency system.","facts":["He was knighted by Queen Anne in 1705 at Trinity College, Cambridge","He served as president of the Royal Society from 1703 until his death in 1727","He spent nearly 30 years as Master of the Royal Mint, fighting counterfeiters"]},"Song Dynasty":{"desc":"The Song Dynasty ruled China from 960 to 1279 AD and was a time of amazing inventions and advances in art, science, and technology. During this period, China was the most advanced civilization in the world, with more people and bigger cities than anywhere in Europe.","facts":["The Song Dynasty saw the invention of gunpowder weapons, the magnetic compass for navigation, and movable-type printing","The capital city of Kaifeng had a population of over one million people by the year 1000","The dynasty is divided into Northern Song (960-1127) and Southern Song (1127-1279) after losing northern territory to the Jurchen Jin Dynasty"]},"Spanish Civil War":{"desc":"The Spanish Civil War was fought from 1936 to 1939 between the Republican government of Spain and a group of rebel military officers led by General Francisco Franco. Franco's side won and he became the dictator of Spain, ruling the country until his death in 1975.","facts":["The war lasted from July 1936 to April 1939","Nazi Germany and Fascist Italy sent troops and weapons to help Franco's side","The famous painting Guernica by Pablo Picasso was inspired by the bombing of a Spanish town during this war"]},"Spartacus":{"desc":"Spartacus was a gladiator and former slave who led the biggest slave revolt in Roman history, known as the Third Servile War, from 73 to 71 BC. He escaped from a gladiator training school with about 70 other gladiators and eventually led an army of around 70,000 escaped slaves against Rome.","facts":["He escaped from a gladiator school in Capua in 73 BC with about 70 other gladiators armed with kitchen knives","His rebel army grew to an estimated 70,000 to 120,000 escaped slaves and defeated several Roman armies","He was defeated by the Roman general Marcus Licinius Crassus in 71 BC, and 6,000 captured rebels were crucified along the Appian Way"]},"Squanto":{"desc":"Squanto, also known as Tisquantum, was a Patuxet Native American who helped the Pilgrims survive after they arrived at Plymouth Colony in 1620. He taught them how to grow corn, catch fish, and find their way around the area.","facts":["He had learned English after being captured and taken to Europe before returning to America","He served as an interpreter between the Pilgrims and the Wampanoag chief Massasoit","He died in November 1622 of a fever while guiding a trading expedition"]},"Sri Lanka":{"desc":"Sri Lanka is an island country located just south of India in the Indian Ocean. It has a long history going back over 2,500 years, with ancient kingdoms that built impressive cities, temples, and irrigation systems that still amaze people today.","facts":["The ancient city of Anuradhapura served as the capital for over 1,000 years, from the 4th century BC to the 11th century AD","A civil war between the government and the Tamil Tigers lasted from 1983 to 2009","The Portuguese arrived in 1505, followed by the Dutch and then the British, who controlled the island until independence in 1948"]},"St. Louis":{"desc":"St. Louis, Missouri, was an important city in American westward expansion and is known as the 'Gateway to the West.' It was the starting point for explorers like Lewis and Clark and later became a major center for trade and transportation on the Mississippi River.","facts":["The city was founded in 1764 by French fur traders Pierre Laclède and Auguste Chouteau","The Gateway Arch, completed in 1965, stands 630 feet tall and is the tallest man-made monument in the United States","St. Louis hosted the 1904 World's Fair and the 1904 Summer Olympics"]},"St. Petersburg":{"desc":"St. Petersburg is a beautiful city in Russia that was founded by Tsar Peter the Great in 1703. It served as the capital of the Russian Empire for over 200 years and is famous for its grand palaces, museums
