althcare from the Catholic Church","It led to a growing movement for Quebec sovereignty, including a 1980 referendum on independence that was defeated"]},"RMS Lusitania":{"desc":"The RMS Lusitania was a large British ocean liner that was sunk by a German submarine during World War I, killing nearly 1,200 people. The sinking outraged people around the world, especially in the United States, and helped push America closer to joining the war against Germany.","facts":["It was torpedoed by German U-boat U-20 on May 7, 1915, off the coast of Ireland","1,198 people died, including 128 Americans","The ship sank in just 18 minutes after being hit"]},"Ray Kroc":{"desc":"Ray Kroc was an American businessman who turned McDonald's from a small restaurant in California into the world's largest fast-food chain. He bought the franchise rights from the McDonald brothers and built it into a global empire.","facts":["He opened his first McDonald's franchise in Des Plaines, Illinois, on April 15, 1955","He was 52 years old and working as a milkshake mixer salesman when he discovered the McDonald brothers' restaurant","He also owned the San Diego Padres baseball team from 1974 until his death in 1984"]},"Renaissance":{"desc":"The Renaissance was a period of great cultural and artistic achievement that began in Italy around the 1300s and spread across Europe over the next few centuries. It means 'rebirth' in French, and it was a time when people became excited about learning, art, science, and the ideas of ancient Greece and Rome.","facts":["It began in Italian city-states like Florence, Venice, and Rome in the 14th century","Famous Renaissance artists include Leonardo da Vinci, Michelangelo, and Raphael","Johannes Gutenberg's invention of the printing press around 1440 helped spread Renaissance ideas across Europe"]},"René Descartes":{"desc":"René Descartes was a French philosopher, mathematician, and scientist who is often called the 'Father of Modern Philosophy.' He is famous for his statement 'I think, therefore I am,' and he also invented the coordinate system used in math class today.","facts":["He was born on March 31, 1596, in La Haye en Touraine, France","He wrote his famous philosophical work Meditations on First Philosophy in 1641","The Cartesian coordinate system (the x-y grid used in math) is named after him"]},"Rishi Sunak":{"desc":"Rishi Sunak became the Prime Minister of the United Kingdom in October 2022, making him the first British leader of Indian heritage and the youngest PM in over 200 years. Before becoming Prime Minister, he served as Chancellor of the Exchequer, managing the country's finances during the COVID-19 pandemic.","facts":["He became Prime Minister on October 25, 2022, at the age of 42","He was the first Hindu and first person of South Asian descent to serve as UK Prime Minister","He previously served as Chancellor of the Exchequer from February 2020 to July 2022"]},"Rolling Stones":{"desc":"The Rolling Stones are a legendary British rock band formed in London in 1962, known for their energetic music and live performances. Along with The Beatles, they are considered one of the most important and influential bands in the history of rock and roll.","facts":["The band was formed in London in 1962 by Mick Jagger, Keith Richards, and Brian Jones","Their hit songs include 'Satisfaction,' 'Paint It Black,' and 'Sympathy for the Devil'","They are one of the best-selling music artists of all time, with over 200 million records sold worldwide"]},"Romulus and Remus":{"desc":"Romulus and Remus were the legendary twin brothers who founded the city of Rome in 753 BCE, according to Roman mythology. They were said to have been raised by a she-wolf after being abandoned as babies. Romulus killed Remus in a dispute and became the first King of Rome.","facts":["Legendary twin founders of Rome in 753 BCE","Said to have been raised by a she-wolf","Romulus killed Remus and became Rome's first king","The city of Rome is named after Romulus","One of the most important founding myths in Western civilization"]},"Russo-Ukrainian War":{"desc":"The Russo-Ukrainian War began in 2014 when Russia annexed Crimea from Ukraine and supported separatist fighters in eastern Ukraine. The conflict dramatically escalated on February 24, 2022, when Russia launched a full-scale invasion of Ukraine, leading to one of the largest wars in Europe since World War II.","facts":["Russia annexed the Crimean Peninsula from Ukraine in March 2014","Russia launched a full-scale invasion of Ukraine on February 24, 2022","The war has caused millions of Ukrainians to flee their homes as refugees to neighboring countries"]},"Second Triumvirate":{"desc":"The Second Triumvirate was an official alliance formed in 43 BC by three powerful Roman leaders: Octavian (Julius Caesar's adopted son), Mark Antony, and Lepidus. They joined forces to defeat Caesar's assassins and rule the Roman Republic, but they eventually turned on each other in a power struggle.","facts":["It was formally established by the Lex Titia on November 27, 43 BC, giving the three men dictatorial powers for five years","They created proscription lists that led to the execution of about 300 senators and 2,000 equestrians, including the famous orator Cicero","The alliance ended when Octavian defeated Antony at the Battle of Actium in 31 BC and became the sole ruler of Rome as Emperor Augustus"]},"Sequoyah":{"desc":"Sequoyah was a Cherokee silversmith and scholar who created a written system for the Cherokee language, known as a syllabary, in 1821. This was one of the only times in history that a person who could not read or write in any language created a complete writing system.","facts":["His syllabary had 85 characters, each representing a syllable in the Cherokee language","Within a few years of its introduction, most Cherokee people could read and write in their own language","The giant sequoia trees of California were named in his honor"]},"Seven Wonders of the Ancient World":{"desc":"The Seven Wonders of the Ancient World were a list of the most impressive buildings and structures known to ancient Greek travelers and historians. Of the seven wonders, only one still exists today: the Great Pyramid of Giza in Egypt, which is also the oldest of the seven.","facts":["The seven wonders are: the Great Pyramid of Giza, the Hanging Gardens of Babylon, the Statue of Zeus at Olympia, the Temple of Artemis at Ephesus, the Mausoleum at Halicarnassus, the Colossus of Rhodes, and the Lighthouse of Alexandria","The Great Pyramid of Giza, built around 2560 BC, is the only wonder still standing today","The Colossus of Rhodes, a giant bronze statue about 108 feet tall, stood for only 54 years before being destroyed by an earthquake in 226 BC"]},"Silk Road":{"desc":"The Silk Road was a network of ancient trade routes connecting China to the Mediterranean world, stretching over 4,000 miles. It was used from about the 2nd century BCE to the 15th century CE to trade silk, spices, gems, and ideas between East and West. The routes also spread religions like Buddhism, Islam, and Christianity.","facts":["Network of trade routes connecting China to the Mediterranean","Named for the valuable Chinese silk traded along it","Active from about the 2nd century BCE to the 15th century CE","Spread goods, ideas, religions, and even diseases like the Black Plague","Marco Polo traveled along the Silk Road to reach China"]},"Smoot-Hawley Act":{"desc":"The Smoot-Hawley Tariff Act was a law passed in 1930 that raised tariffs (taxes) on over 20,000 imported goods to some of the highest levels in U.S. history. Many economists believe it made the Great Depression worse by starting trade wars with other countries.","facts":["It was sponsored by Senator Reed Smoot of Utah and Representative Willis C. Hawley of Oregon","President Herbert Hoover signed it into law on June 17, 1930, despite a petition signed by over 1,000 economists urging him not to","Other countries retaliated with their own tariffs, and world trade dropped by about 65% between 1929 and 1934"]},"Socrates":{"desc":"Socrates was an ancient Greek philosopher from Athens who lived from about 470 to 399 BCE. He is considered the founder of Western philosophy and developed the Socratic method of questioning. He was sentenced to death by drinking hemlock, accused of corrupting the youth of Athens.","facts":["Ancient Greek philosopher (c. 470-399 BCE)","Considered the founder of Western philosophy","Developed the Socratic method of teaching through questions","Never wrote anything down - known through writings of his student Plato","Executed by drinking hemlock in 399 BCE"]},"Space shuttles":{"desc":"The Space Shuttle was NASA's reusable spacecraft that carried astronauts and cargo into space from 1981 to 2011. There were five operational shuttles, and they completed 135 missions over 30 years of service.","facts":["The five shuttles were Columbia, Challenger, Discovery, Atlantis, and Endeavour","The Challenger disaster on January 28, 1986, and the Columbia disaster on February 1, 2003, each killed all seven crew members aboard","The first shuttle mission was flown by Columbia on April 12, 1981"]},"Stephen A. Douglas":{"desc":"Stephen A. Douglas was a U.S. Senator from Illinois who is famous for his series of debates with Abraham Lincoln in 1858 and for championing the idea of popular sovereignty, which let territories decide for themselves whether to allow slavery. He was known as the 'Little Giant' because he was short but a powerful speaker.","facts":["He debated Abraham Lincoln seven times during the 1858 Illinois Senate race, and Douglas won that election","He proposed the Kansas-Nebraska Act of 1854, which repealed the Missouri Compromise","He ran against Lincoln for president in 1860 but lost, then supported Lincoln and the Union cause before dying in 1861"]},"String Quartet":{"desc":"A string quartet is a group of four musicians who play together using two violins, one viola, and one cello. This type of music group became very popular in Europe during the 1700s, and famous composers like Mozart, Beethoven, and Haydn wrote some of their greatest music for string quartets.","facts":["Joseph Haydn is called the 'Father of the String Quartet' and wrote 68 of them","Ludwig van Beethoven wrote 16 string quartets, which are considered some of the greatest chamber music ever composed","The standard string quartet format of two violins, viola, and cello was established in the mid-1700s"]},"Suleiman the Magnificent":{"desc":"Suleiman the Magnificent was the longest-reigning Sultan of the Ottoman Empire, ruling from 1520 to 1566. Under his leadership, the Ottoman Empire reached its greatest size and power, stretching across three continents and becoming one of the most powerful empires in the world.","facts":["He ruled for 46 years, from 1520 to 1566, the longest reign of any Ottoman Sultan","He besieged Vienna in 1529, reaching the furthest point of Ottoman expansion into Europe","He was known in the Islamic world as 'The Lawgiver' because he reformed the Ottoman legal system"]},"Suriname":{"desc":"Suriname is a small country on the northeastern coast of South America that used to be a Dutch colony. It is the smallest country in South America and is one of the few places in the Americas where Dutch is the official language.","facts":["Suriname gained independence from the Netherlands on November 25, 1975","It is the smallest country in South America by area","Dutch is the official language, making it unique in South America"]},"Taiping Rebellion":{"desc":"The Taiping Rebellion was a massive civil war in China from 1850 to 1864, led by Hong Xiuquan, who believed he was the brother of Jesus Christ. It was one of the deadliest conflicts in human history, killing an estimated 20 to 30 million people, far more than many world wars.","facts":["An estimated 20 to 30 million people died, making it one of the deadliest wars in human history","The leader, Hong Xiuquan, claimed he was the younger brother of Jesus Christ and established the Taiping Heavenly Kingdom","The rebellion was finally defeated with help from European-led armies like the Ever Victorious Army commanded by Charles Gordon"]},"Tamil Tigers":{"desc":"The Tamil Tigers were a rebel group in Sri Lanka that fought for an independent homeland for the Tamil people in the north and east of the island. They fought a brutal civil war against the Sri Lankan government from 1983 to 2009, using many controversial tactics including suicide bombings.","facts":["Their official name was the Liberation Tigers of Tamil Eelam (LTTE), founded by Velupillai Prabhakaran in 1976","They pioneered the use of suicide bombing as a military tactic, carrying out over 300 suicide attacks","The Sri Lankan military defeated them in May 2009, ending a 26-year civil war that killed an estimated 80,000 to 100,000 people"]},"Taoism":{"desc":"Taoism (also called Daoism) is an ancient Chinese religion and philosophy founded by Laozi around the 6th century BC. It teaches people to live in harmony with the Tao, which means 'the Way,' and emphasizes living simply and peacefully with nature.","facts":["Laozi (Lao Tzu) is the traditional founder, and he wrote the key text called the 'Tao Te Ching'","The yin-yang symbol represents the Taoist idea of balance between opposite forces","Taoism began in China and has influenced Chinese culture for over 2,000 years"]},"The Beatles":{"desc":"The Beatles were a British rock band from Liverpool, England, who became the most popular and influential band in music history. Their creative songs and cultural impact in the 1960s changed music forever, and they are the best-selling music act of all time.","facts":["The four members were John Lennon, Paul McCartney, George Harrison, and Ringo Starr","They arrived in New York on February 7, 1964, starting 'Beatlemania' in America","They have sold over 600 million records worldwide, more than any other music act"]},"The Hague":{"desc":"The Hague is a city in the Netherlands that serves as the seat of the Dutch government and is known as the international capital of justice. Many important international courts and organizations are located there, making it a key center for international law and diplomacy.","facts":["The International Court of Justice, the main judicial body of the United Nations, is located in The Hague","The International Criminal Court, which prosecutes war crimes, is also based there","Although Amsterdam is the official capital of the Netherlands, the government and parliament sit in The Hague"]},"The North Star":{"desc":"The North Star was an anti-slavery newspaper started by Frederick Douglass in Rochester, New York, in 1847. It was named after the star that enslaved people used to guide them north to freedom and became one of the most important abolitionist publications.","facts":["The first issue was published on December 3, 1847","Its motto was 'Right is of no Sex — Truth is of no Color — God is the Father of us all, and we are all brethren'","The paper merged with the Liberty Party Paper in 1851 and became Frederick Douglass' Paper"]},"The Odyssey":{"desc":"The Odyssey is an ancient Greek epic poem written by Homer around 700 BC that tells the story of the hero Odysseus trying to get home after the Trojan War. His journey takes ten years and is full of incredible adventures, including encounters with monsters, gods, and magical creatures.","facts":["The Odyssey was written by the Greek poet Homer around 700 BC","The hero Odysseus takes 10 years to return home to Ithaca after the Trojan War","Famous episodes include encounters with the Cyclops Polyphemus, the witch Circe, and the Sirens"]},"The Three Musketeers":{"desc":"The Three Musketeers is a famous adventure novel written by French author Alexandre Dumas and published in 1844. It tells the exciting story of a young man named d'Artagnan who joins three musketeers — Athos, Porthos, and Aramis — in service to the King of France.","facts":["The novel was written by Alexandre Dumas and first published in serial form in 1844","The story is set in France during the 1620s, during the reign of King Louis XIII","The musketeers' famous motto is 'All for one and one for all'"]},"Thermopylae":{"desc":"Thermopylae is a narrow mountain pass in central Greece where one of the most famous battles in history took place in 480 BC. A small force of Greek soldiers, led by King Leonidas of Sparta with his 300 Spartan warriors, held off a massive Persian army for three days before being defeated.","facts":["King Leonidas led about 7,000 Greek soldiers, including 300 Spartans, against a Persian army estimated at 100,000 to 300,000","The Greeks held the narrow pass for three days until a local traitor named Ephialtes showed the Persians a secret mountain path to get behind them","Leonidas and his 300 Spartans stayed behind to fight to the death, allowing the rest of the Greek army to retreat"]},"Three Sisters":{"desc":"The Three Sisters refers to the three main crops grown together by many Native American tribes: corn, beans, and squash. These crops were planted together because they help each other grow — the corn provides a stalk for the beans to climb, the beans add nitrogen to the soil, and the squash leaves shade the ground to keep moisture in.","facts":["This farming method was used by the Iroquois, Cherokee, and many other Native American groups for hundreds of years","The three crops together provide a nutritionally balanced diet with carbohydrates, protein, and vitamins","The Iroquois considered the Three Sisters to be gifts from the Great Spirit and held ceremonies to celebrate them"]},"Tigris River":{"desc":"The Tigris River is one of the two great rivers of Mesopotamia (the other being the Euphrates), flowing through modern-day Turkey, Syria, and Iraq. Ancient civilizations like the Sumerians, Assyrians, and Babylonians built some of the world's first cities along the Tigris thousands of years ago.","facts":["The Tigris is about 1,150 miles (1,850 km) long, flowing from the mountains of eastern Turkey to the Persian Gulf","The ancient Assyrian capital of Nineveh was located on the banks of the Tigris, near modern-day Mosul, Iraq","Baghdad, founded in 762 AD, was built on the western bank of the Tigris River"]},"Titanomachy":{"desc":"The Titanomachy is the legendary war between the Titans and the Olympian gods in Greek mythology. Led by Zeus, the younger Olympian gods fought against the older Titans led by Kronos for control of the universe, and after ten years of fighting, the Olympians won and became the rulers of the cosmos.","facts":["The war lasted ten years, according to the Greek poet Hesiod's Theogony, written around 700 BC","Zeus freed the Cyclopes and the Hundred-Handed Ones from prison to help fight the Titans","After winning, Zeus imprisoned most of the defeated Titans in Tartarus, a deep pit beneath the underworld"]},"Tony Blair":{"desc":"Tony Blair was the Prime Minister of the United Kingdom from 1997 to 2007 and the leader of the Labour Party. He won three general elections in a row and modernized the Labour Party, but his decision to support the 2003 invasion of Iraq was very controversial.","facts":["He became Prime Minister on May 2, 1997, at the age of 43","He played a key role in the Good Friday Agreement of 1998, which helped bring peace to Northern Ireland","He was the longest-serving Labour Prime Minister, holding office for 10 years"]},"Tutankhamun":{"desc":"Tutankhamun, often called King Tut, was an ancient Egyptian pharaoh who ruled from about 1332 to 1323 BC. He became pharaoh when he was only about 9 years old, and although he was not very important during his lifetime, the discovery of his nearly untouched tomb in 1922 made him the most famous pharaoh in the world.","facts":["He became pharaoh at about age 9 and died at about age 19, possibly from a leg infection combined with malaria","His tomb in the Valley of the Kings was discovered by Howard Carter on November 4, 1922, containing over 5,000 artifacts","His golden death mask, made of about 24 pounds of solid gold, is one of the most recognizable artifacts in the world"]},"Tydings-McDuffie Act":{"desc":"The Tydings-McDuffie Act was a law passed by the United States Congress in 1934 that promised independence to the Philippines after a ten-year transition period. This law set up the process that led to the Philippines becoming a fully independent country on July 4, 1946.","facts":["The act was signed into law on March 24, 1934","It established a 10-year transition period before full Philippine independence","The Philippines officially became independent on July 4, 1946, after the transition was delayed by World War II"]},"U.S. Capitol building":{"desc":"The U.S. Capitol building in Washington, D.C., is where the United States Congress meets to make laws. Its famous dome, topped by the Statue of Freedom, is one of the most recognized symbols of American democracy.","facts":["Construction began on September 18, 1793, when President George Washington laid the cornerstone","The current cast-iron dome was completed during the Civil War in 1866 and weighs about 8.9 million pounds","The building has about 540 rooms and the Rotunda beneath the dome features large paintings of American history"]},"Vandals":{"desc":"The Vandals were a Germanic tribe that migrated across Europe during the fall of the Roman Empire and eventually settled in North Africa. They are most famous for sacking the city of Rome in 455 AD, and their name is the origin of the English word 'vandalism,' meaning the destruction of property.","facts":["They crossed the Rhine River into the Roman Empire on December 31, 406 AD, along with other barbarian tribes","Under King Gaiseric, they conquered Roman North Africa in 439 AD and made Carthage their capital","They sacked Rome for two weeks in June 455 AD, stripping the city of valuables including treasures originally taken from the Temple of Jerusalem"]},"Venezuela":{"desc":"Venezuela is a country on the northern coast of South America that sits on top of some of the world's largest oil reserves. It was one of the first Spanish colonies to fight for independence, led by the famous general Simón Bolívar in the early 1800s.","facts":["Venezuela declared independence from Spain on July 5, 1811","It has the largest proven oil reserves of any country in the world","Simón Bolívar, known as 'The Liberator,' was born in Caracas, Venezuela, in 1783"]},"Volodymyr Zelenskyy":{"desc":"Volodymyr Zelenskyy is the President of Ukraine who became world-famous for his brave leadership after Russia invaded his country in 2022. Before becoming president, he was a comedian and actor who starred in a TV show about a teacher who accidentally becomes president of Ukraine.","facts":["He was elected President of Ukraine on April 21, 2019, winning 73% of the vote","He previously starred in the Ukrainian TV comedy series Servant of the People from 2015 to 2019","He refused offers to leave Kyiv when Russia invaded, reportedly saying he needed ammunition, not a ride"]},"Wales":{"desc":"Wales is a country that is part of the United Kingdom, located on the western side of the island of Great Britain. It has its own language, Welsh, its own culture and traditions, and is known for its beautiful mountains, castles, and rugby teams.","facts":["Wales has over 600 castles, more per square mile than any other country in Europe","The Welsh language, called Cymraeg, is one of the oldest living languages in Europe","Wales was officially united with England by the Laws in Wales Acts of 1535 and 1542"]},"Warren G. Harding":{"desc":"Warren G. Harding was the 29th President of the United States, serving from 1921 until his death in 1923. His presidency is often remembered for the Teapot Dome scandal, one of the biggest corruption scandals in American political history before Watergate.","facts":["He died on August 2, 1923, in San Francisco while on a speaking tour, and was succeeded by Vice President Calvin Coolidge","The Teapot Dome scandal involved his Secretary of the Interior, Albert Fall, who accepted bribes for leasing government oil reserves","He won the 1920 election with over 60% of the popular vote, one of the largest landslides in U.S. history at the time"]},"Wernher von Braun":{"desc":"Wernher von Braun was a German-born rocket engineer who developed the V-2 rocket for Nazi Germany during World War II and later moved to the United States, where he became the key figure in America's space program. He led the team that built the Saturn V rocket, which carried astronauts to the Moon.","facts":["He developed the V-2 rocket for Nazi Germany, the world's first long-range ballistic missile","After the war, he was brought to the United States under Operation Paperclip in 1945","He was the chief architect of the Saturn V rocket that launched the Apollo 11 Moon mission in 1969"]},"William Penn":{"desc":"William Penn was an English Quaker who founded the colony of Pennsylvania in 1681 as a place where people of all religions could worship freely. He treated Native Americans fairly and planned the city of Philadelphia, which became one of the most important cities in colonial America.","facts":["King Charles II granted Penn the charter for Pennsylvania in 1681 to settle a debt owed to Penn's father","Penn founded Philadelphia in 1682, designing it as a grid-pattern city whose name means 'City of Brotherly Love'","He signed a peace treaty with the Lenape (Delaware) Native Americans and was known for treating them with respect"]},"William of Orange":{"desc":"William of Orange, also known as William III, was a Dutch prince who became King of England, Scotland, and Ireland after the Glorious Revolution of 1688. He and his wife Mary II ruled together, and their reign established important principles about the rights of Parliament over the monarchy.","facts":["He was born on November 14, 1650, in The Hague, Netherlands","He and his wife Mary II were crowned as joint monarchs of England on April 11, 1689","He defeated the former King James II at the Battle of the Boyne in Ireland on July 1, 1690"]},"Wimbledon":{"desc":"Wimbledon is the oldest and most prestigious tennis tournament in the world, held every summer in London, England. It is the only Grand Slam tournament still played on grass courts, and it is famous for its traditions like players wearing all white and spectators eating strawberries and cream.","facts":["The first Wimbledon Championship was held in 1877","It is played at the All England Lawn Tennis and Croquet Club in London","Roger Federer holds the men's record with 8 Wimbledon singles titles, while Martina Navratilova holds the women's record with 9"]},"Wright Brothers":{"desc":"Orville and Wilbur Wright were two American brothers from Dayton, Ohio, who built and flew the first successful powered airplane. Their historic first flight took place on December 17, 1903, at Kitty Hawk, North Carolina.","facts":["The first flight lasted only 12 seconds and covered 120 feet","They made four flights that day, with the longest lasting 59 seconds and covering 852 feet","Before building airplanes, they owned and operated a bicycle repair and sales shop in Dayton, Ohio"]},"Yugoslavia":{"desc":"Yugoslavia was a country in southeastern Europe that existed for most of the 20th century, made up of several different ethnic groups including Serbs, Croats, Bosniaks, and Slovenes. After its leader Tito died in 1980, the country gradually broke apart in a series of violent wars in the 1990s.","facts":["Yugoslavia was created in 1918 after World War I as the Kingdom of Serbs, Croats, and Slovenes","It broke apart in the 1990s into six countries: Slovenia, Croatia, Bosnia and Herzegovina, Serbia, Montenegro, and North Macedonia","The breakup led to devastating wars, including the Bosnian War (1992–1995) and the Kosovo War (1998–1999)"]},"Zaibatsu":{"desc":"Zaibatsu were huge family-owned business groups that controlled much of Japan's economy from the late 1800s through World War II. These powerful conglomerates owned banks, factories, mines, and shipping companies, and they worked closely with the Japanese government to build Japan into an industrial power.","facts":["The four largest zaibatsu were Mitsubishi, Mitsui, Sumitomo, and Yasuda","After World War II, the American occupation forces broke up the zaibatsu, but many reformed as looser groups called keiretsu","The Mitsui zaibatsu traced its origins back to 1673, making it one of the oldest business enterprises in the world"]},"Zoot Suit Riots":{"desc":"The Zoot Suit Riots were a series of violent clashes in Los Angeles in June 1943 between U.S. servicemen and young Mexican Americans who wore flashy outfits called zoot suits. The riots were fueled by racial tensions and wartime anxieties during World War II.","facts":["The riots lasted from June 3 to June 8, 1943","Servicemen attacked Mexican American, African American, and Filipino American youth, stripping them of their zoot suits and beating them","The Los Angeles City Council banned the wearing of zoot suits during the riots, making it a misdemeanor"]},"India":{"desc":"On August 23, 2023, India's Chandrayaan-3 spacecraft successfully landed on the Moon's south pole, making India only the fourth country to achieve a lunar soft landing (after the Soviet Union, the United States, and China). India was the first country to land near the Moon's south pole. The mission was carried out by ISRO (Indian Space Research Organisation).","facts":["Chandrayaan means 'moon vehicle' in Sanskrit","India's first attempt, Chandrayaan-2, crashed during landing in 2019","The south pole of the Moon is important because it may contain frozen water","The mission cost about $75 million — less than many Hollywood movies","The small rover explored the surface and confirmed the presence of sulfur near the south pole"]},"Jamestown":{"desc":"Jamestown was the first permanent English settlement in North America, founded in 1607 in what is now Virginia. The settlers struggled terribly with starvation and disease, but the colony survived and became the starting point for English colonization of America.","facts":["Jamestown was founded on May 14, 1607, by the Virginia Company of London","Captain John Smith helped lead the colony through its difficult early years","The colony nearly failed during the 'Starving Time' winter of 1609-1610, when most settlers died"]},"Dominican Republic":{"desc":"The Dominican Republic is a Caribbean country that shares the island of Hispaniola with Haiti. It gained independence from Haiti in 1844 and is known for its beautiful beaches, baseball players, and its role as the site where Christopher Columbus first landed in the Americas.","facts":["The Dominican Republic declared independence from Haiti on February 27, 1844","Christopher Columbus arrived on the island of Hispaniola in December 1492","Santo Domingo, its capital, was founded in 1496 and is the oldest European-established city in the Americas"]},"Ecuador":{"desc":"Ecuador is a country in South America named after the equator, which runs right through it. It gained independence from Spain in 1822 with help from the famous generals Simón Bolívar and Antonio José de Sucre.","facts":["Ecuador gained independence from Spain on May 24, 1822, after the Battle of Pichincha","The Galápagos Islands, which belong to Ecuador, inspired Charles Darwin's theory of evolution","Quito, the capital, sits at about 9,350 feet above sea level, making it one of the highest capitals in the world"]},"China":{"desc":"China has one of the world's oldest continuous civilizations, with over 4,000 years of recorded history. It was ruled by a series of dynasties until the Republic was established in 1912, and the Communist Party under Mao Zedong took power in 1949.","facts":["One of the world's oldest civilizations","Ruled by dynasties for thousands of years","Republic established in 1912 after fall of Qing dynasty","Communist revolution in 1949 under Mao Zedong","Great Wall, gunpowder, paper, compass, and printing are famous Chinese inventions"]},"Napoleon Bonaparte":{"desc":"Napoleon Bonaparte was a French military leader who rose to power during the French Revolution and became Emperor of France. He conquered much of Europe before being defeated at the Battle of Waterloo in 1815 and exiled to Saint Helena.","facts":["Rose to power during the French Revolution","Crowned himself Emperor of France in 1804","Conquered much of Europe through brilliant military campaigns","Defeated at the Battle of Waterloo in 1815","Exiled to Saint Helena where he died in 1821"]},"Puerto Rico":{"desc":"Puerto Rico is an island in the Caribbean that has been a U.S. territory since 1898. Spain controlled it for nearly 400 years before the United States took it over after winning the Spanish-American War.","facts":["The United States acquired Puerto Rico from Spain in 1898 after the Spanish-American War","Puerto Ricans became U.S. citizens in 1917 through the Jones-Shafroth Act","San Juan, the capital, was founded by Spanish settlers in 1521"]},"Los Angeles":{"desc":"Los Angeles is the second-largest city in the United States, located in southern California. It was originally a small Spanish pueblo founded in 1781 and grew into a massive city known for Hollywood, the entertainment industry, and its diverse population.","facts":["Los Angeles was founded on September 4, 1781, by Spanish settlers","The full original Spanish name was 'El Pueblo de los Ángeles' meaning 'The Town of the Angels'","The Hollywood film industry began developing in Los Angeles in the early 1900s"]},"France":{"desc":"France is a major European country with a history spanning thousands of years. It has been central to many of world history's most important events, from the Crusades to the French Revolution to both World Wars.","facts":["One of the oldest nations in Europe","The French Revolution (1789) transformed world politics","Napoleon Bonaparte built a vast European empire","Major participant in both World Wars","Has been a global center of art, culture, and philosophy"]},"Palace of Versailles":{"desc":"The Palace of Versailles is a huge and fancy royal palace near Paris, France, that was built by King Louis XIV in the 1600s. It became the center of French government and a symbol of the incredible wealth and power of French kings before the French Revolution.","facts":["Louis XIV moved the royal court to Versailles in 1682","The famous Hall of Mirrors contains 357 mirrors and is 240 feet long","The Treaty of Versailles, ending World War I, was signed there on June 28, 1919"]},"Margaret Thatcher":{"desc":"Margaret Thatcher was the first female Prime Minister of the United Kingdom, serving from 1979 to 1990. Known as the 'Iron Lady,' she was famous for her strong conservative policies and led Britain during the Falklands War.","facts":["First female Prime Minister of the UK (1979-1990)","Known as the 'Iron Lady' for her tough political style","Led Britain during the Falklands War with Argentina (1982)","Implemented strong free-market economic policies","Longest-serving British PM of the 20th century"]},"John Adams":{"desc":"John Adams was the second President of the United States and one of the key Founding Fathers. He helped draft the Declaration of Independence and served as the first Vice President under George Washington.","facts":["Second President of the United States (1797-1801)","Key Founding Father who helped draft the Declaration of Independence","First Vice President under George Washington","His son John Quincy Adams became the 6th president","Died on July 4, 1826 - the same day as Thomas Jefferson"]},"Japan":{"desc":"Japan is an island nation in East Asia with a rich cultural and military history. It was ruled by emperors and powerful shoguns for centuries, rapidly modernized during the Meiji Restoration of 1868, and became a major world power in the 20th century.","facts":["Island nation in East Asia with over 6,800 islands","Ruled by emperors and shoguns for centuries","Meiji Restoration (1868) rapidly modernized the country","Major power in WWII; atomic bombs dropped on Hiroshima and Nagasaki in 1945","Rebuilt after WWII to become the world's third-largest economy"]},"Battle of Bunker Hill":{"desc":"The Battle of Bunker Hill was one of the first major battles of the American Revolution, fought on June 17, 1775, near Boston. Even though the British won the battle, the American colonists fought so bravely that it gave them confidence they could stand up to the powerful British army.","facts":["The battle was actually fought mostly on Breed's Hill, not Bunker Hill, on June 17, 1775","The British suffered over 1,000 casualties, about twice as many as the Americans","The famous order 'Don't fire until you see the whites of their eyes' is associated with this battle"]},"Great Zimbabwe":{"desc":"Great Zimbabwe was a medieval city in southeastern Africa that was the capital of the Kingdom of Zimbabwe. Its massive stone ruins, built between the 11th and 15th centuries, are the largest ancient structures south of the Sahara Desert.","facts":["Medieval African city built between the 11th and 15th centuries","Capital of the Kingdom of Zimbabwe","Largest ancient stone structures south of the Sahara","Built without mortar - stones fit together precisely","Modern country of Zimbabwe is named after this site"]},"Nikita Khrushchev":{"desc":"Nikita Khrushchev was the leader of the Soviet Union from 1953 to 1964, during some of the most tense years of the Cold War. He is remembered for the Cuban Missile Crisis, banging his shoe at the United Nations, and for criticizing the previous leader Joseph Stalin's harsh rule.","facts":["He gave a famous 'Secret Speech' in 1956 denouncing Stalin's crimes and cult of personality","He led the Soviet Union during the Cuban Missile Crisis of October 1962","He was removed from power in October 1964 by other Communist Party leaders"]},"Tang Dynasty":{"desc":"The Tang Dynasty ruled China from 618 to 907 AD and is considered one of the greatest periods in Chinese history. During this time, China was the most powerful and advanced civilization in the world, with amazing achievements in poetry, art, and technology.","facts":["The Tang Dynasty lasted from 618 to 907 AD, nearly 300 years","The capital city of Chang'an (modern Xi'an) was the largest city in the world with about 1 million people","Woodblock printing was invented during the Tang Dynasty, making books available to more people"]},"Hawaii":{"desc":"Hawaii is a chain of volcanic islands in the Pacific Ocean that became the 50th U.S. state in 1959. The islands were originally settled by Polynesian voyagers and were ruled as an independent kingdom until the Hawaiian monarchy was overthrown in 1893.","facts":["Hawaii became the 50th U.S. state on August 21, 1959","King Kamehameha I united the Hawaiian Islands into one kingdom in 1810","The Hawaiian monarchy was overthrown on January 17, 1893, with the support of American businessmen"]},"Great Salt Lake":{"desc":"The Great Salt Lake is the largest saltwater lake in the Western Hemisphere, located in Utah. It is a remnant of a much larger ancient lake called Lake Bonneville that existed during the last Ice Age, and its water is saltier than the ocean.","facts":["The Great Salt Lake is about 75 miles long and 35 miles wide, though its size changes with water levels","It is a remnant of prehistoric Lake Bonneville, which covered much of western Utah about 30,000 years ago","The lake's salinity ranges from 5% to 27%, much saltier than the ocean's average of 3.5%"]},"IBM":{"desc":"IBM (International Business Machines) is one of the oldest and most important technology companies in the world. Founded in 1911, it played a huge role in the development of computers and helped shape the entire technology industry.","facts":["IBM was founded on June 16, 1911, as the Computing-Tabulating-Recording Company and renamed IBM in 1924","IBM introduced the IBM PC (personal computer) in 1981, which set the standard for modern PCs","IBM's Deep Blue computer famously defeated world chess champion Garry Kasparov in 1997"]},"Australia":{"desc":"Australia is both a country and a continent, located in the Southern Hemisphere surrounded by the Indian and Pacific Oceans. British settlers established a colony there in 1788, and it became an independent nation in 1901 when its six colonies joined together.","facts":["Australia became a federation of six colonies on January 1, 1901","The first British colony was established at Sydney Cove on January 26, 1788, originally as a penal colony","Australia is the world's sixth-largest country by land area"]},"Atlanta":{"desc":"Atlanta is the capital of Georgia and played a major role in both the Civil War and the Civil Rights Movement. During the Civil War, Union General William Sherman captured and burned much of the city in 1864, and a century later it became a center of the fight for equal rights.","facts":["General William T. Sherman captured Atlanta on September 2, 1864, and burned much of it during his March to the Sea","Martin Luther King Jr. was born in Atlanta on January 15, 1929","Atlanta hosted the Summer Olympic Games in 1996"]},"Sioux":{"desc":"The Sioux are a group of Native American peoples who originally lived on the Great Plains of North America. They were skilled buffalo hunters and fierce warriors who famously defeated General Custer at the Battle of the Little Bighorn in 1876.","facts":["The Sioux defeated Lt. Colonel George Custer at the Battle of the Little Bighorn on June 25, 1876","The Sioux Nation includes three major groups: the Lakota, Dakota, and Nakota","The Wounded Knee Massacre on December 29, 1890, killed about 250-300 Sioux men, women, and children"]},"Chicago":{"desc":"Chicago is the third-largest city in the United States, located on the shore of Lake Michigan in Illinois. It grew rapidly in the 1800s as a railroad hub and was nearly destroyed by the Great Chicago Fire of 1871, after which it was rebuilt with innovative new architecture.","facts":["The Great Chicago Fire burned from October 8-10, 1871, destroying about 3.3 square miles of the city","Chicago hosted the World's Columbian Exposition (World's Fair) in 1893","The world's first skyscraper, the Home Insurance Building, was built in Chicago in 1885"]},"Xi Jinping":{"desc":"Xi Jinping is the leader of China, serving as President and General Secretary of the Chinese Communist Party since 2012. He has become the most powerful Chinese leader in decades, and in 2018 he removed presidential term limits so he could stay in power longer.","facts":["Xi Jinping became General Secretary of the Chinese Communist Party in November 2012","In 2018, China's constitution was amended to remove presidential term limits","His father, Xi Zhongxun, was a veteran revolutionary leader and senior Communist Party official"]},"Daniel Boone":{"desc":"Daniel Boone was a famous American frontiersman and explorer who helped open up Kentucky for settlement in the late 1700s. He blazed the Wilderness Road through the Cumberland Gap and founded the settlement of Boonesborough, becoming one of the most legendary figures of the American frontier.","facts":["Boone blazed the Wilderness Road through the Cumberland Gap into Kentucky in 1775","He founded Fort Boonesborough in Kentucky in 1775","He was born on November 2, 1734, in Pennsylvania and died on September 26, 1820, in Missouri"]},"Theodore Roosevelt":{"desc":"Theodore Roosevelt was the 26th President of the United States, known for his energetic personality, conservation efforts, and the construction of the Panama Canal. He was the youngest person to become president at age 42 after McKinley's assassination.","facts":["26th President of the United States (1901-1909)","Youngest president at age 42 after McKinley's assassination","Known as a 'trust buster' who regulated big business","Built the Panama Canal","Created many national parks and forests"]},"Wisconsin":{"desc":"Wisconsin is a state in the upper Midwest of the United States that became the 30th state in 1848. It is known as \"America's Dairyland\" because of its huge dairy farming industry, and it was originally home to many Native American peoples including the Ho-Chunk and Menominee.","facts":["Wisconsin became the 30th state on May 29, 1848","Madison is the state capital, and Milwaukee is the largest city","The Republican Party was founded in Ripon, Wisconsin, in 1854"]},"Belgium":{"desc":"Belgium is a small country in Western Europe that became independent in 1830 and has played an important role in European history. It was a major battleground in both World War I and World War II, and today its capital Brussels serves as the headquarters of the European Union.","facts":["Belgium declared independence from the Netherlands on October 4, 1830","Brussels, the capital, serves as the headquarters of the European Union and NATO","Much of World War I's Western Front was fought in Belgium, including the brutal battles around Ypres"]},"Korean War":{"desc":"The Korean War was fought from 1950 to 1953 between North Korea (supported by China and the Soviet Union) and South Korea (supported by the United States and other UN countries). The war ended in a ceasefire but no peace treaty, so North and South Korea are technically still at war today.","facts":["The war began on June 25, 1950, when North Korea invaded South Korea","About 36,500 American soldiers died in the Korean War","The armistice was signed on July 27, 1953, establishing the demilitarized zone (DMZ) near the 38th parallel"]},"Constantinople":{"desc":"Constantinople was the capital of the Byzantine Empire for over 1,000 years. Founded by Emperor Constantine I in 330 CE on the site of ancient Byzantium, it was the largest and wealthiest city in Europe during the Middle Ages. It fell to the Ottoman Turks in 1453 and was renamed Istanbul.","facts":["Founded by Constantine I in 330 CE","Capital of the Byzantine Empire for over 1,000 years","Largest and wealthiest city in medieval Europe","Fell to the Ottoman Turks under Sultan Mehmed II in 1453","Renamed Istanbul and became the Ottoman capital"]},"Alexander Graham Bell / Telephone (150th Anniversary)":{"desc":"Alexander Graham Bell patented the telephone on March 7, 1876, and made the first phone call three days later, saying 'Mr. Watson, come here, I want to see you.' 2026 marks the 150th anniversary of this invention that changed communication forever. Bell was born in Scotland and moved to Canada, then the United States. He also worked with deaf students, and his mother and wife were both deaf.","facts":["Bell's first words on the telephone were to his assistant Thomas Watson","He demonstrated the telephone at the 1876 World's Fair in Philadelphia","Bell also invented early versions of the metal detector and the photophone","There is debate over whether Elisha Gray invented a similar device at nearly the same time","Bell founded the Bell Telephone Company, which later became AT&T"]},"Mughal Empire / Battle of Panipat (500th Anniversary)":{"desc":"In 1526, Babur defeated Sultan Ibrahim Lodi at the First Battle of Panipat and founded the Mughal Empire in India. 2026 marks the 500th anniversary of this empire, which ruled most of South Asia for over 300 years. The Mughals built the Taj Mahal, the Red Fort, and many other famous monuments. At its peak under Emperor Akbar, the Mughal Empire ruled over 100 million people.","facts":["Babur was a descendant of both Genghis Khan and Timur (Tamerlane)","The word 'Mughal' comes from 'Mongol'","Emperor Shah Jahan built the Taj Mahal as a tomb for his wife Mumtaz Mahal","Emperor Akbar was known for religious tolerance and invited scholars from many faiths","The British East India Company gradually took over Mughal territory starting in the 1700s"]},"Dutch Purchase of Manhattan (400th Anniversary)":{"desc":"In May 1626, Peter Minuit of the Dutch West India Company reportedly purchased the island of Manhattan from the Lenape people. Legend says the price was about 60 guilders worth of trade goods (often described as '$24 worth of beads,' though this is oversimplified). The Dutch colony of New Amsterdam eventually became New York City when the English took it over in 1664.","facts":["The Dutch named their colony New Amsterdam after the capital of the Netherlands","The Lenape people who lived there may not have understood they were 'selling' the land","Wall Street gets its name from a defensive wall the Dutch built","The English renamed it New York after the Duke of York when they took control in 1664","2026 marks the 400th anniversary of this famous transaction"]},"Robert Goddard / First Liquid Rocket (100th Anniversary)":{"desc":"On March 16, 1926, Robert Goddard launched the world's first liquid-fueled rocket from a farm in Auburn, Massachusetts. The rocket flew for only 2.5 seconds and reached 41 feet, but it changed history. 2026 marks 100 years since this flight. Goddard is called the 'father of modern rocketry' and his work paved the way for space travel.","facts":["Goddard's first rocket was powered by liquid oxygen and gasoline","Many people laughed at his idea that rockets could reach the Moon","NASA's Goddard Space Flight Center is named after him","He launched 34 rockets during his lifetime, with the highest reaching 9,000 feet","The New York Times once mocked him, then published a correction — in 1969, when Apollo 11 went to the Moon"]},"Jimmy Carter":{"desc":"Jimmy Carter was the 39th President of the United States (1977-1981). He died on December 29, 2024, at age 100, making him the longest-lived U.S. president ever. After his presidency, Carter spent decades doing humanitarian work, including building houses with Habitat for Humanity. He won the Nobel Peace Prize in 2002 for his work promoting peace and human rights around the world.","facts":["Carter was a peanut farmer from Plains, Georgia before becoming president","He helped negotiate the Camp David Accords peace treaty between Egypt and Israel","He lived to be 100 years old — the first U.S. president to reach that age","He and his wife Rosalynn were married for 77 years, the longest presidential marriage","He was a graduate of the U.S. Naval Academy and served on nuclear submarines"]},"Coronation of King Charles III":{"desc":"Charles III became King of the United Kingdom on September 8, 2022, when his mother Queen Elizabeth II died after 70 years on the throne. His coronation ceremony took place on May 6, 2023, at Westminster Abbey in London. He is the oldest person ever to be crowned British monarch, at age 74. Charles had been the longest-serving heir apparent in British history.","facts":["Queen Elizabeth II reigned for 70 years, the longest reign in British history","Charles waited longer to become king than any previous British monarch","The coronation used the same chair (St Edward's Chair) that has been used since 1308","His wife Camilla was crowned Queen alongside him","Charles is known for his environmental and conservation work"]},"Israel-Hamas War / Gaza Conflict":{"desc":"On October 7, 2023, the militant group Hamas launched a surprise attack on Israel from the Gaza Strip, killing over 1,100 people and taking about 240 hostages. Israel responded with a major military operation in Gaza. The conflict has caused a humanitarian crisis with tens of thousands of casualties and widespread destruction in Gaza. It has been one of the most significant events in the ongoing Israeli-Palestinian conflict.","facts":["Gaza is a small territory on the Mediterranean coast between Israel and Egypt","Hamas has controlled Gaza since 2007","The conflict led to major protests and debates around the world","Many countries have called for a ceasefire and peace negotiations","The Israeli-Palestinian conflict has roots going back to the early 20th century"]},"Henry Kissinger":{"desc":"Henry Kissinger was the U.S. Secretary of State under Presidents Nixon and Ford and one of the most influential diplomats of the 20th century. He died on November 29, 2023, at age 100. He helped open relations between the U.S. and China in 1972 and negotiated the end of American involvement in the Vietnam War. He won the Nobel Peace Prize in 1973 but remained a controversial figure.","facts":["Born in Germany, his family fled the Nazi regime and came to America in 1938","He arranged President Nixon's historic 1972 visit to China","He practiced 'shuttle diplomacy' — flying between countries to negotiate","His policy of 'realpolitik' focused on practical results over idealism","He lived to be 100 years old"]},"Sandra Day O'Connor":{"desc":"Sandra Day O'Connor was the first woman to serve on the United States Supreme Court. She was appointed by President Ronald Reagan in 1981 and served until 2006. She died on December 1, 2023, at age 93. As a moderate conservative, she was often the decisive 'swing vote' on important cases. Before her appointment, she was an Arizona state senator and judge.","facts":["She was confirmed unanimously by the Senate, 99-0","She grew up on a cattle ranch in Arizona called the Lazy B Ranch","Despite graduating near the top of her class at Stanford Law School, she was initially offered only secretarial jobs because she was a woman","She was the first female majority leader of any state senate in the U.S.","She retired to care for her husband, who had Alzheimer's disease"]},"Alexei Navalny":{"desc":"Alexei Navalny was a Russian opposition leader who became famous for fighting corruption in the Russian government and challenging President Vladimir Putin. He died in a Russian prison on February 16, 2024, at age 47. In 2020, he survived a poisoning with a nerve agent that he blamed on the Kremlin. After recovering in Germany, he returned to Russia in 2021 and was immediately arrested.","facts":["He used social media and YouTube videos to expose corruption among Russian officials","He organized some of the largest anti-government protests in modern Russian history","He survived a poisoning with the nerve agent Novichok in 2020","He was sentenced to prison on charges widely seen as politically motivated","His death drew international condemnation from world leaders"]},"2026 FIFA World Cup (US/Canada/Mexico)":{"desc":"The 2026 FIFA World Cup is being hosted jointly by the United States, Canada, and Mexico — the first World Cup held across three countries and the first with 48 teams (expanded from 32). The last time the U.S. hosted the World Cup was in 1994. This tournament is one of the biggest sporting events in the world, with billions of viewers worldwide.","facts":["It's the first World Cup with 48 teams instead of 32","Games will be played in 16 cities across three countries","The final will be held at MetLife Stadium in New Jersey","The 1994 World Cup in the U.S. set attendance records that still stand","Canada is hosting World Cup games for the first time ever"]},"2026 Winter Olympics (Milan-Cortina)":{"desc":"The 2026 Winter Olympics are being held in Milan and Cortina d'Ampezzo, Italy, in February 2026. Italy previously hosted the Winter Olympics in Turin in 2006 and in Cortina in 1956. The games feature sports like skiing, ice hockey, figure skating, and bobsled. Milan is Italy's second-largest city and a world fashion capital.","facts":["Cortina d'Ampezzo is in the Italian Alps and hosted the Winter Olympics once before in 1956","Italy has hosted the Olympics three times total (1956, 1960, and 2006)","The opening ceremony will be held at San Siro Stadium in Milan","The games will feature around 2,900 athletes from over 90 countries","New events being considered include ski mountaineering"]},"Battles of Lexington and Concord (250th in 2025)":{"desc":"On April 19, 1775, the Battles of Lexington and Concord marked the start of the American Revolutionary War. British soldiers marched from Boston to seize colonial weapons stored in Concord, Massachusetts. Minutemen (colonial militia) confronted them at Lexington Green, where 'the shot heard round the world' was fired. The 250th anniversary was celebrated in 2025.","facts":["Paul Revere and William Dawes rode through the night to warn that the British were coming","The first shots were fired at Lexington Green, but nobody knows which side fired first","The colonial militia were called 'minutemen' because they could be ready to fight in a minute","The British retreated back to Boston, harassed by colonial fighters along the road","Ralph Waldo Emerson later called the first shot 'the shot heard round the world'"]},"Fall of Saigon (50th Anniversary in 2025)":{"desc":"On April 30, 1975, North Vietnamese forces captured Saigon, the capital of South Vietnam, ending the Vietnam War. The famous image of helicopters evacuating people from the U.S. Embassy rooftop became a symbol of the war's end. The city was renamed Ho Chi Minh City after the North Vietnamese leader. The 50th anniversary was commemorated in 2025.","facts":["The evacuation, called 'Operation Frequent Wind,' was the largest helicopter evacuation in history","Over 7,000 people were evacuated by helicopter in the final days","The Vietnam War lasted about 20 years and involved over 2.7 million American soldiers","More than 58,000 Americans and millions of Vietnamese were killed in the war","The city is still called Ho Chi Minh City today and is Vietnam's largest city"]},"Donald Trump / 2024 Presidential Election":{"desc":"Donald Trump won the 2024 presidential election, defeating Vice President Kamala Harris and returning to the White House on January 20, 2025. He became only the second U.S. president to serve non-consecutive terms (the first was Grover Cleveland in the 1890s). Trump's return brought major policy changes including new tariffs on international trade.","facts":["Trump is the 45th and 47th President of the United States","Grover Cleveland (22nd and 24th president) was the only other president to serve non-consecutive terms","Kamala Harris was the first woman, first Black person, and first South Asian person to serve as Vice President","The 2024 election saw record voter turnout","Trump's trade policies in 2025 significantly changed global trade relationships"]},"Artificial Intelligence / ChatGPT":{"desc":"Artificial intelligence (AI) became a major topic starting in late 2022 when OpenAI released ChatGPT, a chatbot that could write essays, answer questions, and have conversations. AI technology has rapidly advanced, sparking debates about its impact on jobs, education, and society. Many companies and governments are now working on AI policies and regulations.","facts":["ChatGPT reached 100 million users in just 2 months after launch — the fastest-growing app ever at the time","AI stands for 'artificial intelligence' — machines that can perform tasks that normally require human intelligence","The concept of AI dates back to the 1950s, when Alan Turing proposed the 'Turing Test'","Major AI companies include OpenAI, Google, Anthropic, and Meta","Many schools and universities are debating how to handle AI in education"]},"Turkey-Syria Earthquakes (2023)":{"desc":"On February 6, 2023, two massive earthquakes struck southern Turkey and northern Syria, killing nearly 60,000 people and leaving millions homeless. The main earthquake had a magnitude of 7.8, followed by a 7.5 magnitude aftershock. It was one of the deadliest natural disasters in the region's modern history and caused widespread destruction across both countries.","facts":["The earthquakes destroyed over 160,000 buildings","Turkey sits on major fault lines where tectonic plates meet","International rescue teams from dozens of countries helped with relief efforts","The disaster prompted questions about building safety standards in the region","It was the deadliest earthquake disaster worldwide since the 2010 Haiti earthquake"]},"James Webb Space Telescope":{"desc":"The James Webb Space Telescope (JWST) launched on December 25, 2021, and began sending back stunning images in July 2022. It is the most powerful space telescope ever built and can see deeper into space (and further back in time) than any previous telescope. Named after a former NASA administrator, it orbits the Sun about 1 million miles from Earth.","facts":["JWST cost about $10 billion and took over 20 years to build","Its primary mirror is 21 feet across, made of 18 gold-coated hexagonal segments","It detects infrared light, allowing it to see through dust clouds and observe the earliest galaxies","It orbits at a point called L2, about 1 million miles from Earth","Its images have revealed details about exoplanet atmospheres and the earliest galaxies ever observed"]}};

// ===== STORAGE =====
function loadData(key, fallback) {
  try {
    const v = localStorage.getItem('hb_' + key);
    return v ? JSON.parse(v) : fallback;
  } catch(e) { return fallback; }
}
function saveData(key, val) {
  try { localStorage.setItem('hb_' + key, JSON.stringify(val)); } catch(e) {}
}

// ===== STATE =====
let topicMastery = loadData('topicMastery', {});
let buzzerHistory = loadData('buzzerHistory', []);
let quizHistory = loadData('quizHistory', []);
let studyStreak = loadData('studyStreak', { last: '', count: 0 });

function recordStudy() {
  const today = new Date().toISOString().slice(0, 10);
  if (studyStreak.last === today) return;
  const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
  if (studyStreak.last === yesterday) {
    studyStreak.count++;
  } else {
    studyStreak.count = 1;
  }
  studyStreak.last = today;
  saveData('studyStreak', studyStreak);
}

// ===== THEME =====
function initTheme() {
  const saved = loadData('theme', 'light');
  document.documentElement.setAttribute('data-theme', saved);
  updateThemeBtn(saved);
}
function updateThemeBtn(theme) {
  const btn = document.getElementById('themeToggle');
  btn.innerHTML = theme === 'dark' ? '&#9728;&#65039; Light' : '&#127769; Dark';
}
document.getElementById('themeToggle').addEventListener('click', function() {
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  saveData('theme', next);
  updateThemeBtn(next);
});

// ===== TABS =====
document.getElementById('mainNav').addEventListener('click', function(e) {
  const btn = e.target.closest('.nav-btn');
  if (!btn) return;
  const tab = btn.getAttribute('data-tab');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  if (tab === 'flashcards') loadFlashcards();
  if (tab === 'reading') renderReading();
  if (tab === 'dashboard') renderDashboard();
});

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function updateBuzzerStats() {

  document.getElementById('bStreak').textContent = buzzerState.streak;

  document.getElementById('bAccuracy').textContent = acc;

function showBuzzerQuestion() {
  if (buzzerState.qIndex >= buzzerState.questions.length) {
    showBuzzerSummary();
    return;
  }
  const q = buzzerState.questions[buzzerState.qIndex];
  // Split into sentences for sentence-by-sentence reveal
  // Split into sentences. Avoid splitting on abbreviations (single capital letter followed by period)
  buzzerState.sentences = q.q.split(/(?<=[a-z\)\"]{2}\.)\s+(?=[A-Z])|(?=For the point,)|(?=For ten points,)/);
  buzzerState.sentenceIndex = 0;
  buzzerState.totalSentences = buzzerState.sentences.length;
  buzzerState.words = q.q.split(/\s+/);  // keep for scoring calc
  buzzerState.wordIndex = 0;
  buzzerState.buzzed = false;
  buzzerState.answered = false;
  buzzerState.startTime = Date.now();
  updateBuzzerStats();

  const area = document.getElementById('buzzerArea');
  area.innerHTML = '<div class="question-display" id="qDisplay"></div>' +
    '<div class="timer-bar-container"><div class="timer-bar" id="timerBar"></div></div>' +
    '<div class="clue-counter" id="clueCounter"></div>' +
    '<button class="buzz-btn" id="buzzBtn">BUZZ!</button>';

  document.getElementById('buzzBtn').addEventListener('click', handleBuzz);

  // Reveal first sentence immediately
  const display = document.getElementById('qDisplay');
  display.textContent = '';
  function revealNextSentence() {
    if (buzzerState.sentenceIndex < buzzerState.sentences.length) {
      var shown = buzzerState.sentences.slice(0, buzzerState.sentenceIndex + 1);
      buzzerState.wordIndex = shown.join(' ').split(/\s+/).length;
      formatSentences(shown, display);
      // Update clue counter
      var counter = document.getElementById('clueCounter');
      if (counter) counter.textContent = 'Clue ' + (buzzerState.sentenceIndex + 1) + ' of ' + buzzerState.totalSentences;
      buzzerState.sentenceIndex++;
    } else {
      clearInterval(buzzerState.timer);
    }
    updateTimerBar();
  }
  revealNextSentence();  // Show first clue right away
  // Reveal subsequent sentences every 5 seconds
  buzzerState.timer = setInterval(revealNextSentence, 5000);

  // Time limit: 5 seconds per sentence + 5 second buffer
  var totalTime = buzzerState.totalSentences * 5000 + 5000;
  buzzerState.totalTime = totalTime;
  buzzerState.timerInterval = setTimeout(function() {
    if (!buzzerState.buzzed) {
      clearInterval(buzzerState.timer);
      timeUp();
    }
  }, totalTime);
}

function updateTimerBar() {
  const elapsed = Date.now() - buzzerState.startTime;
  const totalTime = buzzerState.totalTime || 15000;
  const pct = Math.max(0, 100 - (elapsed / totalTime) * 100);
  const bar = document.getElementById('timerBar');
  if (bar) {
    bar.style.width = pct + '%';
    bar.className = 'timer-bar' + (pct < 20 ? ' danger' : pct < 40 ? ' warning' : '');
  }
}

function handleBuzz() {
  if (buzzerState.buzzed) return;
  buzzerState.buzzed = true;
  clearInterval(buzzerState.timer);
  clearTimeout(buzzerState.timerInterval);

  // Show full question with formatting

  formatSentences(buzzerState.sentences, display);

  // Replace buzz button with answer input
  const area = document.getElementById('buzzerArea');
  const buzzBtn = document.getElementById('buzzBtn');

  const inputArea = document.createElement('div');

  inputArea.innerHTML = '<input type="text" id="answerInput" placeholder="Type your answer..." autofocus>' +
    '<button class="next-btn" id="submitAnswer">Submit</button>';

  input.focus();
  input.addEventListener('keydown', function(e) { if (e.key === 'Enter') checkBuzzerAnswer(); });
  document.getElementById('submitAnswer').addEventListener('click', checkBuzzerAnswer);
}

function levenshtein(a, b) {
  var m = a.length, n = b.length, d = [];
  if (!m) return n;
  if (!n) return m;
  for (var i = 0; i <= m; i++) d[i] = [i];
  for (var j = 0; j <= n; j++) d[0][j] = j;
  for (i = 1; i <= m; i++) {
    for (j = 1; j <= n; j++) {
      d[i][j] = a[i-1] === b[j-1] ? d[i-1][j-1] : Math.min(d[i-1][j-1]+1, d[i][j-1]+1, d[i-1][j]+1);
    }
  }
  return d[m][n];
}

function fuzzyMatch(userAns, correctAns) {
  var normalize = function(s) { return s.toLowerCase().replace(/[^a-z0-9\s]/g, '').replace(/\b(the|a|an|of)\b/g, '').replace(/\s+/g, ' ').trim(); };
  var u = normalize(userAns);
  var c = normalize(correctAns);
  if (!u) return false;
  // Exact match
  if (u === c) return true;
  // Substring match (typed answer is inside correct or vice versa)
  if (c.includes(u) && u.length >= 3) return true;
  if (u.includes(c) && c.length >= 3) return true;
  // Last name match — if correct answer is "FirstName LastName", accept just "LastName"
  var cParts = c.split(' ');
  if (cParts.length >= 2) {
    var lastName = cParts[cParts.length - 1];
    if (lastName.length >= 3 && (u === lastName || levenshtein(u, lastName) <= 1)) return true;
  }
  // Levenshtein tolerance — allow 1 typo for short answers, 2 for longer ones
  var maxDist = c.length <= 5 ? 1 : c.length <= 10 ? 2 : 3;
  if (levenshtein(u, c) <= maxDist) return true;
  // Word overlap — at least half the significant words match
  var cWords = c.split(' ').filter(function(w) { return w.length > 2; });
  var uWords = u.split(' ').filter(function(w) { return w.length > 2; });
  if (cWords.length > 0) {
    var matchCount = cWords.filter(function(w) {
      return uWords.some(function(uw) { return uw === w || levenshtein(uw, w) <= 1; });
    }).length;
    if (matchCount >= Math.ceil(cWords.length * 0.5) && matchCount >= 1) return true;
  }
  // Also check if the answer within parentheses in the full answer matches
  // e.g. "Elizabeth Cady Stanton (accept either underlined name)"
  var parenMatch = correctAns.match(/\((?:accept|or)\s+(.+?)\)/i);
  if (parenMatch) {
    var alt = normalize(parenMatch[1]);
    if (alt && (u === alt || alt.includes(u) || u.includes(alt) || levenshtein(u, alt) <= 2)) return true;
  }
  return false;
}

function findTeachableMoment(answerText) {
  // Try to find a matching topic description for this answer
  var norm = function(s) { return s.toLowerCase().replace(/[^a-z0-9\s]/g, '').trim(); };
  var aNorm = norm(answerText);
  // Direct match first
  for (var key in TOPIC_DESCS) {
    if (norm(key) === aNorm) return { topic: key, info: TOPIC_DESCS[key] };
  }
  // Partial match — answer contained in topic name or vice versa
  for (var key in TOPIC_DESCS) {
    var kNorm = norm(key);
    if (kNorm.includes(aNorm) || aNorm.includes(kNorm)) return { topic: key, info: TOPIC_DESCS[key] };
  }
  // Try last name only
  var parts = aNorm.split(' ');
  if (parts.length >= 2) {
    var last = parts[parts.length - 1];
    for (var key in TOPIC_DESCS) {
      if (norm(key).includes(last) && last.length >= 4) return { topic: key, info: TOPIC_DESCS[key] };
    }
  }
  return null;
}

function checkBuzzerAnswer() {
  if (buzzerState.answered) return;
  buzzerState.answered = true;
  const q = buzzerState.questions[buzzerState.qIndex];
  const userAns = document.getElementById('answerInput').value;

  // Check against primary answer and full answer
  const isCorrect = fuzzyMatch(userAns, q.a) || fuzzyMatch(userAns, q.af);

  const cluesShown = buzzerState.sentenceIndex || 1;
  const totalClues = buzzerState.totalSentences || 1;
  const earlyBuzz = cluesShown / totalClues < 0.6;

  let points = 0;
  if (isCorrect) {
    points = earlyBuzz ? 10 : 5;
    buzzerState.correct++;
    buzzerState.streak++;
  } else {
    points = -5;
    buzzerState.streak = 0;
  }
  buzzerState.score += points;
  buzzerState.total++;
  updateBuzzerStats();

  // Save to history
  buzzerHistory.push({ q: q.q, a: q.a, userAns: userAns, correct: isCorrect, points: points, date: new Date().toISOString() });
  saveData('buzzerHistory', buzzerHistory);

  // Show result
  const area = document.getElementById('buzzerArea');
  const result = document.createElement('div');
  result.className = 'result-display ' + (isCorrect ? 'correct' : 'wrong');
  result.innerHTML = isCorrect ?
    '&#10004; Correct! ' + (earlyBuzz ? '+10 (early buzz!)' : '+5') :
    '&#10008; Not quite. The answer is below.';
  area.appendChild(result);

  const correctDiv = document.createElement('div');
  correctDiv.className = 'correct-answer-display';
  correctDiv.innerHTML = '<strong>Answer:</strong> ' + escHtml(q.af);
  if (!isCorrect && userAns) correctDiv.innerHTML += '<br><span style="color:var(--text3);font-size:13px">You said: ' + escHtml(userAns) + '</span>';
  area.appendChild(correctDiv);

  const nextBtn = document.createElement('button');
  nextBtn.className = 'next-btn';
  nextBtn.textContent = buzzerState.qIndex < buzzerState.questions.length - 1 ? 'Next Question' : 'See Results';
  nextBtn.addEventListener('click', function() {
    buzzerState.qIndex++;
    showBuzzerQuestion();
  });
  area.appendChild(nextBtn);
}

function timeUp() {
  buzzerState.buzzed = true;
  buzzerState.total++;
  updateBuzzerStats();

  var q = buzzerState.questions[buzzerState.qIndex];
  var area = document.getElementById('buzzerArea');
  var display = document.getElementById('qDisplay');
  formatSentences(buzzerState.sentences, display);

  var buzzBtn = document.getElementById('buzzBtn');
  if (buzzBtn) buzzBtn.style.display = 'none';

  // Show "time's up" but let them still guess
  var prompt = document.createElement('div');
  prompt.className = 'result-display';
  prompt.style.background = 'var(--gold-bg)';
  prompt.style.color = 'var(--warning)';
  prompt.innerHTML = "&#9200; Time is up! Take your best guess:";
  area.appendChild(prompt);

  var inputArea = document.createElement('div');
  inputArea.className = 'answer-input-area';
  inputArea.innerHTML = '<input type="text" id="answerInput" placeholder="Type your guess..." autofocus>' +
    '<button class="next-btn" id="submitAnswer">Submit</button>' +
    '<button class="next-btn" id="skipGuess" style="background:var(--bg3);color:var(--text2)">Show Answer</button>';
  area.appendChild(inputArea);

  var input = document.getElementById('answerInput');
  input.focus();

  function revealTimeUpAnswer(userAns) {
    if (buzzerState.answered) return;
    buzzerState.answered = true;
    // Remove the input area and prompt
    inputArea.remove();
    prompt.remove();

    var isCorrect = userAns && (fuzzyMatch(userAns, q.a) || fuzzyMatch(userAns, q.af));

    if (isCorrect) {
      buzzerState.correct++;
      buzzerState.score += 2;  // Small reward for knowing it even after time
      updateBuzzerStats();
    }
    buzzerState.streak = 0;
    updateBuzzerStats();

    var result = document.createElement('div');
    result.className = 'result-display ' + (isCorrect ? 'correct' : 'wrong');
    if (isCorrect) {
      result.innerHTML = '&#10004; You knew it! +2 (but remember to buzz faster next time!)';
    } else if (userAns) {
      result.innerHTML = '&#10008; Not quite.';
    } else {
      result.innerHTML = '&#9200; No guess — check the answer below.';
    }
    area.appendChild(result);

    var correctDiv = document.createElement('div');
    correctDiv.className = 'correct-answer-display';
    correctDiv.innerHTML = '<strong>Answer:</strong> ' + escHtml(q.af);
    if (!isCorrect && userAns) correctDiv.innerHTML += '<br><span style="color:var(--text3);font-size:13px">You said: ' + escHtml(userAns) + '</span>';
    area.appendChild(correctDiv);

    buzzerHistory.push({ q: q.q, a: q.a, userAns: userAns || '', correct: isCorrect, points: isCorrect ? 2 : 0, date: new Date().toISOString() });
    saveData('buzzerHistory', buzzerHistory);

    var nextBtn = document.createElement('button');
    nextBtn.className = 'next-btn';
    nextBtn.textContent = buzzerState.qIndex < buzzerState.questions.length - 1 ? 'Next Question' : 'See Results';
    nextBtn.addEventListener('click', function() {
      buzzerState.qIndex++;
      showBuzzerQuestion();
    });
    area.appendChild(nextBtn);
  }

  input.addEventListener('keydown', function(e) { if (e.key === 'Enter') revealTimeUpAnswer(input.value); });
  document.getElementById('submitAnswer').addEventListener('click', function() { revealTimeUpAnswer(input.value); });
  document.getElementById('skipGuess').addEventListener('click', function() { revealTimeUpAnswer(''); });
}

function showBuzzerSummary() {
  buzzerState.active = false;
  const area = document.getElementById('buzzerArea');
  area.innerHTML = '<div style="text-align:center">' +
    '<h2>Round Complete!</h2>' +
    '<div class="quiz-score-display">' + buzzerState.score + ' pts</div>' +
