k by this author was retold by Jean Rhys [[REESS]] in Wide Sargasso Sea and follows the tale of a governess at Thornfield Hall. Identify this author who told the love story of Mr. Rochester and Jane Eyre.","a":"Charlotte Brontë","af":"Charlotte Brontë (accept Currer Bell before mentioned)","y":"2022","r":"Nationals"},{"n":3,"q":"The reign of this person saw the “White Terror” of the Chambre Introuvable [[SHAHM- bruh een-troo-VAH-bluh]]. The assassination of the Duc de Berry made this person more sympathetic to the Ultras. Name this French monarch who twice took the throne on the heels of the overthrow of Napoleon Bonaparte?","a":"Louis XVIII","af":"Louis XVIII (accept Louis the Desired; prompt on \"Louis\")","y":"2022","r":"Nationals"},{"n":4,"q":"Word of this ruler's loss against Miltiades [[mil-TEE-ah-deez]] was carried to his enemy's capital by the messenger Pheidippides [[fye-DIP-ih-deez]]. This successor of Cambyses II successfully defeated the Ionian Revolt. Defeated at the Battle of Marathon, what Persian king was succeeded by his son Xerxes I [[ZERK-seez the FIRST]]?","a":"Darius I","af":"Darius I (or Darius the Great; prompt on \"Darius\")","y":"2022","r":"Nationals"},{"n":5,"q":"Though not the Comanche, Yellow Wolf was a leader of this tribe which faced a cholera epidemic that prompted many members to join its Dog Soldiers. This tribe's Chief Black Kettle flew a white flag that was ignored during the Sand Creek Massacre. Name this Great Plains tribe whose territory fittingly included part of what is now Wyoming.","a":"Cheyenne","af":"Cheyenne (or Suhtai; or Sutaio; or Notameohm’esehese) 2022 Elementary National History Bee Round 4","y":"2022","r":"Nationals"},{"n":6,"q":"The Organization Consul terrorist group assassinated this government's finance minister, Matthias Erzberger [[EHRTS-behr-guh]]. Friedrich Ebert was the first president of this government that used the Freikorp [[FRY-kor]] to crush a revolt from the communist Spartacist League. The Beer Hall Putsch targeted, what democratic German government that was dismantled by the Nazis?","a":"Weimar [[VY-mar]] Republic","af":"Weimar [[VY-mar]] Republic (or Weimarer Republik; accept Deutsche Republik or German Republic before \"German\" is mentioned; prompt on \"Germany\")","y":"2022","r":"Nationals"},{"n":7,"q":"Pushkin called this person who died mysteriously \"the Sphinx who took his riddle with him to the grave.\" This man was the first king of Congress Poland, and his death was followed by the unsuccessful Decembrist Revolt. Name this Tsar who first allied with and later opposed Napoleonic France.","a":"Alexander I","af":"Alexander I (or Aleksándr I Pávlovich; prompt on \"Alexander\")","y":"2022","r":"Nationals"},{"n":8,"q":"People of this ethnic group in Western Asia adopted Christianity in the year 301 and claim to be the world’s oldest kingdom to become Christian. After a 1915 incident in the Anatolian city of Van, some leaders of this ethic group were killed. What is the name of this ethnic group, victims of an Ottoman genocide still denied by the Turkish government?","a":"Armenian","af":"Armenian (accept variations on \"Armenia\"; accept Armenian Genocide)","y":"2022","r":"Nationals"},{"n":9,"q":"This military engagement was codenamed Operation Detachment. American photographer Joe Rosenthal earned a Pulitzer Prize for an image he made at this event. Name this bloody World War Two battle at which U.S. Marines iconically raised the American flag on Mount Suribachi.","a":"Battle of Iwo Jima","af":"Battle of Iwo Jima (accept Raising the Flag on Iwo Jima)","y":"2022","r":"Nationals"},{"n":10,"q":"The first of these structures was erected in 312 BC and emptied near the Porta Trigemina. Five centuries later, the eleventh of these structures was built and can still be seen today with its sixty-foot arches towering over the ditch of Centocelle [[chen-toh-CHEH-leh]]. Name these structures that provided water to what is now the capital of Italy?","a":"Roman Aqueducts","af":"Roman Aqueducts (or Aqueducts of Rome; prompt on \"Aqueduct,\" \"Roman,\" or \"Rome\")","y":"2022","r":"Nationals"},{"n":11,"q":"Emilio Mola coined the term \"fifth column\" during this conflict, which included the Abraham Lincoln Brigade. During this conflict, the Condor Legion killed hundreds of Basque civilians in an air raid, many of whom lived in Guernica. Name this 1930s conflict in which the Republicans lost to the Nationalists under Francisco Franco.","a":"Spanish Civil War","af":"Spanish Civil War (or Guerra Civil Española) 2022 Elementary National History Bee Round 4","y":"2022","r":"Nationals"},{"n":12,"q":"During World War One, the Czarist regime arrested this man for revolutionary activity and exiled him to Siberia. This man’s exile by Joseph Stalin occurred after this Bolshevik and Joachim von Ribbentrop signed a short-lived non-aggression pact establishing a truce between the USSR and Nazi Germany. Identify this Soviet Foreign Minister for whom an incendiary “Cocktail” is named.","a":"Vyacheslav Molotov","af":"Vyacheslav Molotov (or Vyacheslav Mikhailovich Molotov; accept Vyacheslav Mikhailovich Skryabin; accept Molotov Cocktail)","y":"2022","r":"Nationals"},{"n":13,"q":"Prior to this man’s death by poisoned arrow, he was tasked with converting locals to Christianity, including Rajah Humabon. Following this man’s death at the Battle of Mactan, his co-commanders, Juan Serrano and Duarte Barbosa, succeeded him and sailed out of the Philippines. Name this Portuguese explorer whose crew completed the first circumnavigation of the globe.","a":"Ferdinand Magellan","af":"Ferdinand Magellan (or Fernão de Magalhães)","y":"2022","r":"Nationals"},{"n":14,"q":"This document excluded twelve Louisiana parishes and seven Virginia counties. This document expanded the number of men available to the U.S. Army, and this document went into full effect in Texas on June 19, 1865. Name this document, a preliminary form of which was issued after the Battle of Antietam, freeing Southern slaves.","a":"Emancipation Proclamation","af":"Emancipation Proclamation (or Proclamation 95)","y":"2022","r":"Nationals"},{"n":15,"q":"A man with this surname, with the given name \"Peachy,\" was defended in the 1859 Greek Crafton murder trial by his third cousin, Abraham Lincoln. A president of this surname signed the Sherman Antitrust Act, and another man with this surname won the battles of the Thames [[TEMZ]] and Tippecanoe. Give this name of presidents Benjamin and William Henry.","a":"Harrison","af":"Harrison (accept Peachy Harrison; accept Benjamin Harrison; accept William Henry Harrison)","y":"2022","r":"Nationals"},{"n":16,"q":"This event was first organized by Fred Lebow and Vincent Chiappetta in 1970 and was won by Gary Muhrcke. In 1976, George Spitz proposed changes to this event, and this event was supported by Percy Sutton, who was the Manhattan Borough President at the time. Name this annual sporting event that takes place on the first Sunday in November?","a":"TCS New York City Marathon","af":"TCS New York City Marathon (accept NYC in place of New York City; prompt on \"New York,\" \"New York City,\" or \"Marathon\") 2022 Elementary National History Bee Round 4","y":"2022","r":"Nationals"},{"n":17,"q":"This leader coined the phrase, \"Political power grows out of the barrel of a gun,\" and compared two class groups to a bomb waiting for ignition in the essay \"On Contradiction.\" This leader's sayings were collected in his Little Red Book. Name this first Chairman of the People's Republic of China.","a":"Mao Zedong","af":"Mao Zedong (or Chairman Mao; prompt on \"Zedong\" or \"Tse-tung\")","y":"2022","r":"Nationals"},{"n":18,"q":"General Edward Braddock died during this war, days after his four-way attack failed at Monongahela [[mah-non-gah-HEH-lah]]. Troops at Fort Le Boeuf [[luh-BUHF]] were warned to leave by the commander of the Virginia Regiment, twenty-two year old George Washington. Name this North American war in which various Native American tribes supported either the British or the French.","a":"French and Indian War","af":"French and Indian War (accept Guerre de la Conquête; accept War of the Conquest; prompt on “Seven Years’ War”)","y":"2022","r":"Nationals"},{"n":19,"q":"A house with this name competed with the House of Wittelsbach [[VIT-els-bahk]] over the Holy Roman Empire. The 1815 Treaty of Paris transformed that country with this name into a Grand Duchy in personal union with the Netherlands. Name this small Low Countries nation that established economic ties with neighboring Belgium.","a":"Luxembourg","af":"Luxembourg (accept Grand Duchy of Luxembourg; accept Grand Duche de Luxembourg; accept House of Luxembourg; accept Luxembourg Dynasty)","y":"2022","r":"Nationals"},{"n":20,"q":"In 1919, people who weren't playing this genre of music were threatened by the Axeman of New Orleans. Musicians in this genre, such as Mulatu Astatke, faced persecution in Ethiopia as Derg leaders were suspicious of this genre's free-form nature. Notably played by Charlie Parker and Duke Ellington, what is this genre of music, related to blues or ragtime, that emphasizes improvisation and its Afro-Cuban roots?","a":"Jazz","af":"Jazz","y":"2022","r":"Nationals"},{"n":21,"q":"After the overthrow of Horacio Vazquez, one dictator took control of this country and later committed the Parsley Massacre. In 1937, nearly twenty thousand Haitians living in this country were killed following a border dispute. Long-governed by “El Jefe” [[ell HEH-feh]], Rafael Trujillo [[troo-HEE-yoh]], what is this country that shares Hispaniola with Haiti?","a":"Dominican Republic","af":"Dominican Republic (or Republica Dominicana; accept The Dominican; accept La Dominicana)","y":"2022","r":"Nationals"},{"n":22,"q":"This person claimed that “None but the Almighty God shall prevent my marching\" before stealing gunpowder from the British. This person planned to surrender West Point to the British and then led British troops against Americans. Name this Revolutionary War general whose name is now synonymous with betrayal and treachery.","a":"Benedict Arnold 2022 Elementary National History Bee Round 4","af":"Benedict Arnold 2022 Elementary National History Bee Round 4","y":"2022","r":"Nationals"},{"n":23,"q":"The 1817 \"Alabama Fever\" was a land rush due to high demand for this crop, global production of which was hurt by the Lancashire Famine. James Hammond gave a speech claiming that the South was invincible because this crop \"is king.\" name this crop, whose processing was made easier by a \"gin\" created by Eli Whitney.","a":"Cotton","af":"Cotton (accept Cotton gin; accept King Cotton)","y":"2022","r":"Nationals"},{"n":24,"q":"The effects of these things were the cause of death of glassblower Clarence Dally while he was an assistant to Thomas Edison. The wife of the man who discovered these things reportedly exclaimed, \"I have seen my death!\" after seeing a product of these things. Wilhelm Röntgen [[REHNT-gen]] discovered, what electromagnetic radiation that is used in medical imaging?","a":"X-rays","af":"X-rays (or X-radiation; accept Röntgen Radiation before mentioned)","y":"2022","r":"Nationals"},{"n":25,"q":"John Filo photographed Mary Ann Vecchio [[veh-KYO]] kneeling over a body at one of these places. The Black luminary Mary Mceod Bethune merged one of these institutions with a nearby one named for Reverend Alfred Cookman. Name these institutions that include Kent State and Harvard.","a":"Colleges","af":"Colleges (accept University; accept Kent State University; accept Bethune- Cookman University or Bethune-Cookman College; prompt on \"Schools\"; prompt on \"Institute\" or \"Institute of Technology\") Extra Questions","y":"2022","r":"Nationals"},{"n":1,"q":"This state and Utah were the only two won by William Howard Taft while running for re-election, and this state is the only one ever carried by the Anti-Masonic party. Seth Warner and Ethan Allen hailed from a place that later became this state and led its Green Mountain Boys. Name this New England state that was home to Justin Morrill and now hosts U.S. Senators Patrick Leahy and Bernie Sanders.","a":"Vermont","af":"Vermont (accept Vermont Republic)","y":"2022","r":"Nationals"},{"n":2,"q":"Norman Mailer claimed this actress was killed by CIA agents. After Princess Diana’s death, Elton John called this woman by her given name, Norma Jean, and christened her, “a candle in the wind.\" name this blonde bombshell who starred in Some Like It Hot and The Seven Year Itch.","a":"Marilyn Monroe","af":"Marilyn Monroe (or Norma Jeane Mortenson; or Norma Jeane Baker; prompt on \"Marilyn\")","y":"2022","r":"Nationals"},{"n":1,"q":"This state contains the majority of land transferred in the Great Grant Deed, which is also known as the Transylvania Purchase. One politician representing this state developed the American System and led negotiations for the Missouri Compromise and the Compromise of 1850. Name this Bluegrass State and home-state of Henry Clay.","a":"Kentucky","af":"Kentucky (accept KY)","y":"2022","r":"Nationals"},{"n":2,"q":"Twin obelisks were raised by this ruler at the entrance to the Temple of Karnak, one of which still stands today. A nine-foot tall statue of this ruler depicts her kneeling while holding offering vessels. Regent and stepmother to Thutmose III, what 18th Dynasty pharaoh was the longest-reigning woman in ancient Egypt?","a":"Hatshepsut","af":"Hatshepsut","y":"2022","r":"Nationals"},{"n":3,"q":"In British America, this event took the form of upheavals such as Leisler’s [[LAYS- luhs]] Rebellion and the dismantling of the Dominion of New England.As a result of this event, the English Crown agreed to a Bill of Rights. Name this event which overthrew a Catholic king and established Parliamentary supremacy under the reign of William and Mary.","a":"Glorious Revolution","af":"Glorious Revolution (accept Bloodless Revolution; prompt on descriptive answers)","y":"2022","r":"Nationals"},{"n":4,"q":"On his final venture, Tom Crean served as second officer to this explorer, spending 492 days drifting on ice. This man traveled to South Georgia Island in an attempt to save participants of the Imperial Trans-Antarctic Expedition after his crew got trapped on Elephant Island. Name this polar explorer who salvaged the Endurance expedition.","a":"Ernest Shackleton","af":"Ernest Shackleton (or Ernest Henry Shackleton)","y":"2022","r":"Nationals"},{"n":5,"q":"The founder of this religion declared himself a messenger of God in the Garden of Ridván. This religion's founder was imprisoned for his last 24 years in Acre [[AH-kruh]]. Governed from Haifa, Israel by the Universal House of Justice, this is, what Abrahamic religion from Iran, which was founded by Baha'u'llah?","a":"Baháʼí Faith","af":"Baháʼí Faith (accept Baha'iyyah) 2022 Elementary School National History Bee Round 5","y":"2022","r":"Nationals"},{"n":6,"q":"Hobbyist videographer George Holliday filmed a video of this man being arrested and sent it to the television station KTLA. This man appeared on television in 1992 and made the often-misquoted plea for peace, “Can we all get along?” name this man who was brutally beaten by police officers in 1991, an event that sparked riots in Los Angeles after the officers were acquitted of excessive force charges.","a":"Rodney King","af":"Rodney King (or Rodney Glen King)","y":"2022","r":"Nationals"},{"n":7,"q":"Having earned a reputation for bravery during World War One, this man was tapped to command the personal escort battalion of Adolf Hitler in the years prior to the invasion of Poland. Promoted in 1940, this field marshal and skilled tactician in tank warfare commanded the Afrika Korps in the North African theater of World War Two. Name this German general who was nicknamed “The Desert Fox.”","a":"Erwin Rommel","af":"Erwin Rommel (or Johannes Erwin Eugen Rommel; prompt on \"Desert Fox\")","y":"2022","r":"Nationals"},{"n":8,"q":"The Pasporta Servo is a home sharing service for speakers of this language, the name of which translates to \"one who hopes.\" This language grew out of the Homaranismo [[hoh- mah-rah-NEES-moh]] reform Judaism movement. Name this most-widely spoken artificial language in the world, created by L. L. Zamenhof in 1887.","a":"Esperanto","af":"Esperanto (or Lingvo Internacia)","y":"2022","r":"Nationals"},{"n":9,"q":"This person’s many poems include The Siege of Corinth and the thirty selections in Hebrew Melodies. This person’s only legitimate child is often regarded as the world’s first computer programmer. Name this person, whose death during the siege of Missolonghi [[mee-soh-LOHN-gee]] enshrined him as the exemplar of the Romantic Age.","a":"Lord Byron","af":"Lord Byron (or George Gordon Byron; or 6th Baron Byron)","y":"2022","r":"Nationals"},{"n":10,"q":"Ant Financial is a subsidiary of this company whose CEO, Daniel Zhang [[ZHAHNG]], helped turn \"Singles' Day\" on November 11th into the world's largest shopping day. This company that competes with JD.com and Tencent, controversially acquired the South China Morning Post in 2016. What is this Chinese e-commerce company founded by Jack Ma?","a":"Alibaba Group Holding Limited","af":"Alibaba Group Holding Limited","y":"2022","r":"Nationals"},{"n":11,"q":"In this year, Faisal II became the last king of Iraq, following the death of his father, King Ghazi. This year marked the end of the Spanish Civil War and the beginning of the dictatorship of Francisco Franco. During this year, Russia invaded Finland in, what year in which Nazi Germany invaded Poland, prompting World War Two.","a":"1939 2022 Elementary School National History Bee Round 5","af":"1939 2022 Elementary School National History Bee Round 5","y":"2022","r":"Nationals"},{"n":12,"q":"Hugh Latimer was one of the three \"Martyrs\" named for this city after being burned at the stake. John Balliol and Walter de Merton name colleges at a university in this city, which has been the destination of recipients of the Rhodes Scholarship. Name this English city that houses a university which has rivaled Cambridge since the 13th century.","a":"Oxford","af":"Oxford (accept Oxford Martyrs; accept University of Oxford or Oxford University)","y":"2022","r":"Nationals"},{"n":13,"q":"The original copy of this document is lost, however William Bradford produced a handwritten transcript for his journal. This document was signed by 41 men including John Carver, Edward Winslow, and William Brewster. Name this document signed on November 21, 1620 in Provincetown Harbor onboard the namesake ship, the first governing document of the Plymouth colony.","a":"Mayflower Compact","af":"Mayflower Compact (or Agreement Between the Settlers of New Plymouth)","y":"2022","r":"Nationals"},{"n":14,"q":"In 1977, this Central African country had its Aouzou Strip annexed by Libya with support from the Soviet Union. Ten years later, with support from its former colonizer, France this country’s president, Hissène Habré, won back that territory. Name this Central African country, known as “The Dead Heart of Africa” with a capital at N'Djamena [[nn-jah-MAY-nah]].","a":"Republic of Chad","af":"Republic of Chad (or Republique du Tchad; or Jumhuriyat Tshad)","y":"2022","r":"Nationals"},{"n":15,"q":"A member of this family gained inspiration for his business after his experience as a bellhop at the Hotel Savoy in London. Another member of this family was assassinated by a hitman hired by his ex-wife, Patrizia Reggiani [[reh-JYAH-nee]]. What family founded an Italian luxury fashion brand and were the subject of a 2021 film starring Lady Gaga and Adam Driver?","a":"Gucci","af":"Gucci (accept Guccio Gucci; accept Rodolfo Gucci; accept Maurizio Gucci; accept House of Gucci)","y":"2022","r":"Nationals"},{"n":16,"q":"This empire, which was divided into four suyus, used quipu [[KEE-poo]] for communication and record-keeping. In 1911, archaeologist Hiram Bingham found this empire's ruins at Machu Picchu [[MAH-choo PEE-choo]] in Peru. Conquered by Francisco Pizarro in 1533, what pre-Columbian empire ruled from Cusco [[KOOS-koh]]?","a":"Inca Empire","af":"Inca Empire (or Incas; or Incan Empire; accept Realm of the Four Parts; or Four Parts Together; or Tawantinsuyu) 2022 Elementary School National History Bee Round 5","y":"2022","r":"Nationals"},{"n":17,"q":"Medieval scholar Barani writes that \"not a dog and cat\" was left in this city after a sultan of it, named Muhammad bin Tughluq [[tug-LUCK]], moved the capital to Devagiri. Another sultan of this city, named Ibrahim Lodi, died on the battlefield at Panipat attempting to stop Babur the Tiger's invasion. Name this capital territory of India.","a":"National Capital Territory of Delhi","af":"National Capital Territory of Delhi (or NCT of Delhi; accept New Delhi; accept Old Delhi)","y":"2022","r":"Nationals"},{"n":18,"q":"A report published in 2010 about this location led John M. Mcugh to reprimand its superintendent, John C. Metzler, Jr. This location was established on the estate of Mary Anna Custis Lee during the U.S. Civil War and began its current purpose with William Henry Christman in 1864. Name this location in a namesake county in Virginia where the deceased military are buried.","a":"Arlington National Cemetery","af":"Arlington National Cemetery (accept Arlington County)","y":"2022","r":"Nationals"},{"n":19,"q":"This lake entered European history in 1776, when Silvestre Vélez de Escalante learned of its existence from the Utes [[YOOTS]]. In 1847, pioneers led by Brigham Young settled to the south of this lake and named their new city after it. Name this terminal lake in Utah, sometimes called \"America's Dead Sea.\"","a":"Great Salt Lake","af":"Great Salt Lake (prompt on \"Salt Lake City\")","y":"2022","r":"Nationals"},{"n":20,"q":"This person was the first Time Man of the Year and supported the America First Committee after resigning from the Army Air Force. Bruno Hauptmann was executed for allegedly kidnapping and killing this man’s child in the “Crime of the Century.” name this pilot of the Spirit of St. Louis who became the first person to fly solo across the Atlantic.","a":"Charles Lindbergh","af":"Charles Lindbergh (or Charles Augustus Lindbergh)","y":"2022","r":"Nationals"},{"n":21,"q":"After this man was captured at the Battle of Curzola upon returning to his home city, he met Rustichello da Pisa in a Genoese prison. This man's stories of a seventeen-year journey were compiled in a book called Il Milione [[eel-meel-YOH-neh]]. Name this Venetian merchant who met Kublai Khan while traveling along the Silk Road.","a":"Marco Polo","af":"Marco Polo (or Marco Emilio Polo)","y":"2022","r":"Nationals"},{"n":22,"q":"A historian from this region named Diodorus wrote a text called the Bibliotheca historica, and this region's corrupt leadership led to the First and Second Servile Wars. On this island, Mamertine mercenaries requested an alliance with Rome against Hiero II, thus sparking the First Punic War. Name this island off the coast of Southern Italy.","a":"Sicily","af":"Sicily (or Sicilia) 2022 Elementary School National History Bee Round 5","y":"2022","r":"Nationals"},{"n":23,"q":"James Franklin was an early leader in this industry, which was advanced by staff of the Massachusetts Spy. So-called \"penny\" products were mass-produced by companies in this industry, which included the colonial-era Boston Gazette. Name this industry that printed political cartoons alongside columns.","a":"Newspapers","af":"Newspapers (accept Journalism; prompt on \"Paper\" or \"News\")","y":"2022","r":"Nationals"},{"n":24,"q":"This country’s “Speak Good English” movement attempted to dissuade citizens from using its creole. The first prime minister of this country, who co-founded its People’s Action Party, cried on television after this country was expelled from Malaysia. Lee Kuan Yew led, what Asian city-state?","a":"Singapore","af":"Singapore (or Republic of Singapore)","y":"2022","r":"Nationals"},{"n":25,"q":"John Singleton Copley's painting of this man depicts him holding his chin in one hand and a teapot in the other. One poem about this man describes the idea behind a lantern signal as \"One, if by land, and two, if by sea.\" name this American revolutionary immortalized by a Henry Wadsworth Longfellow poem describing this man's \"midnight ride\" to warn of an incoming British attack.","a":"Paul Revere","af":"Paul Revere (accept word forms of Paul Revere's Midnight Ride; accept \"Paul Revere's Ride\") Extra Questions","y":"2022","r":"Nationals"},{"n":1,"q":"During this battle, at which Joseph Warren was killed, forces under the leadership of William Prescott retreated to Cambridge. At this battle, Israel Putnam allegedly ordered his troops not to fire until they saw the whites of their enemies' eyes. Name this early American Revolutionary War battle that took place after Lexington and Concord and was partially fought on a namesake hill.","a":"Battle of Bunker Hill","af":"Battle of Bunker Hill (accept Battle of Breed's Hill before mentioned)","y":"2022","r":"Nationals"},{"n":2,"q":"This man organized the unsuccessful Albany Movement while serving as president of the Southern Christian Leadership Conference. This man was assassinated at the Lorraine Motel in Memphis, which is now home to the National Civil Rights Museum. Name this man who led the 1963 March on Washington and delivered the \"I Have a Dream\" speech.","a":"Martin Luther King Jr","af":"Martin Luther King Jr. (or Michael King Jr.; accept Dr. King; accept MLK)","y":"2022","r":"Nationals"},{"n":1,"q":"Starting in 1932, an institution with this name worked with the Public Health Service on an immoral syphilis study. That institution of this name educated a group of World War II African-American fighter pilots known as its namesake “airmen”. Name this Alabama university whose first president was Booker T. Washington.","a":"Tuskegee","af":"Tuskegee (accept Tuskegee University; accept Tuskegee Syphilis Study; accept Tuskegee Institute; accept Tuskegee Airmen)","y":"2022","r":"Nationals"},{"n":2,"q":"This event was fictionalized by Joyce Carol Oates’s book Black Water. This event resulted in the death of Mary Jo Kopechne [[koh-PEK-nee]], who drowned in Poucha Pond after an Oldsmobile was driven off the Dike Bridge. Name this 1969 event involving a tragic car accident on a small Massachusetts island, caused by Senator Ted Kennedy.","a":"Chappaquiddick Incident","af":"Chappaquiddick Incident (accept synonymous answers involving Chappaquiddick)","y":"2022","r":"Nationals"},{"n":3,"q":"This man rejected Aristotle's cosmology in a work in which he identified 48 constellations, which was expanded upon in his book Tetrabiblos. This author took inspiration from a star catalog by Hipparchus for a treatise in which he posited a geocentric model. Name this 2nd-century Egyptian who authored the Almagest.","a":"Claudius Ptolemy","af":"Claudius Ptolemy","y":"2022","r":"Nationals"},{"n":4,"q":"This man lived in Iceland as a fugitive from the United States after playing an illegal match in Yugoslavia. This figure defeated Boris Spassky in 1972 to gain his highest title in what was called “The Match of the Century”. Name this reclusive American chess player, the only Non-Soviet World Champion between 1948 and 1991.","a":"Bobby Fischer","af":"Bobby Fischer (or Robert James Fischer)","y":"2022","r":"Nationals"},{"n":5,"q":"On this show, Rob Lowe played deputy communications director Sam Seaborn, who was initially intended as the protagonist of this show by its creator Aaron Sorkin. A three- time winner of the Emmy for Outstanding Drama Series, what is this television show starring Martin Sheen as President Josiah Bartlet, which is named for a part of the White House?","a":"The West Wing 2022 Elementary School National History Bee Round 6","af":"The West Wing 2022 Elementary School National History Bee Round 6","y":"2022","r":"Nationals"},{"n":6,"q":"Membership in this confederacy increased to six with the addition of a group displaced by war from North Carolina in the early 1700s. This confederacy allied with English colonies through an agreement known as the Covenant Chain. The American Revolution undermined the unity of, what Native American confederacy which included the Oneida and the Mohawk?","a":"Iroquois Confederacy","af":"Iroquois Confederacy (accept Haudenosaunee or Ongweh'onweh in place of Iroquois; accept \"League\" in place of \"Confederacy\"; accept Five Nations; accept Six Nations)","y":"2022","r":"Nationals"},{"n":7,"q":"This building contains the tomb of the artist Raphael. Manfredo Manfredi won a competition to design the tomb of King Victor Emmanuel II in this building, which contains an oculus in the middle of the world’s largest unreinforced concrete dome. Name this former Roman temple which takes its name from the Greek for \"all the gods.\"","a":"Pantheon","af":"Pantheon","y":"2022","r":"Nationals"},{"n":8,"q":"This civilization was referred to as Meluhha in the Gudea [[goo-DEH-ah]] cylinder, which described its trading relationship with Sumer. The Pashupati Seal and Great Bath were discovered in this civilization’s settlement of Mohenjo Daro. Name this civilization along an Indo-Pakistani river valley that encompassed the city of Harappa.","a":"Indus Valley Civilization","af":"Indus Valley Civilization (accept Indus Civilization; accept Harappan civilization before \"Harappa\" is mentioned)","y":"2022","r":"Nationals"},{"n":9,"q":"The current site of this location was formerly the headquarters of O.S.S. The “Crisis of Confidence” speech was delivered after a ten-day retreat at this place. A historic agreement between Egypt and Israel was signed at this location, which was re-named in 1953 for Dwight Eisenhower’s grandson. Name this U.S. Presidential retreat camp.","a":"Camp David","af":"Camp David (or Naval Support Facility Thurmont; accept Shangri-La)","y":"2022","r":"Nationals"},{"n":10,"q":"This event was not alleviated by the repeal of the Corn Laws by Robert Peel. People travelled on coffin ships to escape this event, which was caused by the organism Phytophthora infestans, a type of blight. What 1845 to 1852 event devastated Ireland due to their dependence on a particular crop?","a":"Irish Potato Famine","af":"Irish Potato Famine (or Great Hunger; accept Great Irish Famine before \"Ireland\" is mentioned; prompt on \"Famine\" or any synonymous words) 2022 Elementary School National History Bee Round 6","y":"2022","r":"Nationals"},{"n":11,"q":"The kingdom of Ki'che united the southern portion of this civilization. The fifth- longest-reigning monarch of all time, Pacal the Great, ruled the state of Palenque in this civilization, which also created the pyramids at Tikal. Name this Mesoamerican civilization that built the site of Chichen Itza in the Yucatan Peninsula, known for their long-count calendar.","a":"Mayas","af":"Mayas (or K’iche; accept Mayans in place of Mayas)","y":"2022","r":"Nationals"},{"n":12,"q":"After World War One, this man led the American Relief Administration. Anti- Catholicism damaged this man's opponent, Al Smith, in the election of 1928. A public works project later named for this man formed the reservoir Lake Mead by blocking the Colorado River. Name this U.S. President at the outset of the Great Depression.","a":"Herbert Hoover","af":"Herbert Hoover (or Herbert Clark Hoover)","y":"2022","r":"Nationals"},{"n":13,"q":"During the Spanish Civil War, French forces supervised this country as a result of conflicts in nearby Basque Country and Aragon. This is the only country where Catalan is the primary official language. Name this European microstate with two heads of state, the French president and the Bishop of Urgell, which is located in the Pyrenees Mountains.","a":"Principality of Andorra","af":"Principality of Andorra (or Principat d'Andorra)","y":"2022","r":"Nationals"},{"n":14,"q":"In the late 1990s, this country fought against its southern neighbor in the Badme War, which was followed by the Second Afar Insurgency. Following the 1993 independence of this country, Ethiopia became the world’s most populous landlocked nation after losing its coast on the Red Sea. Name this African country governed from Asmara.","a":"State of Eritrea","af":"State of Eritrea (or Hagere Ertra)","y":"2022","r":"Nationals"},{"n":15,"q":"This astronomer was discovered to have redacted key parts of the translation of a 1927 paper by George Lemaître. A device named for this astronomer captured high- resolution images of Jupiter's collision with Shoemaker-Levy 9. This astronomer names a constant that describes the Universe's expansion. Name this astronomer who also names a NASA space telescope.","a":"Edwin Hubble","af":"Edwin Hubble (or Edwin Powell Hubble; accept Hubble Space Telescope; accept Hubble's Constant; accept Hubble's Law; accept Hubble-Lemaitre Law)","y":"2022","r":"Nationals"},{"n":16,"q":"This holiday is based on the Nguzo Saba, or Seven Principles, which include self- determination and cooperative economics. This holiday was founded in 1966 by Maulana Karenga and involves lighting green, red, and black candles in a kinara. Name this late-December celebration of African-American culture.","a":"Kwanzaa 2022 Elementary School National History Bee Round 6","af":"Kwanzaa 2022 Elementary School National History Bee Round 6","y":"2022","r":"Nationals"},{"n":17,"q":"A podstakannik [[pohd-STAH-kah-neek]] is a traditional metal holder of glasses for consuming this good, which is often consumed with jam in Russia. This beverage is believed to have entered Russia after the Cossacks Petrov and Yalyshev visited China. Name this popular drink in Russian culture, which is traditionally prepared with hot water boiled with leaves in a samovar.","a":"Tea","af":"Tea (accept Camellia sinensis; accept Kusmi tea)","y":"2022","r":"Nationals"},{"n":18,"q":"The Palace of the Republic was built in this city to house its country's Volkskammer. This city's redevelopment of Alexanderplatz added landmarks such as the World Clock and the Fernsehturm [[FEHRN-seh-toorm]]. Name this city in the German Democratic Republic that merged with a western neighbor in 1990.","a":"East Berlin","af":"East Berlin (or Ost-Berlin; prompt on “Berlin”)","y":"2022","r":"Nationals"},{"n":19,"q":"The League of Augsburg was founded in opposition to this person’s aspirations. This person’s commitment to Catholicism led him to revoke the Edict of Nantes, which had protected the rights of French Huguenots. Name this king whose absolutist principles are expressed in the phrase “L'état, c'est moi,” [[leh-TAT ses MWAH]] or \"I am the State.\"","a":"Louis XIV [[the Fourteenth]]","af":"Louis XIV [[the Fourteenth]] (accept Louis the Great; or Louis le Grande; accept Louis the Sun King; or Louis le Roi Soleil; prompt on \"Sun King\" or \"Louis\" alone)","y":"2022","r":"Nationals"},{"n":20,"q":"This object receives energy from an Integrated Truss Structure with eight solar arrays. Prior to the creation of this object, The United States became involved in the MIR [[MEER]] program, which Russia will likely abandon in 2025. Replacing Skylab, what is this largest manmade object in outer space, an artificial satellite which has housed visitors from multiple nations?","a":"International Space Station","af":"International Space Station (or ISS)","y":"2022","r":"Nationals"},{"n":21,"q":"Rita Johnston led this province in 1991, making her this province's last Social Credit premiere as well as the first female provincial leader in Canadian history. This province's largest city was once known as Gastown, and hosted the 2010 Winter Olympics. Name this western province of Canada, whose largest island and city are named after explorer George Vancouver.","a":"British Columbia","af":"British Columbia (or BC)","y":"2022","r":"Nationals"},{"n":22,"q":"In 1837, a geographic feature with this name was the site of the burning of an American ship by British forces during the Caroline Affair. Annie Edson Taylor became the first person to successfully descend a feature with this name in 1901, which she did in a barrel. Give this name of a set of waterfalls in upstate New York.","a":"Niagara","af":"Niagara (accept Niagara Falls; accept Niagara River; accept Treaty of Niagara) 2022 Elementary School National History Bee Round 6","y":"2022","r":"Nationals"},{"n":23,"q":"Heads of state that have died from this event possibly include Pierre Nkurunziza [[nn-koo-roon-ZEE-zah]] of Burundi. Air Tahiti Nui ran the world's longest nonstop commercial flight from Papeete [[pah-peh-EH-teh]] to Paris to avoid foreign stopovers due to this event, which has caused the greatest economic recession since the 1930s. Name this pandemic that originated in Wuhan, China.","a":"COVID-19 pandemic","af":"COVID-19 pandemic (accept equivalents like Coronavirus pandemic)","y":"2022","r":"Nationals"},{"n":24,"q":"Vehicles of this name are commonly denoted as VC-25. The first iteration of a vehicle with this name was dubbed the Sacred Cow and was used to attend the Yalta Conference. These vehicles are typically based at Andrews Air Force Base, and Lyndon Johnson took his Oath of Office on one of them. Name this plane used to carry the president of the United States.","a":"Air Force One","af":"Air Force One (prompt on general answers about presidential aircraft; prompt on “plane” or “airplane”)","y":"2022","r":"Nationals"},{"n":25,"q":"This site contains the mountain Zoroaster Temple, which is topped by a butte named for Buckey O'Neill. This site, whose base contains Vishnu schist formations, is the home of the Havasupai [[hah-vah-SOO-\"pie\"]] people. John Wesley Powell mapped the length of, what landmark in Arizona, formed by the Colorado River?","a":"Grand Canyon","af":"Grand Canyon (accept Grand Canyon Village) Extra Questions","y":"2022","r":"Nationals"},{"n":1,"q":"1 Infinite Loop was this company's headquarters from 1993 to 2017, until Norman Foster designed its new campus nicknamed “The Spaceship”. Peter Q. Bolin designed the glass cube housing this company's logo at its flagship store on 5th Avenue in New York City. Name this technology company founded by Steve Wozniak and Steve Jobs.","a":"Apple Inc","af":"Apple Inc. (accept Apple Computer Company; accept Apple Computer, Inc.)","y":"2022","r":"Nationals"},{"n":2,"q":"In 1788, Robert Morris and William Maclay were the first two men appointed to this position, but in 1913, the 17th amendment stipulated that holders of this office be elected by popular vote. As of 2022, five politicians born outside of the U.S. Hold this position. What office is held by Tammy Duckworth and Ted Cruz?","a":"United States Senator","af":"United States Senator (prompt on \"Congressperson\" and gendered versions of the word)","y":"2022","r":"Nationals"},{"n":1,"q":"Nathaniel Hawthorne wrote this person’s campaign biography and died in his company. Before taking his highest office, this politician and his wife survived a train wreck that killed their son, Benjamin. Losing popularity by supporting the Kansas-Nebraska Act, who was this fourteenth president, the only U.S. President from New Hampshire?","a":"Franklin Pierce","af":"Franklin Pierce","y":"2022","r":"Nationals"},{"n":2,"q":"After this man's death at the hands of Parthian general Surena at the Battle of Carrhae [[KAR-ay]], molten gold was poured down his throat. This politician crucified the followers of Spartacus's Slave Revolt along the Appian Way. Name this member of the First Triumvirate along with Caesar and Pompey, often called \"the richest man in Rome.\"","a":"Marcus Licinius Crassus","af":"Marcus Licinius Crassus","y":"2022","r":"Nationals"},{"n":3,"q":"This woman published the devotional book Prayers or Meditations, making her the first woman to publish an English work in England under her own name. This woman's fourth marriage was to the brother of Jane Seymour, which occurred in 1547 after the death of her more famous third husband. Preceded by Catherine Howard as queen of England, who was this sixth and final wife of Henry VIII [[the Eighth]]?","a":"Catherine Parr","af":"Catherine Parr (or Kateryn Parr)","y":"2022","r":"Nationals"},{"n":4,"q":"Early knowledge of these people predominantly comes from two sets of tablets, the Anitta text and the Tale of Zalpuwa. Following the end of Telepinu’s reign, this group’s Middle Kingdom began. King Muwatalli II [[the Second]] ruled these people, whose capital was Hattusa. Name this group of Anatolian people whose namesake empire dwindled after losing to the Egyptians at the Battle of Kadesh.","a":"Hittite Empire","af":"Hittite Empire (accept the Hittites; accept Syro-Hittite States; accept Hatti; or Hethites; accept Kingdom of Hattusa before mention)","y":"2022","r":"Nationals"},{"n":5,"q":"A chief from this tribe ambushed U.S. Soldiers in the Fetterman Fight and signed the 1868 Treaty of Fort Laramie. After winning Red Cloud's War, this tribe helped permanently close the Bozeman Trail. The winners of a battle between the 7th Cavalry and this tribe later ceded control of the Black Hills. George Custer was defeated by Crazy Horse and Sitting Bull of, what Great Plains tribe?","a":"Sioux","af":"Sioux (accept Great Sioux Nation; accept Santee; accept Lakota or Dakota or Nakota) 2022 Elementary School National History Bee Round 7","y":"2022","r":"Nationals"},{"n":6,"q":"In 1968, Richard Nixon got this man to run for president as a Democrat in exchange for ending an IRS probe. This politician was replaced by his wife Lurleen in his highest position. In 1963, this man stubbornly stood in front of Foster Auditorium in the \"Stand in the Schoolhouse Door.\" name this segregationist Alabama governor.","a":"George Wallace","af":"George Wallace (or George Corley Wallace Jr.)","y":"2022","r":"Nationals"},{"n":7,"q":"This god had one of his eyes gouged out and repaired, which explains why the moon is dimmer than the sun. This god painted a wooden boat to look like a rock in order to win a stone boat race. Pharaohs claimed to be incarnations of this god, who was symbolized by the Wadjet eye. Name this rival of Set, the son of Isis and Osiris, and god of kings.","a":"Horus","af":"Horus (or Heru; or Hor; or Har)","y":"2022","r":"Nationals"},{"n":8,"q":"Construction on facilities for this event was delayed by unionized workers led by Andre Desjardins [[deh-zhar-DAHN]]. Despite the objections of Robert Bourassa, Elizabeth II attended the opening ceremonies of this event. East German swimmers were unknowingly given performance-enhancing drugs prior to, what sporting event hosted in a French-speaking city in Canada?","a":"1976 Montreal Summer Olympic","af":"1976 Montreal Summer Olympic(s) Games (accept 1976 Summer Olympic(s) Games; prompt on partial answers)","y":"2022","r":"Nationals"},{"n":9,"q":"This war was triggered by a surprise attack at Port Arthur, which forced the weary Baltic Fleet to travel through the Tsushima Strait. The Treaty of Portsmouth ended this war and was mediated by Teddy Roosevelt. Name this conflict, fought largely in Manchuria, between countries led by Nicholas II and Emperor Meiji.","a":"Russo-Japanese War","af":"Russo-Japanese War (prompt on non-specific answers involving \"Russia\" and \"Japan\")","y":"2022","r":"Nationals"},{"n":10,"q":"This politician’s education minister, Adalbert Falk, helped pass the May Laws, which were part of this man’s campaign against the Catholic Church’s influence in his country called Kulturkampf [[kuhl-TOO-uhr-kahmpf]]. Known for advocating military spending in his \"Blood and Iron\" speech, who was this \"Iron Chancellor\" of Germany?","a":"Otto von Bismarck","af":"Otto von Bismarck (or Otto Eduard Leopold von Bismarck; or Otto, Prince of Bismarck; or Otto, Count of Bismarck-Schönhausen; accept Duke of Lauenburg)","y":"2022","r":"Nationals"},{"n":11,"q":"This landform was allegedly first discovered by Sir Walter Raleigh on his quest to find El Dorado. The base of this landform was first reached in 1946 by Alexander Laime [[\"LIME\"]], who travelled to it along the Orinoco River. Located on the edge of the Auyán- tepui [[ow-YAHN TEP-wee]] mountain, what is this Venezuelan wonder, the world’s tallest uninterrupted waterfall?","a":"Angel Falls","af":"Angel Falls (or Salto Ángel; or Kerepakupai Meru) 2022 Elementary School National History Bee Round 7","y":"2022","r":"Nationals"},{"n":12,"q":"After excavating in this location, Arthur Evans published his theories on the existence of Linear B, this region's ancient syllabic script. During the Paleolithic Age, humans settled this region at Kephala, Magasa, and Knossos, which contained the largest palace of the Minoan civilization. Name this largest and most populous of the Greek islands.","a":"Crete","af":"Crete (or Kriti; accept Knossos before “Kephala”)","y":"2022","r":"Nationals"},{"n":13,"q":"This prime minister secured Catholic emancipation by threatening to resign if George IV refused to sign the 1829 Relief Act. This man oversaw British support of Spanish patriots against France in the Peninsular War and allied with Gebhard von Blücher [[BLOO- kuh]] to win a battle that ended the Hundred Days. Name this British general who defeated Napoleon at Waterloo.","a":"1st Duke of Wellington","af":"1st Duke of Wellington (or Arthur Wellesley)","y":"2022","r":"Nationals"},{"n":14,"q":"A special prosecutor investigating this organization's corruption was fired by Attorney General Howard Mcrath, who was then himself fired by Harry Truman. In 1931, agents from this organization were the ones who finally convicted Al Capone. Name this tax-gathering arm of the U.S. Treasury Department.","a":"Internal Revenue Service","af":"Internal Revenue Service (or IRS; accept Bureau of Internal Revenue)","y":"2022","r":"Nationals"},{"n":15,"q":"This deal was precipitated by a Slave Revolt in Saint-Domingue [[sahn doh- MAHNG]] and by Napoleon Bonaparte’s desire to focus on his European position. This deal, which was negotiated in part by James Monroe, was key to Thomas Jefferson’s plans for westward expansion. Name this 1803 acquisition that ostensibly doubled the area of the United States.","a":"Louisiana Purchase","af":"Louisiana Purchase (accept Vente de la Louisiane; prompt on \"Louisiana\")","y":"2022","r":"Nationals"},{"n":16,"q":"One tradition from this holiday involves leaving trails of marigold petals leading to one's family home. Cempasúchil [[sem-pah-SOO-cheel]] flowers and elaborately-cut tissue paper are used on this holiday to decorate family altars, or ofrendas, as well as tombstones. Name this Mexican holiday on which sugar skulls are given out to celebrate the lives of the deceased.","a":"Día de los Muertos","af":"Día de los Muertos (or Día de Muertos; or Day of the Dead; accept All Saints Day; accept All Souls Day; do not accept \"Halloween\")","y":"2022","r":"Nationals"},{"n":17,"q":"In 1949, the Awami League was founded in this country to support independence from one overlord. Following a successful war of independence backed by India, Sheikh Mujibur Rahman became the first prime minister of this country. Name this South Asian country that gained independence from Pakistan, which is governed from Dhaka.","a":"People’s Republic of Bangladesh","af":"People’s Republic of Bangladesh (or Gana Prajatantri Bangladesh) 2022 Elementary School National History Bee Round 7","y":"2022","r":"Nationals"},{"n":18,"q":"This country, whose Christian parties include the Falangists of Pierre Gemayel [[juh- MAIL]], established its March 8 and March 14 Alliances after the Cedar Revolution ended a 30-year long Syrian Occupation. This country's Civil War led to Israeli invasions and the emergence of Hezbollah. Name this country governed from Beirut.","a":"Lebanon","af":"Lebanon (or Lebanese Republic; or Al Jumhuriyah al Lubnaniyah)","y":"2022","r":"Nationals"},{"n":19,"q":"As prime minister, this person ordered the Smiling Buddha nuclear tests. The assassination of this person inspired riots that left thousands of Indian Sikhs dead. This person is the second-longest serving prime minister in Indian history. Name this woman whose son, Rajiv, directly succeeded her?","a":"Indira Gandhi","af":"Indira Gandhi (or Indira Priyadarshini Gandhi; or Indira Priyadarshini Nehru; prompt on “Gandhi” or \"Nehru\")","y":"2022","r":"Nationals"},{"n":20,"q":"After losing the War of the Pacific, this nation became landlocked when it ceded its only maritime department to Chile. In 1935, this country lost the Gran Chaco region to Paraguay following its defeat in the Gran Chaco War. Name this landlocked South American country which is home to La Paz and Sucre.","a":"Plurinational State of Bolivia","af":"Plurinational State of Bolivia (or Estado Plurinacional de Bolivia)","y":"2022","r":"Nationals"},{"n":21,"q":"Bedřich [[BED-rik]] Smetana produced eight works in this performance genre, including The Bartered Bride. This art form's \"comic\" variety includes pieces like Die Zauberflöte [[dee-ZOW-behr-fluhr-tuh]], and The Marriage of Figaro. Name this musical art form whose name means \"work\" in Italian and whose performers sing arias.","a":"Opera","af":"Opera (accept Comic opera)","y":"2022","r":"Nationals"},{"n":22,"q":"The first Force Bill was passed under this man during his confrontation with South Carolina in the Nullification Crisis. This president's administration, which included the \"Kitchen Cabinet,\" was plagued by the Petticoat Affair. Name this U.S. President who signed the Indian Removal Act of 1830, beginning the Trail of Tears.","a":"Andrew Jackson","af":"Andrew Jackson","y":"2022","r":"Nationals"},{"n":23,"q":"A missionary from this country founded the city of Saint Ignace along the Straits of Mackinac [[MAK-ih-naw]]. One navigator from this country allied with the Algonquin and Huron during the Beaver Wars, while another explorer from this country mapped the St. Lawrence River and names a lake between New York and Vermont. Name this home country of Jacques Marquette and Samuel de Champlain, who founded Quebec.","a":"France","af":"France (or French Republic; or République française; accept Kingdom of France; accept Royaume de France) 2022 Elementary School National History Bee Round 7","y":"2022","r":"Nationals"},{"n":24,"q":"These people believed in a giant slayed by the ancestral Toltec people, and a priest of these people donned the skin of a Colhua princess in veneration of Huitzilopochtli [[weet- see-loh-\"POACH\"-tlee]]. Tezcatlipoca [[tets-kah-lee-POH-kah]] and Quetzalcoatl [[kwet- zahl-KWAH-tul]] were gods of, what Mesoamerican people whose capital was Tenochtitlan [[ten-OCH-teet-LAHN]]?","a":"Aztecs","af":"Aztecs (or Nahuatl; accept Mexica People)","y":"2022","r":"Nationals"},{"n":25,"q":"This person was the first to hold the position of Postmaster General. As a delegate to the Albany Congress, this man drew a political cartoon of a dissected snake with the caption “Join, or die.\" The writer of quotes such as “Three may keep a secret, if two of them are dead,” what American polymath published the Pennsylvania Gazette and Poor Richard’s Almanack?","a":"Benjamin Franklin Extra Questions","af":"Benjamin Franklin Extra Questions","y":"2022","r":"Nationals"},{"n":1,"q":"A governor of this state set up an illegal pay-to-play program that resulted in the NCAA’s only “death penalty” ever given to a football team. This state produces, by far, the most wind power energy, in part because of a governor who unseated Ann Richards with the help of friend Karl Rove. Bill Clements and George W. Bush both governed, what Lone Star State?","a":"Texas","af":"Texas","y":"2022","r":"Nationals"},{"n":2,"q":"One man with this last name was a U.S. Secretary of Defense and CIA Director under George W. Bush. A woman who once had this married name was a general manager at Microsoft and has a net worth of $120 billion dollars. What is the shared surname of the American general who won the Battle of Saratoga and the founder of Microsoft?","a":"Gates","af":"Gates (accept Robert Michael Gates; accept Melinda French Gates; accept Horatio Lloyd Gates; accept William Henry \"Bill\" Gates III; do not accept or prompt on \"French\")","y":"2022","r":"Nationals"},{"n":1,"q":"This scientist designed a wagon funded by Morris K. Jesup, which served as a mobile classroom for rural farmers. This scientist, who made paint from soybeans and dye from sweet potatoes, taught at the Tuskegee Institute. Name this Black botanist who also developed hundreds of products derived from peanuts.","a":"George Washington Carver","af":"George Washington Carver","y":"2022","r":"Nationals"},{"n":2,"q":"The attributed author of this text is Vyasa [[VYAH-sah]], who is also credited with writing eighteen of the Puranas. This poem describes the eighteen-day conflict over the throne of Hastinapura between two clans of cousins called the Kauravas and the Pandavas. Name this epic poem, one of the two major Sanskrit epics of ancient India.","a":"The Mahabharata","af":"The Mahabharata","y":"2022","r":"Nationals"},{"n":3,"q":"This leader’s large army at Fort Malden helped capture Detroit, but he was later killed at the Battle of the Thames [[TEMZ]]. This opponent of the “Peace Chiefs” and his brother, known as “The Prophet,” were defeated together at the Battle of Tippecanoe. Name this Shawnee leader who formed a Native American confederacy during the War of 1812.","a":"Tecumseh","af":"Tecumseh (accept Tecumseh's Confederacy)","y":"2022","r":"Nationals"},{"n":4,"q":"This Supreme Court Justice supported sanctity of contracts in Dartmouth College v. Woodward and Fletcher v. Peck. Section 13 of the Judiciary Act of 1789 was struck down in an opinion by this man. This Chief Justice upheld the Second Bank of the United States in Mculloch v. Maryland. Name this Chief Justice who established the principle of Judicial Review in Marbury v. Madison.","a":"John Marshall","af":"John Marshall","y":"2022","r":"Nationals"},{"n":5,"q":"To commemorate the conquest of Gujarat, this leader built the \"Gate of Victory,\" or Buland Darwaza. This leader was defeated at the Second Battle of Panipat, and abolished the jizya tax on non-Muslims. This leader founded a cult of personality called Din-I-Ilahi centered around his capital of Fatehpur Sikri. Succeeded by Jahangir, what Mughal emperor was known as the “Great”?","a":"Akbar the Great","af":"Akbar the Great (or Abul'-Fath Jalal-ud-din Muhammad Akbar; or Akbar I) 2022 Elementary School National History Bee Round 8","y":"2022","r":"Nationals"},{"n":6,"q":"This author of Discourse on Inequality claimed that society began when man first fenced in a piece of land and said “This is mine”. The line “Man is born free, and everywhere he is in chains” begins a book by this author about how a government should reflect the “general will” of a society. Name this French philosopher who wrote Emile and The Social Contract.","a":"Jean-Jacques Rousseau","af":"Jean-Jacques Rousseau","y":"2022","r":"Nationals"},{"n":7,"q":"This person’s mother, the activist Mary Wollstonecraft, died eleven days after this writer's birth. At eighteen years old, this writer agreed to a ghost story competition with Lord Byron and her husband Percy, which resulted in this woman's epistolary novel subtitled The Modern Prometheus. What woman wrote the gothic novel Frankenstein?","a":"Mary Shelley","af":"Mary Shelley (or Mary Wollstonecraft Shelley; or Mary Wollstonecraft Godwin; do not accept or prompt on \"Percy Shelley\")","y":"2022","r":"Nationals"},{"n":8,"q":"This man funded the creation of nearly 1,700 libraries, the first of which was in Dunfermline, Scotland. This man sold his best-known company to J.P. Morgan and was a proponent of the “Gospel of Wealth,” which highlighted the obligation of the wealthy to donate. Who was this Scottish-American steel magnate whose companies centered on Pittsburgh?","a":"Andrew Carnegie","af":"Andrew Carnegie (acce d’s second-largest stadium. This country's Worker's Party adds a calligraphy brush to the traditional hammer- and-sickle and follows the Juche [[JOO-chay]] ideology. That party is led by this country's hereditary Supreme Leader. Name this country under the Kim family's dictatorship.","a":"Democratic People's Republic of Korea","af":"Democratic People's Republic of Korea (or North Korea; or Choson-minjujuui- inmin-konghwaguk; prompt on \"Korea\"; do not accept or prompt on \"South Korea\" or \"Republic of Korea\") 2022 Elementary School National History Bee Round 8","y":"2022","r":"Nationals"},{"n":22,"q":"A book about this movement’s theory was written by Bell Hooks. In the U.S., this movement was often related to abolitionism with advocates like Sojourner Truth and Dorothy Day. This movement can be divided into at least three waves, one of which was advocated for by Simone de Beauvoir. Name this movement advocating for the equality of women.","a":"Feminism","af":"Feminism (accept word forms such as Feminists; accept answers involving Education or Voting for Women; accept clear knowledge equivalents)","y":"2022","r":"Nationals"},{"n":23,"q":"These vehicles, with models such as the OH-58 and AH-1, were used to secure Fort Amador in Panama during Operation Just Cause. In Mogadishu, the Night Stalkers regiment used the MH-60 variety of these vehicles, which inspired the 2001 film Black Hawk Down. Igor Sikorsky developed, what type of vehicles that use horizontal rotating blades to fly?","a":"Helicopters","af":"Helicopters (accept specific types of helicopters before mentioned)","y":"2022","r":"Nationals"},{"n":24,"q":"In 1959, Christopher Strachey [[STRAY-chee]] filed a patent application for something resembling this system. Aude Shannon created the information theory network that allowed for the creation of this commodity, and Al Gore was criticized for saying he \"took the initiative in creating [this thing].\" name this ubiquitous network that connects computers.", mber of this family born to a banker named Prescott. Donald Trump accused one member of this family of having “low energy” in the 2016 Republican Primary. name this American political family which includes Jeb and two presidents named George.","a":"Bush Family","af":"Bush Family (accept Marvin Bush; accept Prescott Bush; accept Jeb Bush; accept George W. Bush; accept George H.W. Bush)","y":"","r":"Finals"},{"n":16,"q":"This man’s namesake rule, t C=K, describes the time needed for one type of substance to cause death. This man’s wife was the first woman to earn a doctorate from the University of Breslau. That wife of this man likely killed herself in 1915 due to his defense of his invention’s use at the Battles of Ypres [[EE-pruh]]. Naming a process to produce ammonia from nitrogen alongside Carl Bosch, who was this “Father of Chemical Warfare?”","a":"Fritz Haber","af":"Fritz Haber (accept Haber-Bosch Cycle)","y":"","r":"Finals"},{"n":17,"q":"This man died after taking off from Rabaul during a planned military inspection following defeat at Guadalcanal. This man feared that his most famous attack would “awaken a sleeping giant.” name this supreme commander of the Japanse combined fleet in World War Two, the planner of the attack on Pearl Harbor.","a":"Isoroku Yamamoto 2022-23 EMS National History Bee Finals","af":"Isoroku Yamamoto 2022-23 EMS National History Bee Finals","y":"","r":"Finals"},{"n":18,"q":"This figure was the defendant in a case that handed an identical sentence to Alfred Taylor. This figure was the plaintiff in a libel case against a noble who is also known for endorsing a set of rules governing the sport of boxing. This figure received a posthumous pardon under the Policing and Crime Act of 2017 and a stained-glass window in Poets' Corner at Westminster Abbey. Name this Irish author of The Importance of Being Earnest.","a":"Oscar Wilde","af":"Oscar Wilde (or Oscar Fingal O'Flahertie Wills Wilde)","y":"","r":"Finals"},{"n":19,"q":"This man led two governments, the first of which ended public executions and the second of which passed the Royal Titles Act. After he won the 1874 general elections, this man was named Earl of Beaconsfield and declared Queen Victoria the Empress of India. name this rival of William Gladstone who helped form the modern Conservative Party.","a":"Benjamin Disraeli","af":"Benjamin Disraeli (accept 1st Earl of Beaconsfield before mentioned)","y":"","r":"Finals"},{"n":20,"q":"This man once was the High Commissioner for Refugees for the organization he currently leads. In the aftermath of the Haiti cholera outbreak, this man succeeded Ban Ki-Moon in his highest office. A member of the Socialist Party and former Prime Minister of his home country, who is this Portuguese politician and current Secretary General of the United Nations?","a":"Antonio Guterres","af":"Antonio Guterres","y":"","r":"Finals"},{"n":21,"q":"This polity’s eventual surrender was facilitated by its vice president, Phillip Effiong, who assumed leadership of this state after President Odumegwu fled to the Ivory Coast, one of the few countries to recognize this breakaway state. This polity faltered in 1970 after the capture of Port Harcourt. Name this breakaway African state composed of Igbo nationalists that attempted to secede from Nigeria.","a":"Republic of Biafra","af":"Republic of Biafra","y":"","r":"Finals"},{"n":22,"q":"In 1985, a vandal at this landmark damaged Rembrandt's Danaë by throwing sulfuric acid on the painting and slashing it twice with a knife. This landmark is the largest art museum in the world by gallery space, and it includes a palace whose last imperial ball was attended by Nicholas the Second. Catherine the Great established, what massive art complex in St. Petersburg, Russia which incorporates the Winter Palace?","a":"The State Hermitage Museum","af":"The State Hermitage Museum","y":"","r":"Finals"},{"n":23,"q":"Defying the wishes of emperor Maurice at Constantinople, this pope made an uneasy peace ars","af":"Barbary Wars","y":"","r":"Finals"},{"n":27,"q":"This theologian penned an allegorical poem against involvement in wars known as “The Labyrinth.” This theologian affirmed that the Eucharist is symbolic in the Sixty Seven Articles. Henrich Bullinger succeeded this man after he was killed trying to defend his city during the Second Kappel War, prior to which this leader split with Martin Luther at the Marburg Colloquy. Name this reformation-era leader who opposed Anabaptism as leader of the Church of Zurich.","a":"Huldrych Zwingli","af":"Huldrych Zwingli","y":"","r":"Finals"},{"n":28,"q":"The Zion Mule Corps were used in this campaign to carry water to troops on Cape Helles. This campaign’s cumulative half-million casualties led to the demotion of Winston Churchill, who sought to open access to the Black Sea. Australia and New Zealand celebrate their citizens' participation in this campaign as part of ANZAC Day. Great Britain’s forces were defeated in, what World War One attempt to seize the Dardanelles Straits from the Ottoman Empire?","a":"Gallipoli Campaign","af":"Gallipoli Campaign (or Battle of Gallipoli)","y":"","r":"Finals"},{"n":29,"q":"One side in this battle was affected by the defection of Quintus Dellius. William Dalrymple once asked if the outcome of this battle would have been different if a certain figure's \"nose had been one inch longer.\" The city of Nicopolis was founded after this battle, which led the victor to adopt the title of princeps. Marcus Agrippa commanded forces on behalf of the victor at, what 31 B.C. Naval battle won by forces loyal to Octavian?","a":"Battle of Actium 2022-23 EMS National History Bee Finals","af":"Battle of Actium 2022-23 EMS National History Bee Finals","y":"","r":"Finals"},{"n":30,"q":"This politician lost most of his public goodwill after his wife Varina urged him to sign Jefferson Davis’s bail bond, resulting in a drop in sales for the New York Tribune. This politician coined the term \"Bleeding Kansas\" and wrote the “Prayer of Twenty Millions” to provoke Abraham Lincoln into offering the Emancipation Proclamation. name this newspaper editor who purportedly said, “go west, young man.”","a":"Horace Greeley Extra Questions","af":"Horace Greeley Extra Questions","y":"","r":"Finals"},{"n":1,"q":"Philo of Alexandria was part of an embassy to the court of this emperor, who may have been inspired by Xerxes [[ZERK-seez]] to build a floating bridge from Puteoli to Baiae [[BY-ay]]. Drusilla was the sister of this emperor, who was fathered by Germanicus. A small type of boot provided the nickname of this emperor, who came to power in 37 AD as the successor to Tiberius. Name this third Roman emperor who is remembered for attempting to make his horse a consul.","a":"Caligula","af":"Caligula (accept Gaius Julius Caesar Augustus Germanicus)","y":"","r":"Finals"},{"n":2,"q":"While serving as the youngest-ever U.S. Associate Attorney General, this man defended the Reagan administration’s policy of denying political refuge to Haitians. As a prosecutor, this man convicted “Fat Tony” Salerno, but lost a bid to convict Imelda Marcos. This politician won a certain position by unseating David Dinkins, the first African American holder of that office. name this man who served as mayor of New York City during September 11th.","a":"Rudy Giuliani","af":"Rudy Giuliani (or Rudolph William Louis Giuliani)","y":"","r":"Finals"},{"n":1,"q":"A member of this tribe wrote the libretto for the first Native American opera, The Sun Dance Opera, as well as the article \"Oklahoma's Poor Rich Indians.\" Buffalo Calf Road Woman saved her brother at the Battle of the Rosebud during a war named for this tribe, which included the defeat of George Custer by its leader Crazy Horse at the Battle of the Little Bighorn. Name this plains tribe once led by Sitting Bull.","a":"Sioux [[SOO]]","af":"Sioux [[SOO]] (accept Dakota; accept Yankton Dakota; accept Hunkpapa Lakota; accept Lakota; accept Teton Sioux; accept Gre econd of Egypt. Identify these ancient Anatolian people who fought the Egyptians at the Battle of Kadesh.","a":"Hittites","af":"Hittites (accept Hattusa or Ha-at-tu-sa before “Hattusa”) 1 2023-24 EMS National History Bee Finals","y":"2024","r":"Finals"},{"n":6,"q":"Legends about this place were popularized through a 1964 piece by Vincent Gaddis in the publication Argosy. The manganese-carrying Cyclops is analyzed in some theories about this location, as is a mission departing from Fort Lauderdale, Navy Flight 19. Some studies of this location seek to determine if the occurrence of tropical cyclones accounts for many reported incidents. Many planes and ships have mysteriously vanished from, what three-sided location?","a":"Bermuda Triangle","af":"Bermuda Triangle (accept Devil's Triangle)","y":"2024","r":"Finals"},{"n":7,"q":"Daryl Gates oversaw one organization in this city’s Operation Hammer and collaborated with one city's Rotary Club to create the D.A.R.E Program. It's not the FBI, but an organization investigated the murder of Elizabeth Short and created the first militarized Special Weapons And Tactics, or SWAT Team. Identify this city where the Watts and Rodney King Riots were fought by its namesake police department.","a":"Los Angeles","af":"Los Angeles (or Los Angeles Police Department; or LAPD)","y":"2024","r":"Finals"},{"n":8,"q":"With her husband, one person who completed this action went on to found the Woodville Co- operative Farm School and work in Britain with the Women’s Suffrage Organization. That person who completed this action did so while dressed as a man, with her husband disguised as a servant. This action was undertaken by Ellen Craft, who co-wrote the book Running a Thousand Miles for Freedom. Identify this action that was facilitated by Harriet Tubman and the Underground Railroad.","a":"Escaping from Slavery","af":"Escaping from Slavery (accept equivalents; accept Underground Railroad before mentioned)","y":"2024","r":"Finals"},{"n":9,"q":" a. Henry Bouquet fought against Mingo and Delaware warriors during this conflict's Battle of Bushy Run. The Paxton Boys carried out the Conestoga massacre in this conflict, during which Jeffrey Amherst infected blankets with smallpox. The Proclamation of 1763 was a response to, what rebellion led by a namesake Ottawa chieftain who names a make of car by General Motors?","a":"Pontiac's Rebellion","af":"Pontiac's Rebellion (accept \"Revolt\" or \"War\" in place of \"Rebellion\")","y":"2024","r":"Finals"},{"n":13,"q":"This material was created by sticking together kollema with kollesis, and this material, which includes a superfine Augustan form, was first discovered in one form at Herculaneum. Caspar Jacob Reuvens studied an item in Leyden composed of this material made from the pith of a wetland plant, which could be rolled up into scrolls. Replaced by vellum and parchment, what was this ancient paper-like material, used in Ancient Egypt?","a":"Papyrus","af":"Papyrus (accept Papyri; accept Augustan papyrus; accept Leyden papyrus)","y":"2024","r":"Finals"},{"n":14,"q":"A composer with this surname, instead of Michael Haydn, was the likely composer of the Toy Symphony and wrote A Treatise on the Fundamental Principles of Violin Writing. Only the first eight bars of a mass by a composer with this surname were written, leading Franz Xavier Süssmayr to complete it. A composer with this surname wrote the Coronation and Elvira Madigan piano concertos. give this surname of Salzburgers Leopold and his son, the composer of The Magic Flute, Wolfgang Amadeus.","a":"Mozart","af":"Mozart (accept Leopold Mozard; accept Wolfgang Amadeus Mozart)","y":"2024","r":"Finals"},{"n":15,"q":"This person defeated Arthur St. Clair Jr. By a single vote to serve as a non-voting representative for the Northwest Territory, and this person was appointed by John Adams to govern the Indiana Territory, where he built Grouseland near Vincennes. This western Whig candidate came second to Martin Van Buren in 1836, though he would earn a future victory using a campaign that relied on the imagery of log cabins and hard cider. Name this president who was inaugurated in 1841 before dying in office 31 days later.","a":"William Henry Harrison","af":"William Henry Harrison (prompt on \"Harrison;\" do NOT accept or prompt on \"Benjamin Harrison\") 3 2023-24 EMS National History Bee Finals","y":"2024","r":"Finals"},{"n":16,"q":"This ruler's general Quizquiz won the battles of Quipaipán and Chimborazo in a civil war against one of this ruler's family members. That brother of this ruler was assassinated to avoid paying additional ransom to the Spanish. After the Battle of Cajamarca, this ruler's brother was ransomed for a room full of gold. Huascar was the brother of this ruler, who was one empire's last empowered sapa. Name this late Incan Emperor who was captured and executed by Francisco Pizarro.","a":"Atahualpa","af":"Atahualpa (or Atabalica; or Atabalipa)","y":"2024","r":"Finals"},{"n":17,"q":"An army in this battle used a series of fake retreats to goad its opponents off Senlac Hill. This battle, depicted on the Bayeux [[\"BYE\"-yoo]] Tapestry, was part of succession crisis following the death of Edward the Confessor and took place the month after a Norwegian defeat at Stamford Bridge. An arrow to the eye caused the death of Harold Godwinson at, what victory for William the Conqueror during the 1066 Norman conquest?","a":"Battle of Hastings","af":"Battle of Hastings","y":"2024","r":"Finals"},{"n":18,"q":"A current member of the board of the National Constitution Center was drafted by this current NBA team in 1991 out of Georgetown University, and that player was Dikembe [[dee-KEHM- bey]] Mutombo. A center for this team was born in the city of Sombor while it was still part of the Federal Republic of Yugoslavia and went on to win back-to-back MVPs. This team's current mascot was inspired by a prospecting boom that led to the titular objects of silver and gold being panned by miners. Name this NBA team and 2023 NBA champions from Colorado.","a":"Denver Nuggets","af":"Denver Nuggets (accept either underlined part)","y":"2024","r":"Finals"},{"n":19,"q":"While travelling in Egypt, this person described a machine that allowed heavy objects to be lifted for pyramid construction, which came to be known as this person's namesake machine. Stories that diverge into the realm of fantasy were characteristic of the work of this person, who hailed from the city of Halicarnassus. Artemisium and Plataea [[plah-TEE-ah]] were the sites of battles recounted by this person, who was criticized by their contemporary, Thucydides [[thoo- SID-it-eez]]. Name this ancient Greek \"Father of History.\"","a":"Herodotus [[heh-ROH-doh-tohss]]","af":"Herodotus [[heh-ROH-doh-tohss]] (accept Herodotus Machine; accept phonetic pronunciations)","y":"2024","r":"Finals"},{"n":20,"q":"This person first named one harbor after a type of cartilaginous fish, but that body's current name was inspired by its collection of plant specimens. A navigator named Tupaia assisted this person, who named the aforementioned \"Sting-Ray Harbour,\" now Botany Bay, and captained the Endeavour. The first-known circumnavigation of New Zealand was completed by this person, who was known for a series of three voyages across the Pacific. Name this British explorer.","a":"James Cook","af":"James Cook (or Captain Cook) 4 2023-24 EMS National History Bee Finals","y":"2024","r":"Finals"},{"n":21,"q":"This figure was the subject of a 2007 Eisner-winning graphic novel by Nick Abadzis. Albina was designated as a backup for this figure, who underwent surgery to install internal sensors to measure blood pressure. The malfunction of an R-Seven sustainer may have led to the death by overheating of this figure, who is sometimes known by the nickname “Limonchik.\" A mongrel found on a Moscow street, who was this Russian space dog, known for participating in Sputnik Two?","a":"Laika","af":"Laika (or Kudryavka accept Rapa Nui before mentioned)","y":"2024","r":"Finals"},{"n":25,"q":"This musician used a pseudonym that inspired the name of the Ramones, and as a teen, this musician wrote their first song, \"I Lost My Little Girl,\" and joined a skiffle group that became known as the Quarrymen. With their wife, Linda, this musician started one of the most successful bands of the 1970s, with number-one hits including “Silly Love Songs\" and “Band on the Run.\" The most Number One UK hits belong to, what musician, who was in Wings and The Beatles?","a":"Paul McCartney","af":"Paul McCartney (or James Paul McCartney; prompt on \"McCartney\") 5 2023-24 EMS National History Bee Finals","y":"2024","r":"Finals"},{"n":26,"q":"Jules Gossin and Paul Cullen raised funds to alleviate this event, in which certain people were called \"cat breacs.\" The landlord Denis Mahon was murdered during this event in revenge for evicting tenants, while the Mcorkell Line brought people to the Americas. In Canada, survivors of this event died from disease on coffin ships, and some sufferers of this event converted as part of souperism. Identify this deadly event in which a blight killed a certain crop on an island near Britain.","a":"Irish Potato Famine","af":"Irish Potato Famine (or Great Famine; or Great Hunger; or The Famine)","y":"2024","r":"Finals"},{"n":27,"q":"Two brothers-in-law of this person helped establish the settlement known as Bryan's Station, and during a hunting expedition, this person was captured by men loyal to Chief Blackfish. Pilot Knob was the location from which this person first sited the Bluegrass region, and an inscription claiming that this person \"Kilt a Bar\" can be found in a museum in Louisville. The Cumberland Gap was the site of efforts led by, what early American frontiersman, who blazed the Wilderness Road?","a":"Daniel Boone","af":"Daniel Boone","y":"2024","r":"Finals"},{"n":28,"q":"One leader of this company fired Lynn Conway for announcing her intention to transition genders. Founded by Herman Hollerith as the Computing-Tabulating-Recording Company, this company created the COMTRAN programming language. This company’s long-time presidents, Thomas Watson and Thomas Watson Jr., transitioned this company from punch cards to computers. Creating the first machine to beat a reigning world champion at chess, Deep Blue, what is this tech company?","a":"IBM","af":"IBM (or International Business Machines Corporation; prompt on \"Big Blue\")","y":"2024","r":"Finals"},{"n":29,"q":"An early fifteen-person meeting of members of this body, at which a member of the Delano family founded one service, was held at the house of Senator Omar D. Conger. The founder of this organization was among the first to tend to those affected by the Pratt Street Riot in Baltimore. This organization was formed five years after another \"International\" body was established by Henry Dunant. name this organization, which was founded by Clara Barton and is named for its colorful symbol.","a":"American Red Cross","af":"American Red Cross (or American National Red Cross; prompt on partial answers)","y":"2024","r":"Finals"},{"n":30,"q":"In 1906, an “intercalated” version of one of these events was held, but is not generally counted as a legitimate version of them. Security guard Richard Jewell was falsely accused of bombing one of these events, whose real culprit was Eric Rudolph. The Soviet invasion of Afghanistan prompted Jimmy Carter to lead a boycott against one of these events. Starting two months from today, for the third time, what event will be hosted in Paris?","a":"Summer Olympic Games","af":"Summer Olympic Games (accept Games of the Summer Olympiad) 6 2023-24 EMS National History Bee Finals Extra Questions","y":"2024","r":"Finals"},{"n":1,"q":"This civilization names a biosphere preserve that contains the Mirador Basin and protects species including Morelet's [[moh-reh-LEHS]] crocodile, and a rail network named for this civilization connects cities including Umán and Francisco de Campeche. This civilization extended west to the Isthmus of Tehuantepec [[teh-HWAHN-teh-pek]] and established the cities of Palenque [[pah-LEN-keh]] and Uxmal. Naming a mountain range that is home to the highest point in Belize, what was this civilization in far-eastern Mexico on the Yucatán Peninsula?","a":"Mayan Civilization","af":"Mayan Civilization (accept Maya Biosphere Reserve; accept Maya Train; accept Tren Maya)","y":"2024","r":"Finals"},{"n":2,"q":"Following the deaths of Echol Cole and Robert Walker in this city, the phrase “I Am a Man!” was used as a declaration. This city’s Mason Temple was the site of the “I’ve Been to the Mountaintop” speech, which was addressed to striking sanitation workers, and the white supremacist James Earl Ray committed one act in this city that targeted a a civil rights leader who was staying at the Lorraine Motel. Name this city in Tennessee where Martin Luther King Jr. Was assassinated.","a":"Memphis","af":"Memphis","y":"2024","r":"Finals"},{"n":3,"q":"Many of the symbols used in this discipline were standardized by François Viète [[vee-EHT]], an advisor to Henry the Fourth of France. Techniques in this discipline were first recorded in the third century B.C. In the Arithmetica of Diophantus. The name of this discipline comes from a treatise by al-Khwarizmi's, titled The Compendious Book on Calculation by Completion and Balancing. name this field of mathematics studied by Arab scholars, which involves the manipulation of variables.","a":"Algebra","af":"Algebra (prompt on \"Math\" or \"Mathematics\") 7","y":"2024","r":"Finals"}];
