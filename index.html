haracter called the \"greatest philosopher of the Holy Roman Empire,\" Professor Pangloss from Voltaire's Candide. Discovering calculus independently of Isaac Newton, who was this German polymath?","a":"Gottfried Wilhelm","af":"Gottfried Wilhelm (von) Leibniz","y":"2022","r":"Finals"},{"n":5,"q":"John Chard earned a Victoria Cross for repelling a counteroffensive at this war's Battle of Rorke's Drift. Lord Chelmsford's forces were repelled by the Assegai at this conflict's Battle of Isandlwana. British forces won the Battle of Ulundi during, what war after which the English subjugated an African kingdom led by Chetswayo and founded by Shaka?","a":"Anglo-Zulu War","af":"Anglo-Zulu War (prompt on partial answers) 2022 Elementary School National History Bee Finals","y":"2022","r":"Finals"},{"n":6,"q":"During his reign, this authoritarian ruler sentenced leaders, such as Mehdi Ben Barka, to death. This, and his actions during the Years of Lead, contributed to the BBC labeling this man’s human rights record as “appalling.” A member of the 'Alawi Dynasty, who was this King of Morocco from 1961 to 1999?","a":"Hassan II","af":"Hassan II","y":"2022","r":"Finals"},{"n":7,"q":"The Vestal Virgin Tarpeia was killed by the shields of these people after she betrayed Rome to them. Romulus betrayed these people by staging a kidnapping at the Neptune Equester festival. Suffering the mass abduction of women at the hands of the Romans, who were these ancient Italic people?","a":"Sabines","af":"Sabines (or Sabini; accept Abduction of the Sabine Women; accept \"Kidnapping\" or \"Rape\" in place of \"Abduction\")","y":"2022","r":"Finals"},{"n":8,"q":"In this incident, three American envoys were told they could not negotiate any treaty until they gave a substantial bribe to French minister Charles-Maurice de Talleyrand-Périgord. Leading to an undeclared war between the U.S. And France, what is this diplomatic incident with France during the John Adams administration?","a":"XYZ Affair","af":"XYZ Affair","y":"2022","r":"Finals"},{"n":9,"q":"This organization was founded in 1938 by President Franklin D. Roosevelt as the National Foundation for Infantile Paralysis. From 1938 to 1955, this organization spent more than $230 million on patient care and funded the work of Albert Sabin and Jonas Salk. Initially organized to combat polio, what is this nonprofit organization that now works to lower infant mortality rates worldwide?","a":"March of Dimes","af":"March of Dimes","y":"2022","r":"Finals"},{"n":10,"q":"Raffaello de Montelupo created statues of Rachel and Leah for this man's tomb, as well as a horned statue of Moses. This pope created the League of Cambrai to oppose Venice and commissioned Michelangelo to paint the ceiling of the Sistine Chapel. Name this 16th-century \"Warrior Pope.\"","a":"Julius II","af":"Julius II (or Giuliano della Rovere; prompt on \"Julius\")","y":"2022","r":"Finals"},{"n":11,"q":"In 1956, this woman was one of the five plaintiffs in the case Browder v. Gayle, which overturned segregated bus laws in Alabama. Like a later activist, this woman was arrested for refusing to give up her segregated seat on a Montgomery bus in 1955 at the age of 15, but her case remained unpublicized due to her pregnancy. For the pointss, name this activist who preceded Rosa Parks.","a":"Claudette Colvin","af":"Claudette Colvin (or Claudette Austin) 2022 Elementary School National History Bee Finals","y":"2022","r":"Finals"},{"n":12,"q":"This man protested the Inquisition under Cardinal Granvelle and Governor Margaret of Parma. This man was shot and killed by the Burgundian Catholic, Balthasar Gérard, at the Prinsenhof in Delft. After an illegal meeting of the Staten Generaal, this taciturn man was reinstated as Stadholder. Starting the Dutch Revolt against the Spanish Hapsburgs in the Eighty Years' War, who was this Prince of Orange?","a":"William the Silent","af":"William the Silent (or Willem de Zwijger; accept William of Orange or or Willem van Oranje before \"Orange\" is mentioned; accept William the Taciturn before mentioned)","y":"2022","r":"Finals"},{"n":13,"q":"This battle was immediately preceded by the Battle of Blanchetaque, which occurred following a landing at Cotentin. The blind King John of Bohemia died during this battle, which was followed by a siege of Calais. The Black Prince held his first command during this battle, which confirmed the supremacy of the English Longbow. Name this 1346 battle in Northern France.","a":"Battle of Crécy","af":"Battle of Crécy","y":"2022","r":"Finals"},{"n":14,"q":"Most historians agree that this event occurred first during the Roman siege of Seleucia [[she-LOO-kee-ah]], and Cassius Dio, a Roman historian, said that disease arose again nine years later. Troops returning from the Near East in the 2nd century brought on, what pandemic that weakened the Roman Empire?","a":"Antonine Plague","af":"Antonine Plague (or the Plague of Galen; prompt on \"Plague\")","y":"2022","r":"Finals"},{"n":15,"q":"During this period's Jokyu Disturbance, the Hojo family defeated Go-Toba's forces at the Third Battle of Uji. The Kenmu Restoration occurred after this period, which began after the defeat of the Taira clan in the Gempei War. \"Divine winds,\" called kamikaze, thwarted two Mongol invasions during, what first shogunate of Japan?","a":"Kamakura Shogunate","af":"Kamakura Shogunate (accept Kamakura period)","y":"2022","r":"Finals"},{"n":16,"q":"This person was instrumental in establishing a policy for the social security program while in Franklin D. Roosevelt’s administration, and this person was one of only two people, along with Harold Ickes [[IK-ees]], to serve on FDR's Cabinet for his entire presidency. Spending twelve years as the U.S. Secretary of Labor, who was this first woman to serve in a presidential Cabinet?","a":"Frances Perkins","af":"Frances Perkins (or Fannie Coralie Perkins) 2022 Elementary School National History Bee Finals","y":"2022","r":"Finals"},{"n":17,"q":"This psychologist created shortened mazes that caused rats to run into walls in the \"Kerplunk\" experiment. In another experiment, this psychologist used loud noises to condition a baby to be afraid of white, fluffy things. Carrying out the \"Little Albert\" experiment in 1920, who was this American behaviorist psychologist?","a":"John B","af":"John B(roadus) Watson","y":"2022","r":"Finals"},{"n":18,"q":"Via the Treaty of Stolbovo, this husband of Maria Eleonora of Brandenburg cut off Russia's access to the Baltic. This general, who defeated Count Tilly at Breitenfeld, was succeeded by Axel Oxenstierna [[OHK-sen-STYEHR-nah]] after his death at the Battle of Lützen. Known as the \"Lion of the North,\" who was this King of Sweden during the Thirty Years' War?","a":"Gustavus Adolphus the Great","af":"Gustavus Adolphus the Great (or Gustav II Adolf)","y":"2022","r":"Finals"},{"n":19,"q":"This man refused to succeed Lord Melbourne unless Queen Victoria fired many ladies-in-waiting in the Bedchamber Crisis. This man accepted the Reform Act of 1832 as \"a final and irrevocable settlement of a great constitutional question\" and advanced Conservative policies in the Tamworth Manifesto. This man's creation of the Metropolitan Police Force in London led them to be nicknamed \"bobbies.\" Having repealed the unpopular Corn Laws, who was this British prime minister from 1841 to 1846?","a":"Robert Peel, 2nd Baronet","af":"Robert Peel, 2nd Baronet","y":"2022","r":"Finals"},{"n":20,"q":"This person once asked, “If God has predetermined for me salvation or damnation, how could any behavior of mine change my fate?” This person was put on trial for heresy and sedition after accusing ministers of preaching works rather than grace during the Antinomian Controversy. what female religious leader was banished from Massachusetts Bay Colony?","a":"Anne Hutchinson","af":"Anne Hutchinson (or Anne Marbury)","y":"2022","r":"Finals"},{"n":21,"q":"This Massachusetts representative worked with other Irish-American politicians to make the \"Saint Patrick's Day Declaration\" and to help bring an end to \"The Troubles\" in Northern Ireland. The author of All Politics is Local and Other Rules of the Game, who was opponent of Ronald Reagan, the third- longest serving Speaker of the House?","a":"Thomas “Tip” O’Neill","af":"Thomas “Tip” O’Neill (or Thomas Phillip O'Neill Jr) 2022 Elementary School National History Bee Finals","y":"2022","r":"Finals"},{"n":22,"q":"While only involving four countries, this war was the bloodiest in Latin America during the nineteenth century, concluding with the Battle of Cerro Corá. In the aftermath of this war, Brazil was awarded portions of territory now included in the State of Mato Grosso do Sul. This war concluded with the death of its instigator, Francisco Solano Lopez. name this war whose victors were Brazil, Argentina, and Uruguay.","a":"War of the Triple Alliance","af":"War of the Triple Alliance (accept Paraguayan War)","y":"2022","r":"Finals"},{"n":23,"q":"This person’s Anti-Trust Paradox nudged judges toward a more favorable view of trusts. Nominated by Ronald Reagan, this Yale Law School professor faced heated discussions in his effort to replace Lewis Powell. The author of Slouching Toward Gomorrah, who was this conservative judge whose 1987 nomination for the U.S. Supreme Court was defeated?","a":"Robert Bork","af":"Robert Bork (or Robert Heron Bork)","y":"2022","r":"Finals"},{"n":24,"q":"In addition to painting the official White House portrait of Teddy Roosevelt, this artist painted a strap onto one of his subjects after his risqué depiction of Virginie Gautreau [[goh-TROH]] caused outrage. This American artist caused a scandal at the 1884 Salon de Paris with his Portrait of Madame X. who is this man, considered the leading portrait painter of his era?","a":"John Singer Sargent","af":"John Singer Sargent","y":"2022","r":"Finals"},{"n":25,"q":"Pope Paul III convened this meeting that clarified the seven sacraments and led to the codification of the Tridentine Mass. The last ecumenical council before the 1869 First Vatican Council, this meeting is considered to have made the key statements of the Counter-Reformation. name this mid-16th century Catholic Church council which rebuked Protestantism.","a":"Council of Trent","af":"Council of Trent (or Concilum Tridentinum) 2022 Elementary School National History Bee Finals Extra Questions","y":"2022","r":"Finals"},{"n":1,"q":"In the Great Debate, Heber Curtis and Harlow Shapley debated the classification of this thing, citing theories surrounding \"island universes.\" The discovery of Cepheid [[SEE-fee-id]] variables inside this object, designated by Messier 31, ultimately proved that it was not a nebula. name this closest spiral galaxy to the Milky Way.","a":"Andromeda Galaxy","af":"Andromeda Galaxy (accept Messier 31 before mentioned; accept NGC 224; accept Andromeda nebula)","y":"2022","r":"Finals"},{"n":2,"q":"On top of its five vows, this religion has a supplementary vow of sallekhana involving fasting to death by its monks, rarely practiced today. The first leader of this religion is Rishabhanatha and the last is Mahavira. This religion has 24 such leaders, called tirthankaras. Practicing ahimsa, or non-violence, what is this Indian religion?","a":"Jainism","af":"Jainism (or Jain Dharma; accept Jainist)","y":"2022","r":"Finals"},{"n":3,"q":"During this year, the Hubble Space Telescope was launched by the space shuttle Discovery. During this year, the U.S. Began an air attack on Iraq during the Gulf War, which was called Operation Desert Storm. The Soviet Union was effectively dissolved during, what year in which Mikhail Gorbachev resigned as president of the Soviet Union?","a":"1991","af":"1991","y":"2022","r":"Finals"},{"n":1,"q":"One of this state's congressional districts has been compared to a duck, and another has been described as \"the snake on the lake.\" Jim Jordan has served as the representative for this state's 4th District, while Senator Sherrod Brown formerly represented its 13th. name this state whose Black representatives have included Joyce Beatty, Shontel Brown, and Marcia Fudge.","a":"Ohio","af":"Ohio","y":"2022","r":"Finals"},{"n":2,"q":"Gunpowder and the compass were among the inventions developed in this dynasty, which was founded in the 10th century by Emperor Taizu following the collapse of the Tang Dynasty. Succumbing in 1279 to a successful Mongol invasion, what was this medieval Chinese dynasty?","a":"Song Dynasty","af":"Song Dynasty (or Sòng cháo)","y":"2022","r":"Finals"},{"n":3,"q":"When this man was removed from command, he wrote to his wife, “Those in whose judgment I rely tell me that I fought the battle splendidly and that it was a masterpiece of art.” Removed from his command of the Army of the Potomac after failing to pursue Robert E. Lee's army after a Union victory at Antietam, who was this Civil War general?","a":"George B","af":"George B(rinton) McClellan","y":"2022","r":"Finals"},{"n":4,"q":"At this battle, the losing commander built a throne at Mount Aigaleo so he could watch. That man gave control of his army in this war to Mardonius, who lost at Plataea. The fleet of Xerxes was defeated by the fleet of Themistocles at, what naval victory for the Greeks over the Persians?","a":"Battle of Salamis","af":"Battle of Salamis","y":"2022","r":"Finals"},{"n":5,"q":"This group, including Ernest Green and Minnijean Brown, congregated at Central High. “The Lost Year” happened as a response to this group. Finding unwanted attention in Arkansas in 1957, what name is given to this group of Black students who attended a white public school?","a":"Little Rock Nine","af":"Little Rock Nine (accept descriptive answers relating to the students who attended Central High School in Little Rock before mentioned) 2022 Elementary School National History Bee Octofinals","y":"2022","r":"Finals"},{"n":6,"q":"A highly publicized photograph of this man riding in an M1 Abrams tank was widely considered a public relations disaster that closed the door on his presidential ambitions. Taking only ten states, including his home state of Massachusetts, who was this man who lost the 1988 U.S. Presidential election to George H.W. Bush?","a":"Michael Dukakis","af":"Michael Dukakis (or Michael Stanley Dukakis)","y":"2022","r":"Finals"},{"n":7,"q":"This present-day country was the location of a Nazi-affiliated puppet state led by Jozef Tiso [[YAH-zef TISS-ah]]. In 2009, this country replaced its currency, the koruna, making it the second Slavic country to adopt the Euro. Under Austrian rule, this country's capital was called Pressburg. Dissolving its union with another country in the 1993 Velvet Divorce, what is this Central European country governed from Bratislava?","a":"Slovakia","af":"Slovakia (or Slovak Republic; or Slovenska republika; or Slovensko; do not accept or prompt on \"Czechoslovakia\")","y":"2022","r":"Finals"},{"n":8,"q":"This hero entered the underworld using a golden bough [[bow]] on the advice of the Cumaean [[koo-MAY-an]] Sibyl. One lover of this hero threw herself on a pyre when he left, ending her reign as the first queen of Carthage. The son of Venus and Anchises [[an-KY-seez]] and the lover of Dido [[DY-doh]], what hero names an epic poem about the founding of Rome by Virgil?","a":"Aeneas","af":"Aeneas (prompt on \"Aeneid\")","y":"2022","r":"Finals"},{"n":9,"q":"This region raised a peasant army that defeated Philip IV's forces at the Battle of the Golden Spurs. During the Spanish Fury, thousands of civilians in this region were killed in the city of Antwerp. Located north of French-speaking Wallonia, what region of Belgium has been populated for centuries by Dutch speakers?","a":"Flanders","af":"Flanders (or Vlaanderen; prompt on \"Belgium\")","y":"2022","r":"Finals"},{"n":10,"q":"The composer's Coronation Ode for Edward VII [[the Seventh]] was taken from these pieces, the first of which includes the patriotic song officially titled \"Land of Hope and Glory.\" Premiering in Liverpool in 1901, two years after the composer's Enigma Variations brought him international fame, what is this set of marches by Edward Elgar, part of which is often played at graduations?","a":"Pomp and Circumstance Military Marches","af":"Pomp and Circumstance Military Marches (or Pomp and Circumstance Marches) 2022 Elementary School National History Bee Octofinals","y":"2022","r":"Finals"},{"n":11,"q":"Court gossips supposed this person’s biological father might be Napoleon II, and this person’s older brother became emperor of Austria. A series of paintings by Édouard Manet depict this person’s execution. The Union may have launched the Red River Campaign partly to prevent this man from recognizing the Confederacy. Name this Habsburg, the only emperor of the Second Mexican Empire.","a":"Maximilian I","af":"Maximilian I (or Ferdinand Maximilian Josef Maria von Habsburg-Lothringen; or Fernando Maximiliano José María de Habsburgo-Lorena)","y":"2022","r":"Finals"},{"n":12,"q":"In a 2005 revival of this play at the Abbey Theatre, its playwright, who also wrote Salome, was featured as a character, and the production opened with that man drinking and daydreaming at a Parisian café. Geoffrey Rush played Lady Bracknell during a 2011 revival of, what farcical comic play, Oscar Wilde’s final work?","a":"The Importance of Being Earnest, A Trivial Comedy for Serious People)","af":"The Importance of Being Earnest, A Trivial Comedy for Serious People)","y":"2022","r":"Finals"},{"n":13,"q":"In 2009, this man lost to Tony Abbott by one vote but defeated Abbott two years later to become prime minister. Advocating for same-sex marriage and enduring his country’s parliamentary crisis over dual-citizenship during his 2015 to 2018 tenure as PM, who is this Liberal Party politician from Australia?","a":"Malcolm Turnbull","af":"Malcolm Turnbull (or Malcolm Bligh Turnbull)","y":"2022","r":"Finals"},{"n":14,"q":"The phrases “Higher Law” and “Irrepressible Conflict” made this person anathema to Southern voters and likely cost him the 1860 Republican nomination for president. Serving as Secretary of State from 1861 to 1869, who was this politician who added nearly 600,000 square miles to the U.S. In his namesake \"folly\"?","a":"William H","af":"William H(enry) Seward (accept Seward's Folly)","y":"2022","r":"Finals"},{"n":15,"q":"One philosophy outlined by this man, called Nasakom, combined nationalism, religion, and communism. This man outlined another political ideology with \"five principles,\" which included belief in one God and the unity of his country, the independence of which he proclaimed with Mohammed Hatta in 1945. The formulator of the Guided Democracy, who was this first president of Indonesia?","a":"Sukarno","af":"Sukarno (or Koesno Sosrodihardjo; or Soekarno; accept Bung Karno; accept Pak Karno; accept Achmad Sukarno)) 2022 Elementary School National History Bee Octofinals","y":"2022","r":"Finals"},{"n":16,"q":"Skeptics of this event were criticized in Gilbert Tennent's speech \"On the Danger of an Unconverted Ministry\" in which those critics were compared to the Pharisees. The Old Side-New Side controversy happened as a response to this event, which was ushered in by men such as George Whitefield [[WIT-feeld]] and Jonathan Edwards. name this massive religious revival in America in the 1730s and 40s.","a":"First Great Awakening","af":"First Great Awakening (or Evangelical Revival; do not accept or prompt on \"Great Awakenings\" other than the \"First\")","y":"2022","r":"Finals"},{"n":17,"q":"This man was dubbed Shunro by his master, Katsukawa Shunsho. This man's sketches of landscapes, everyday life, and the supernatural are compiled in a manga which shares the name by which this man is primarily known, taken on in 1798. A ukiyo-e (oo-KEE-oh-EH) artist known for his Thirty-Six Views of Mount Fuji, who was this creator of The Great Wave off Kanagawa?","a":"Katsushika Hokusai","af":"Katsushika Hokusai (accept in either order; prompt on \"Katsuhika\"; accept Hokusai Manga)","y":"2022","r":"Finals"},{"n":18,"q":"This artist also created several works depicting Teha'amana, one of his three so-called \"native wives,\" including one of a nude lying on a bed while being watched by a ghostly figure, Spirit of the Dead Watching. Spending nine months in 1888 painting at a house in Arles [[AHRL]] with van Gogh, who was this French Post-Impressionist artist who spent his last ten years in French Polynesia?","a":"Paul Gauguin [[goh-GAHN]]","af":"Paul Gauguin [[goh-GAHN]] (or Eugène Henri Paul Gauguin)","y":"2022","r":"Finals"},{"n":19,"q":"During this man’s presidency, his main economic agenda adhered to the Vuskovic Plan, the policy of the Popular Unity government in this man's country. This man was the first Marxist to be elected president of a liberal democracy in South America. Surrounded by troops at the La Moneda Palace during a 1973 coup before shooting himself, who was this president of Chile?","a":"Salvador Allende","af":"Salvador Allende (or Salvador Guillermo Allende Gossens)","y":"2022","r":"Finals"},{"n":20,"q":"This aviator earned “ace-in-a-day” status after shooting down five German planes in a single mission later that year. This man was profiled in Tom Wolfe's The Right Stuff and was played by Sam Shepard in the film version of that book. Flying a rocket-powered Bell X1 named \"Glamorous Glennis,\" who was this man, the first to ever break the sound barrier?","a":"Chuck Yeager","af":"Chuck Yeager (or Charles Elwood Yeager) 2022 Elementary School National History Bee Octofinals","y":"2022","r":"Finals"},{"n":21,"q":"Louis de Jaucourt [[zhoh-KOHR]] penned the greatest number of contributions to this work, but many major Enlightenment figures, such as Andre le Breton and Montesquieu, also added to it. Co-edited by Jean le Rond d’Alembert [[dah-lem- BEHR]], and Denis Diderot, what is this influential French reference work?","a":"Encyclopédie, ou dictionnaire raisonné des sciences, des arts et des métiers","af":"Encyclopédie, ou dictionnaire raisonné des sciences, des arts et des métiers (accept Encyclopedia, or a Systematic Dictionary of the Sciences, Arts, and Crafts)","y":"2022","r":"Finals"},{"n":22,"q":"This treaty was predicted to cause a “giant sucking sound” of jobs leaving the United States according to Ross Perot, and Donald Trump called this treaty “the worst trade deal ever negotiated.” Agreed to in 1994 and signed by Bill Clinton , what is this 1994 agreement between Mexico, the USA, and Canada?","a":"NAFTA","af":"NAFTA (or North American Free Trade Agreement; or TLCAN; or Tratado de Libre Comercio de América del Norte; or ALÉNA; or Accord de libre-échange nord- américain)","y":"2022","r":"Finals"},{"n":23,"q":"This ruler is characterized in Secret History by Procopius as a devil-like figure with a detachable head. This supporter of the Green Deme ruled during the Nika Riots. Belisarius and Narses served this ruler during his conquests of North Africa and the Ostrogothic Kingdom. name this emperor of Byzantium and husband of Theodora who reconstructed the Hagia Sophia.","a":"Justinian I","af":"Justinian I (or Flavius Petrus Sabbatius Iustinianus; or Justinian the Great)","y":"2022","r":"Finals"},{"n":24,"q":"This person composed \"Aloha ‘Oe\" as well as \"He Mele Lāhui Hawaiʻi,\" one of Hawaii’s anthems. In 1891, following the death of this person's brother, King Kalākaua, this person ascended to the throne of the Kingdom of Hawaii. Overthrown by a coup led in 1893 by Sanford Dole, who was this last sovereign monarch of the Kingdom of Hawai'i and its only queen?","a":"Lili'uokalani","af":"Lili'uokalani (or Lydia Liliʻu Loloku Walania Kamakaʻeha)","y":"2022","r":"Finals"},{"n":25,"q":"This person was visited by King Edward VII [[the Seventh]] a day before embarking on a 1901 journey on the Discovery. Fossils from the Glossopteris tree were found with the body of this person when it was discovered in 1912. what explorer died on an expedition on which he reached the South Pole five weeks after Roald Amundsen?","a":"Robert Falcon Scott 2022 Elementary School National History Bee Octofinals Extra Questions","af":"Robert Falcon Scott 2022 Elementary School National History Bee Octofinals Extra Questions","y":"2022","r":"Finals"},{"n":1,"q":"This man was trapped by the nymph Calypso for seven years, during which his son, Telemachus [[the-leh-MAH-kus]], searched for him. This king of Ithaca, who claimed his name was \"Nobody,\" tricked and blinded Polyphemus in order to escape him. Spending ten years at sea trying to return to his wife, Penelope, what Greek figure is the namesake of Homer's Odyssey?","a":"Odysseus","af":"Odysseus (accept Ulysses before \"Odyssey\" is mentioned; prompt on \"Odyssey\")","y":"2022","r":"Finals"},{"n":2,"q":"The giant Kuafu supposedly emptied this river and its Wei tributary due to his excessive thirst. After this river experienced a \"Great Flooding,\" Nuwa and her brother Fu Xi [[FOO SHE]] repopulated the Earth. name this colorfully named river of Northern China.","a":"Yellow River","af":"Yellow River (or Huang He; accept Yellow River Cantata; accept Huánghé Dàhéchàng)","y":"2022","r":"Finals"},{"n":3,"q":"The Laghouat [[LAHG-waht]] expedition occurred in this country, which oversaw a siege that lessened the Portuguese influence over Ceuta [[seh-YOO- tah]]. Hassan II was a ruler of this country who, in 1999, was succeeded by Muhammad VI. name this country which is home to Tangier and Casablanca.","a":"Kingdom of Morocco","af":"Kingdom of Morocco (or Al Mamlakah al Maghribiyah)","y":"2022","r":"Finals"},{"n":1,"q":"This vessel had been in operation for less than three years when it collided with Bligh Reef. This ship was owned by a company that was formerly known as Standard Oil Company of New Jersey. Running aground in Prince William Sound in 1989, what is this tanker that caused the second-largest oil spill in U.S. History?","a":"Exxon Valdez","af":"Exxon Valdez (prompt on partial answers)","y":"2022","r":"Finals"},{"n":2,"q":"During a war with the Kingdom of Kotte, this man captured King Vira Alakeshwara. On one trip, this man executed the pirate Chen Zuyi, and he may have traded gold and silver in exchange for camels and a giraffe at Malindi. In the early- 15th century, this explorer led treasure voyages to Southeast Asia, India, and the Persian Gulf. Name this Ming Dynasty explorer.","a":"Zheng He [[ZHUNG-HUH]]","af":"Zheng He [[ZHUNG-HUH]] (or Ma He; be lenient on pronunciation; prompt on \"He\")","y":"2022","r":"Finals"},{"n":3,"q":"In this region, Cassivellaunus led a failed tribal coalition against Julius Caesar. During an uprising of the Iceni [[\"eye\"-SEE-nee]] in this region, Gaius Suetonius [[sweh-TOH-nee-us]] won the Battle of Watling Street against Boudica. name this Roman region where Hadrian’s Wall was built to stop Pict raids.","a":"Brittania","af":"Brittania (accept Roman Britain; prompt on “Britain”)","y":"2022","r":"Finals"},{"n":4,"q":"This politician once offered $500 thousand to get a Harper’s Weekly employee to leave him alone. Samuel Tilden refused to honor an agreement this man made in prison to testify about his namesake \"Ring\" in return for his release from Ludlow Street Jail. A New York Democrat who was frequently lampooned by Thomas Nast, who was this corrupt leader of Tammany Hall?","a":"William M","af":"William M(agear) \"Boss\" Tweed (accept Tweed Ring)","y":"2022","r":"Finals"},{"n":5,"q":"This good lends its name to the chair of the Speaker of the House of Lords. Increased production of this good led to the growth of the enclosure movement. The Ciompi [[chee-OHM-pee]] Revolt was led by workers of this good, which was exported from England to Flanders to be turned into cloth. Name this good that can be acquired by shearing sheep.","a":"Wool","af":"Wool (accept Woolsack; prompt on \"cloth\" before mentioned) 2022 Elementary School National History Bee Quarterfinals","y":"2022","r":"Finals"},{"n":6,"q":"This collection’s anti-Catholic stances led it to be burned at “The Bonfire of the Vanities” in this work’s setting in Tuscany. Structured as a frame story, this work tells the stories of seven women and three men sheltered outside Florence to avoid the Black Death. Taking place over a ten-day period, what is this collection of novellas by Giovanni Boccaccio?","a":"The Decameron","af":"The Decameron (or Decamerone)","y":"2022","r":"Finals"},{"n":7,"q":"This order’s French motto translates loosely as “Shame on those who thinks evil of it.” This order is the oldest surviving chivalric order of the United Kingdom. Founded by Edward III, allegedly after he aided a lady who was experiencing a wardrobe malfunction, what is this most senior order of British knighthood?","a":"Most Noble Order of the Garter","af":"Most Noble Order of the Garter","y":"2022","r":"Finals"},{"n":8,"q":"Both Ambrose Burnside and William T. Sherman participated in this battle, at which a defensive stand at Henry House Hill helped to decide the outcome. Rose O’Neal Greenhow aided the winning side in this July 1861 battle, after which Abraham Lincoln authorized expanding the Union Army by half a million men. Name this 1861 battle, the first major battle of the Civil War.","a":"First Battle of Bull Run","af":"First Battle of Bull Run (accept Battle of First Manassas)","y":"2022","r":"Finals"},{"n":9,"q":"One ruler from this period created a capital modelled after the contemporary Tang [[TAHNG]] Dynasty capital of Chang'an. This period's royal court was depicted in Lady Murasaki's novel The Tale of Genji. This period succeeded the Nara period and preceded the Kamakura Shogunate. name this final period of classical Japanese history.","a":"Heian period","af":"Heian period (or Heian jidai; accept \"era\" in place of \"period\"; prompt on specific date ranges from the late 8th century to the late 12th century)","y":"2022","r":"Finals"},{"n":10,"q":"The word for this religious figure originates from the Evenki phrase for \"one who knows,\" although some claim it came from the Arabic word for \"devil.\" Jake Angeli was widely termed as one of these figures when he donned a fur, horned headdress while raiding the U.S. Capitol. Name these religious figures who are believed to communicate with the spirit world.","a":"Shaman","af":"Shaman (accept QAnon Shaman; accept Q Shaman; do not accept or prompt on \"Medicine Man\") 2022 Elementary School National History Bee Quarterfinals","y":"2022","r":"Finals"},{"n":11,"q":"This city was first named “oskana ka-asastēki” [[OOS-kuh-nuh kah uh-SUS-tay- kee]], due to the Cree tribe’s practice of stacking bison bones near the Wascana Creek. A 1912 cyclone completely destroyed this city, which was followed by a severe 1930 riot during the On-to-Ottawa Trek. With a Latin word honoring a colonial monarch as its official name, what is this capital city of Saskatchewan?","a":"Regina [[reh-JY-nah]]","af":"Regina [[reh-JY-nah]]","y":"2022","r":"Finals"},{"n":12,"q":"From 1909 until his death in 1911, this man served as the conductor of the New York Philharmonic. While largely an instrumental composer, this man wrote song cycles including Das Lied von der Erde and Das Knaben Wunderhorn. The creator of nine complete symphonies including his second, named Resurrection, who was this Austrian composer of the Symphony of a Thousand?","a":"Gustav Mahler","af":"Gustav Mahler","y":"2022","r":"Finals"},{"n":13,"q":"This man who overthrew the last Nanda king was mentored by Chanakya [[chah-NAH-kyah]] and supposedly gave war elephants to Seleucus I [[the FIRST]] Nicator. This man was succeeded as emperor by his son, Bindusara and established a capital at Pataliputra. Ruling as the head of his namesake empire, who was this founder of a classical Indian dynasty?","a":"Chandragupta Maurya","af":"Chandragupta Maurya (prompt on partial answers; prompt on \"Mauryan\")","y":"2022","r":"Finals"},{"n":14,"q":"Confederate general Albert Sidney Johnston was fatally wounded at this battle, becoming the highest-ranking officer on either side to die in the U.S. Civil War. Ulysses S. Grant surprised by the Army of Mississippi attacking from Corinth at this battle. Ending with a Union victory but with nearly 25 thousand casualties, what was this 1862 battle in southwestern Tennessee?","a":"Battle of Shiloh","af":"Battle of Shiloh (accept the Battle of Pittsburg Landing)","y":"2022","r":"Finals"},{"n":15,"q":"In a speech at La Baule [[BOHL]], this politician spoke of a \"Southern wind\" to outline support for greater financial aid to African countries. This man publicly apologized to the descendants of the Huguenots on the 300th anniversary of the Edict of Fontainebleau [[fohn-tehn-BLEW]]. A Socialist in office from 1981 to 1995, who was this longest-serving president of France?","a":"François Mitterrand","af":"François Mitterrand (or François Marie Adrien Maurice Mitterrand; accept Mitterand Doctrine) 2022 Elementary School National History Bee Quarterfinals","y":"2022","r":"Finals"},{"n":16,"q":"Frederick Muhlenberg was stabbed for signing this document, and The Anti- Federalists tried to replace this document with the Monroe-Pinckney Treaty. Meant to resolve lasting issues from the Treaty of Paris and the French Revolution, what treaty was negotiated by the first Chief Justice of the U.S. Supreme Court?","a":"Jay Treaty","af":"Jay Treaty (or Jay's Treaty; or Treaty of Amity, Commerce, and Navigation, Between His Britannic Majesty and the United States of America)","y":"2022","r":"Finals"},{"n":17,"q":"The last ruler of this empire, Ai [[\"EYE\"]], was assassinated by Zhu Wen of the Later Liang dynasty. This empire was defeated by the Abbasid Caliphate at the Battle of Talas River. The Sogdian general An Lushan led a rebellion against this dynasty that was interrupted by the reign of Wu Zetian. Succeeding the Sui dynasty, what is this empire, considered a Golden Age of China?","a":"Tang Dynasty","af":"Tang Dynasty (or Tang Empire)","y":"2022","r":"Finals"},{"n":18,"q":"This man first mentioned his \"multiplier effect\" in The Means to Prosperity. This man's 1936 magnum opus describes the instincts that guide human behavior as \"animal spirits\". The author of The General Theory of Employment, Interest, and Money, who was this English economist who advocated for government spending to relieve economic downturns?","a":"John Maynard Keynes","af":"John Maynard Keynes (accept Keynesian Revolution)","y":"2022","r":"Finals"},{"n":19,"q":"Due to their experience with parachuting, this person was recruited by Nikolai Kamanin. This person, who was elected to the Yaroslavl Oblast Duma in 2008, used the callsign Chaika, or \"Seagull,\" during a June 16, 1963 mission. On that mission, this person orbited Earth 48 times aboard the Vostok 6. name this Russian, the first civilian and first woman in space.","a":"Valentina Tereshkova","af":"Valentina Tereshkova (or Valentina Vladimirovna Tereshkova)","y":"2022","r":"Finals"},{"n":20,"q":"Running on this party's ticket, education reformer Horace Mann lost an election for governor of Massachusetts. The return of the \"Barnburners\" to the Democrats caused this party's candidate John P. Hale's poor performance in the Election of 1852. In 1844, Martin van Buren ran on a ticket for, what mid-19th century American third party which opposed the expansion of slavery?","a":"Free Soil Party 2022 Elementary School National History Bee Quarterfinals","af":"Free Soil Party 2022 Elementary School National History Bee Quarterfinals","y":"2022","r":"Finals"},{"n":21,"q":"Prigg v. Pennsylvania held that one of these laws, passed in 1793, precluded a Pennsylvania state law. Public outrage occurred after an 1850 example of these laws led to the arrest of Anthony Burns. Labeled the \"Bloodhound Law\" by The Liberator, what series of laws fined people who did not arrest certain runaways?","a":"Fugitive Slave Acts","af":"Fugitive Slave Acts (accept Fugitive Slave Act of 1850 or 1793)","y":"2022","r":"Finals"},{"n":22,"q":"The story of Rostam killing his son likely inspired the tale of this hero killing Connla with his spear, the Gáe Bulg [[GAH-yeh BUL-ug]], after he enters their home without identifying himself. An onslaught by the armies of Queen Maeve [[MAVE]] of Connacht is single-handedly stopped by this hero during the Cattle Raid of Cooley. The hero of the Ulster Cycle, who is this Irish legend?","a":"Cú Chulainn [[koo-KULL-in]]","af":"Cú Chulainn [[koo-KULL-in]] (or Cuhullin; or Cú Chulaind; or Setanta; be very lenient on pronunciation)","y":"2022","r":"Finals"},{"n":23,"q":"This company is headquartered in the city of Dhahran and had the largest initial public offering in history on the Tadawul stock exchange, where its shares rose to a value of 35 riyals [[ree-YAHLS]]. This company, which exploits the Safaniya and Ghawar oil fields in Eastern Province, was nationalized after the Yom Kippur War. what is this state-owned oil company in a country governed from Riyadh?","a":"Saudi Aramco","af":"Saudi Aramco (accept Saudi Arabian Oil Company)","y":"2022","r":"Finals"},{"n":24,"q":"This accord gave rise to the final line of Article Five of the United States Constitution. Delegates Roger Sherman and Oliver Ellsworth proposed this plan at the Constitutional Convention as an alternative to the Virginia and New Jersey plans. Calling for a Senate with equal representation and a House of Representatives with proportional representation, what is this 1787 \"Great\" agreement?","a":"Connecticut Compromise","af":"Connecticut Compromise (or Sherman Compromise; accept Great Compromise of 1787 before “Great”)","y":"2022","r":"Finals"},{"n":25,"q":"A member of this dynasty overthrew Childeric III and established the Papal States with his namesake donation. A ruler from this house defeated the Caliphate of Cordoba at the Battle of Tours [[TOOR]]. Pepin the Short was the first king of this dynasty and overthrew the Merovingians. Founded by Charles Martel and ruling the Frankish Empire, what was this dynasty of Charlemagne [[shar-leh- MANE]]?","a":"Carolingian dynasty","af":"Carolingian dynasty (accept Karlings; accept Carlovingians; accept Carolingus; accept Carolings; accept Karolinger; prompt on \"Pippinids\") 2022 Elementary School National History Bee Quarterfinals Extra Questions","y":"2022","r":"Finals"},{"n":1,"q":"This man headed the New Life Movement and led the Northern Expedition to unify his country under the leadership of the KMT. In the Xian [[SHEE-AHN]] incident this man was briefly arrested by army officers concerned about the invading Japanese Army. Moving his government to Taiwan in 1949, who was this Chinese Nationalist and leader of the Republic of China?","a":"Chiang Kai-shek","af":"Chiang Kai-shek (or Chiang Chieh-shih; or Chiang Chung-cheng; or Jiang Jieshi; prompt on \"Kai-shek\")","y":"2022","r":"Finals"},{"n":2,"q":"This author followed his first novel, A Daughter of the Snows, with a novel about a pet owned by Judge Miller. In that novel by this member of \"The Crowd,\" the main character becomes a companion of John Thornton and kills Spitz, a white husky. Spending most of his life in San Francisco, what author wrote about the adventures of Buck in The Call of the Wild?","a":"Jack London","af":"Jack London (or John Griffith London; or John Griffith Chaney)","y":"2022","r":"Finals"},{"n":3,"q":"After ordering a retreat at a battle in this state, General Charles Lee was court- martialed. In that battle in this state, Molly Pitcher became known for carrying water to dying soldiers at Monmouth Courthouse. Hessian troops were attacked by George Washington’s army in this state after crossing the Delaware River on Christmas Day. The Battles of Princeton and Trenton occurred in, what US state?","a":"New Jersey","af":"New Jersey","y":"2022","r":"Finals"},{"n":1,"q":"Although he was acquitted from this event, Harry Ford Sinclair served time in jail for jury tampering. The investigation of this event led to the incarceration of Secretary of the Interior Albert Bacon Fall. Name this political scandal involving oil lease kickbacks that damaged the reputation of the administration of President Warren. G. Harding.","a":"Teapot Dome Scandal","af":"Teapot Dome Scandal","y":"2022","r":"Nationals"},{"n":2,"q":"Following major destruction in the Onin War, people in this city helped launch the Nishijin [[nee-shee-JEEN]] weaving district. The official tombs of Emperor Shijō [[shee-JOH]] and other emperors are located at this city's Sennyū-ji [[sen-yoo-JEE]] Temple. In 794, the imperial court moved from Nara to, what city, which preceded Edo as the capital of Japan?","a":"Kyoto","af":"Kyoto (or Kyoto-shi)","y":"2022","r":"Nationals"},{"n":3,"q":"This man created a station in the United States to allow Theodore Roosevelt to contact King Edward VII of the United Kingdom. The Supreme Court declared this man could not claim copyright infringement against Oliver Lodge, John Stone Stone, and Nikola Tesla. Name this Italian Nobel Prize winner who is often credited with inventing radio communication.","a":"Guglielmo Marconi","af":"Guglielmo Marconi (or Guglielmo Giovanni Maria Marconi; or 1st Marquis of Marconi)","y":"2022","r":"Nationals"},{"n":4,"q":"This prime minister was still working on a novel titled Falconet at the time of his death. This man bestowed the title “Empress of India” to Queen Victoria under the Royal Titles Act. Preceded and succeeded by William Gladstone, this is, what Conservative politician, the only British Prime Minister of Jewish descent?","a":"Benjamin Disraeli","af":"Benjamin Disraeli (or 1st Earl of Beaconsfield)","y":"2022","r":"Nationals"},{"n":5,"q":"Before entering a synagogue on this day, worshippers recite the Kol Nidre [[kohl NEE- dreh]] prayer. Tradition holds that this observance was first kept after the children of Israel repented for their idolatry following Moses's return from Mount Sinai. Name this holiest Jewish holiday, also known as the Day of Atonement.","a":"Yom Kippur","af":"Yom Kippur (accept Day of Atonement before mentioned) 2022 Elementary School National History Bee Round 1","y":"2022","r":"Nationals"},{"n":6,"q":"According to legend, this city was saved from droughts by gods riding on multi- colored goats, which gives this city its nickname of \"City of Five Goats.\" This city is home to the solid granite Sacred Heart Cathedral, founded in the aftermath of the Opium Wars. Name this largest city in southern China, formerly known in the west as \"Canton\"?","a":"Guangzhou","af":"Guangzhou (accept Canton before mentioned)","y":"2022","r":"Nationals"},{"n":7,"q":"During this year, the Irish Republican Army announced a \"complete cessation of military operations,” creating a cease-fire in the Northern Ireland conflict. In this year, the Channel Tunnel, known as the \"Chunnel,\" opened to connect France and England. The Rwandan Genocide occurred in, what year which marked the election of President Nelson Mandela?","a":"1994","af":"1994","y":"2022","r":"Nationals"},{"n":8,"q":"This ruler approved Dmitry Milyutin's plans for the Ciricassian Genocide. Although this leader, alongside Napoleon III, was the target of an assassination attempt at the Exposition Universelle, he was ultimately killed in a bombing organized by the People's Will party. Name this Russian emperor who emancipated the serfs.","a":"Alexander II","af":"Alexander II (accept Alexander the Liberator)","y":"2022","r":"Nationals"},{"n":9,"q":"Depictions of this figure show him wearing the Atef crown topped with two ostrich plumes while grasping a crook and flail. After this deity was lured into a sarcophagus, his wife found his body inside a tree at Byblos. Set murdered, what husband of Isis, the Egyptian god of the dead?","a":"Osiris","af":"Osiris (or Asar; or Usire)","y":"2022","r":"Nationals"},{"n":10,"q":"This country's town of Lumaco was the epicenter of the strongest earthquake ever recorded, the Valdivia earthquake. An island administered by this country is known as Rapa Nui in the language of its natives. Augusto Pinochet was a dictator in, what South American country whose territories include Easter Island?","a":"Republic of Chile","af":"Republic of Chile (or República de Chile)","y":"2022","r":"Nationals"},{"n":11,"q":"Sir Thomas Gates commanded George Yeardley to prevent settlers of this city from setting fire to evacuated structures. This city, which experienced a \"starving time,\" cultivated tobacco under the leadership of John Rolfe. Name this English city founded in Virginia in 1607 that fought the Powhatans.","a":"Jamestown","af":"Jamestown (accept Jamestown Settlement) 2022 Elementary School National History Bee Round 1","y":"2022","r":"Nationals"},{"n":12,"q":"Following this man’s death, George Monck marched on London and restored the Long Parliament. This man’s body was exhumed and subjected to a posthumous execution on the twelfth anniversary of the execution of Charles I. What man served as Lord Protector of England following the English Civil War?","a":"Oliver Cromwell","af":"Oliver Cromwell","y":"2022","r":"Nationals"},{"n":13,"q":"This location was considered the center of the world because it houses the Omphalos [[ohm-FAH-lohss]] stone. This location on Mt. Parnassus was once home to a holy woman who gave prophecies while seated on a golden tripod. The home of the Python that harassed Artemis's mother, Leto, is, what site, the location of the Oracle of Apollo?","a":"Delphi","af":"Delphi (accept Oracle of Delphi)","y":"2022","r":"Nationals"},{"n":14,"q":"This man was elected the first governor of Massachusetts. This man served as the president of the Continental Congress in 1776 and was the first to sign the Declaration of Independence. Name this Founding Father whose oversized scrawl on that document has since led to his name becoming synonymous with “signature.”","a":"John Hancock","af":"John Hancock","y":"2022","r":"Nationals"},{"n":15,"q":"This object is used to revive a pair of goats with names meaning \"tooth grinder\" and \"tooth gnasher”, and it was given to Magni and Modi following Ragnarok. This object was made with a shortened handle after Loki turned into a gadfly and bit the dwarves Eitri and Brokkr. Name this mythological hammer used by Thor.","a":"Mjölnir [[MYUHL-neer]]","af":"Mjölnir [[MYUHL-neer]] (be lenient on pronunciation)","y":"2022","r":"Nationals"},{"n":16,"q":"This text describes the Jaredites in the Book of Ether [[EE-ther]] and narrates a conflict between the Nephites and the Lamanites. This book was allegedly revealed by the angel Moroni [[muh-ROH-nye]] who presented it on a pair of golden plates. Name this text discovered by Joseph Smith, the holy book of the Latter Day Saints.","a":"Book of Mormon","af":"Book of Mormon (or The Book of Mormon: An Account Written by the Hand of Mormon upon Plates Taken from the Plates of Nephi; accept Book of Ether before mentioned)","y":"2022","r":"Nationals"},{"n":17,"q":"Resulting from the Treaty of San Stefano, this country was recognized as an autonomous region of the Ottoman Empire in 1878. In 1908, this country gained independence, and Ferdinand of Saxe-Coburg-Gotha became Tzar of this country. Name this losing country of the Second Balkan War with its capital at Sofia.","a":"Bulgaria","af":"Bulgaria (or Principality of Bulgaria; or Republika Bulgaria) 2022 Elementary School National History Bee Round 1","y":"2022","r":"Nationals"},{"n":18,"q":"This president worked with Senator Harry Byrd to get Senate approval of the Tax Reduction Act. This president also passed the Economic Opportunity Act, which created Volunteers in Service to America, a counterpart to his predecessor’s Peace Corps. Name this president whose goal was to create a “Great Society.”","a":"Lyndon Baines Johnson","af":"Lyndon Baines Johnson (accept LBJ; prompt on \"Johnson\")","y":"2022","r":"Nationals"},{"n":19,"q":"To commemorate an anniversary of this event, Philip the Arab held the bloody Secular Games. An account of this event, which is titled by a series a books by Livy in Ab Urbe Condita, states that one figure dug a trench over which Remus was killed. Name this event, which may have occurred in 753 BC, establishing an ancient city in Italy.","a":"Founding of Rome","af":"Founding of Rome (accept reasonable equivalents; accept Ab Urbe Condita before mentioned)","y":"2022","r":"Nationals"},{"n":20,"q":"In this country in 2004, Hurricane Frances and Hurricane Jeanne decimated the chain of islands called Bimini. Fifteen years later, Hurricane Dorian caused significant damage to this nation's Abaco Islands and the northernmost island in this nation. Name this Caribbean Commonwealth country governed from Nassau.","a":"Bahamas","af":"Bahamas (or Commonwealth of the Bahamas)","y":"2022","r":"Nationals"},{"n":21,"q":"One of these creatures was the son of Philyra [[FIH-luh-ruh]] and Cronus, as well as the tutor of Achilles. Another one of these creatures gave Deianira [[dee-uh-NEE-ruh]] a shirt poisoned with Hydra blood to kill Heracles and was named Nessus. The teacher Chiron [[KYE- run]] was, what type of mythical creature with the torso of a man and the body of a horse?","a":"Centaur","af":"Centaur (accept Hippocentaur)","y":"2022","r":"Nationals"},{"n":22,"q":"An American author with this last name created the characters Natty Bumppo and Chingachgook [[CHING-gahtch-gook]]. A journalist with this last name is the grandson of Gloria Vanderbilt and anchors the CNN news show 360. What surname means \"barrel maker\" and is shared by James Fenimore and Anderson?","a":"Cooper","af":"Cooper (accept James Fenimore Cooper; accept Anderson Hays Cooper)","y":"2022","r":"Nationals"},{"n":23,"q":"A primordial being in this nation's mythology named Pangu broke free from the \"World Egg\" creating the universe with assistance from the Qilin [[CHEE-LEEN]] and Nuwa [[NOO-WAH]]. The semi-mythic Xia [[SHEE-AH]] Dynasty is from, what nation, the origin of both Daoism and Confucianism?","a":"People's Republic of China","af":"People's Republic of China (or PRC; or Zhongguo; or Zhonghua Renmin Gongheguo) 2022 Elementary School National History Bee Round 1","y":"2022","r":"Nationals"},{"n":24,"q":"One figure advised Pat Gray to \"Stay... Out of this\" after certain \"productive areas\" had been breached. An associate director of the FBI named Mark Felt was exposed as an informant named “Deep Throat” in this event that triggered the Saturday Night Massacre. Name this event that led to Richard Nixon’s resignation.","a":"Watergate Scandal","af":"Watergate Scandal (accept Watergate Affair or synonymous answers)","y":"2022","r":"Nationals"},{"n":25,"q":"A member of this profession started an affiliate of an organization founded by Jean- Henri Dunant [[doo-NAHNT]]. That woman in this profession first assisted victims of the Baltimore Riot before working at Antietam and Fredericksburg. Name this profession of Clara Barton, who founded the American Red Cross.","a":"Medical Nurse","af":"Medical Nurse (accept word forms such as Nursing; do not accept or prompt on \"Doctor\") Extra Questions","y":"2022","r":"Nationals"},{"n":1,"q":"After an incident at the Harvard Inn, this man earned his best-known nickname while working for Johnny Yale. This man was opposed by Eliot Ness and The Untouchables and was ultimately brought down for tax evasion rather than for organizing the St. Valentine's Day Massacre. Name this Chicago gangster nicknamed “Scarface.”","a":"Al Capone","af":"Al Capone (or Alphonse Gabriel Capone; prompt on \"Scarface\" before mentioned)","y":"2022","r":"Nationals"},{"n":2,"q":"Following independence from Portugal in 1975, this country immediately entered a civil war between the MPLA and UNITA. In this nation, the Pro-Soviet MPLA was directly supported by forces from Cuba while the Pro-NATO UNITA was supported by South African forces. Name this Sub-Saharan African OPEC member whose capital city is Luanda.","a":"Angola","af":"Angola (or Republic of Angola; or República de Angola; accept People's Republic of Angola)","y":"2022","r":"Nationals"},{"n":1,"q":"An attempt by this woman to speak at a New York State Teachers Association convention led to a debate about the right of women to speak in public. The Revolution was a publication begun by this woman and Elizabeth Cady Stanton to promote women’s rights. Name this suffragist whose face appeared on the dollar coin.","a":"Susan B. Anthony","af":"Susan B. Anthony","y":"2022","r":"Nationals"},{"n":2,"q":"Manteo, a Native American visitor to England, was one of this person’s guests. After aiding in the suppression of Irish rebels, this person gained large tracts in Ireland for himself. Name this person who made several attempts to discover El Dorado.","a":"Sir Walter Raleigh","af":"Sir Walter Raleigh","y":"2022","r":"Nationals"},{"n":3,"q":"This dynasty established an army of military slaves known as Mamluks under al- Mu'tasim [[al MOO-tah-SEEM]]. At the Battle of Zab, this dynasty took control from Marwan II, reaching its height under Harun al-Rashid, who established the House of Wisdom. Name this caliphate that succeeded the Umayyads.","a":"Abbasid Caliphate","af":"Abbasid Caliphate (or Abbasids)","y":"2022","r":"Nationals"},{"n":4,"q":"This person convinced Virginia Slims to sponsor a certain sporting event to compete against the U.S. Lawn Tennis Association in protest and was suspended by the U.S. Association as a result. This athlete competed against Bobby Riggs in her best known event, a tennis match in the Astrodome. Name this winner of the “Battle of the Sexes” in 1973, a female tennis champion with 39 Grand Slam titles.","a":"Billie Jean King","af":"Billie Jean King (or Billie Jean Moffitt)","y":"2022","r":"Nationals"},{"n":5,"q":"This man's wife, Edith, orchestrated the murder of rival noble Gospatrick in an effort to place her brother, Tostig, in the position of the Earl of Northumberland. Robert I made one failed attempt to place this man on the English throne in an effort to depose the foreigner, Canute III. The death of, what pious king of England triggered a succession war among Harald Hadrada, Harold Godwinson, and William the Conqueror?","a":"Edward the Confessor","af":"Edward the Confessor (prompt on \"Edward\")","y":"2022","r":"Nationals"},{"n":6,"q":"After this man's father, Bindasura, died, he killed both his eldest brother and up to 99 of his half-brothers in order to ascend to the throne. This man, who led a campaign against the Jains, was led to convert to Buddhism after seeing the destruction caused by a war against Kalinga. Name this third emperor of the Mauryan Empire.","a":"Ashoka the Great","af":"Ashoka the Great (accept Asoka in place of Ashoka) 2022 Elementary School National History Bee Round 2","y":"2022","r":"Nationals"},{"n":7,"q":"In 1987, this country was declared a republic by Prime Minister Sitiveni Rabuka. Indian laborers were imported to this country, which is 28 percent Hindu, to work on the plantations of the Colonial Sugar Refining Company. Mahendra Chaudhry [[CHOH-dree]] was toppled in a coup d’état in this country in which coups have historically taken place on the island of Viti Levu. Name this Melanesian island country governed from Suva.","a":"Republic of Fiji","af":"Republic of Fiji (or Matanitu ko Viti)","y":"2022","r":"Nationals"},{"n":8,"q":"On the Ninth of Av, this emperor's troops seized Bethar during the Bar Kokhba Revolt. This emperor separated the Roman Empire from the Picts with a large stone fortification. The successor of Trajan was, what Roman emperor who built a namesake wall in Britain?","a":"Hadrian","af":"Hadrian (or Publius Aelius Hadrianus Augustus; accept Hadrian's Wall)","y":"2022","r":"Nationals"},{"n":9,"q":"In this century, Westminster Abbey was built, and the construction of the Tower of London began. During this century, Pope Urban II prompted the beginning of the Crusades at the Council of Cl
